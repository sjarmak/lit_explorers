robustness check; (7) the 5-model-majority semantic audit (validated against a human-labeled stratified subset, Fleiss kappa reported) is a reusable LLM-judge calibration recipe; (8) ship a reproducibility layer (target mappings + fixtures + rescoring utils) like MTEL-Mem."}, {"bibcode": "2026arXiv260520926T", "title": "MemConflict: Evaluating Long-Term Memory Systems Under Memory Conflicts", "task_design": "Diagnostic framework treating memory validity as a query-conditioned FITNESS-FOR-USE problem along 3 dimensions: temporal validity, factual correctness, contextual applicability. These map to 3 CONFLICT TYPES: (1) DYNAMIC conflict \u2014 earlier and later states coexist; a later TRUE update should supersede the earlier state (tests temporal validity, over dynamic state attributes). (2) STATIC conflict \u2014 a later FALSE contradictory mention should NOT overwrite a stable invariant fact (tests factual correctness, over invariant attributes). (3) CONDITIONAL conflict \u2014 multiple values are each valid under different conditions; only the condition matching the query applies (tests contextual applicability, over conditional-preference attributes). Formalized as validity determination: given query q_t issued right after session s_t and history prefix H_t, return v*(alpha,q_t|H_t) = argmax over candidates of F(v|alpha,H_t,q_t); construction guarantees a unique maximizer. Each query is anchored to the history PREFIX at query time (not the full history). Query forms per type: static query issued after the contradictory mention asks for the true invariant value; dynamic query issued after a true update asks for the temporally valid value at query time; conditional query gives a preference VALUE and asks for the CONDITION under which it applies (gold = the condition c_l). Two-level evaluation protocol: BLACK-BOX (final answer) + WHITE-BOX (whether the gold supporting memory item is retrieved and how it is ranked). Evaluated on 6 memory systems: A-Mem, LangMem, Letta, MemOS, Mem0, Memobase, all wired into a common query/answer-normalization/white-box retrieval pipeline. Controlled factors swept: retrieval depth K in {2,3,5} (main K=3), dialogue length (medium/long), distractor on/off, query formulation (direct vs implicit), conflict distance (number of intervening sessions).", "data_generation": "5-step controlled simulation pipeline (Algorithm 1), all LLM calls use gpt-5.0-mini: STEP 1 USER PROFILE INIT \u2014 sample a persona seed z_u from Persona Hub, then LLM generates a structured profile U_u=(I_u invariant attrs, D_u dynamic states, C_u conditional preferences, T_u personality traits/life goals, R_u related entities). Dynamic attrs: residence, marital status, child status, employment, health, social state, career direction. Invariant attrs: basic personal info, birthplace, family background, education. STEP 2 TIMELINE SIMULATION + CONFLICT CONSTRUCTION over Jan-2022..Dec-2025 at monthly granularity; sessions typed chat vs update. Dynamic conflict: each update session picks update set A_t (|A_t| in {1,2}) under feasibility/cooldown/persona-consistency constraints with attribute-specific weights, LLM proposes new values, validation rule V_d enforces structural constraints (marital progressions, child preconditions, longer cooldowns for residence/career); accepted Delta_t inserted as explicit update mentions; old+new both remain in history but only new is valid. Static conflict: over an invariant attr b, insert true value v* at session s_p and an LLM-generated plausible-but-false v- at later s_q (p<q), with b NOT mentioned in between to isolate the contradiction. Conditional conflict: pick conditional attr r with >=2 distinct (condition,value) pairs from C_u[r], introduce them at different sessions, not re-mentioned in between. STEP 3 (interleaved) DISTRACTOR INJECTION \u2014 from related entities R_u, insert semantically similar non-target values E_t for the same attribute into an intermediate session WITHIN the conflict span; distractor stays attributable to a related entity, answer unchanged. STEP 4 (within step 2/3 ordering) MULTI-SESSION DIALOGUE GENERATION \u2014 two-stage: LLM generates a session synopsis z_t from (session type, Delta_t, P_t static, B_t conditional, E_t distractor), then expands to a multi-turn dialogue G_t; constraints: coherent with synopsis AND every non-empty info item explicitly realized and correctly attributed; items distributed across turns not listed; then HUMAN experts verify naturalness/coherence/coverage/attribution, revising or regenerating failures. STEP 5 QUERY & LABEL CONSTRUCTION \u2014 queries built only once a conflict instance becomes evaluable (all info defining the gold answer has appeared); issued immediately after the relevant session, using prefix H_t; gold for static/dynamic = valid value, for conditional = the condition c_l; plus diagnostic queries asking whether competing candidates / update relations are present. Final answer/memory-item judgments via LLM-assisted matching + human verification.", "metrics": "Reported separately per conflict type, with overall = MACRO-average across the 3 types (so frequent dynamic conflicts do not dominate). BLACK-BOX: Answer Accuracy AA = (1/N) sum 1(y_hat_i = y*_i). WHITE-BOX: Support Evidence Hit@K SEH@K = (1/N) sum 1(m*_i in R_i^K) (is gold memory item in top-K retrieved); Support Rank Score SRS = (1/N) sum [ 1/log2(rank(m*_i)+1) if m*_i in R_i^K else 0 ] (log-discounted rank score). CONFLICT DIAGNOSTICS: Update Order Consistency Score UOCS = (1/N) sum 1(u_i=1 AND o_i=1) for dynamic (correct update recognition AND temporal ordering); Conflict Recognition Score CRS = (1/N) sum 1(c_i=1) for static (recognizes contradictory candidates coexist); no extra diagnostic for conditional (its query already tests value-condition recovery). The SEH@K vs SRS gap is itself a diagnostic (gold item retrieved but ranked low).", "key_numbers": ["Dataset: 12 benchmark instances (1 virtual user each); avg per instance 52.33 sessions, 2,349.17 dialogue turns, 203,910.83 tokens, 124.33 evaluation queries (dynamic 90.82 / static 16.65 / conditional 16.86); avg 32.83 distractor entries per instance; conflict distances dynamic 5-25, static 10-45, conditional 9-49 sessions", "Black-box AA (avg over types): MemOS highest avg AA 0.5539; static is hardest type; LangMem best dynamic AA 0.4966; conditional polarized", "CRS is low for ALL systems (best only 0.2501) \u2014 systems answer correctly without recognizing the contradiction", "White-box: MemOS best avg SEH@3 0.6710 and SRS 0.5879; Letta second (best conditional SEH@3 0.9046); LangMem best dynamic SEH@3 0.7842 / SRS 0.7089; SEH@3 > SRS across most systems (gold item retrieved but low-ranked)", "Retrieval depth: Letta SEH@K 0.5239 (K=2) -> 0.7251 (K=5); MemOS strongest at K=5 with SEH@K 0.7280, SRS 0.6123", "No system dominates all conflict types/metrics; answer correctness often diverges from retrieval/ranking; longer histories, distractors, implicit queries, larger conflict distance all degrade performance", "Construction + all memory backends + judging use gpt-5.0-mini"], "reusable_for_role": "Highly reusable as the conflict-aware core of a memory-eval harness: (1) the dynamic/static/conditional conflict taxonomy (true-update-supersedes vs false-contradiction-must-not-overwrite vs condition-specific-applicability) is a directly portable test-case generator spec; (2) persona-seed -> structured-profile -> timeline-simulation -> conflict-injection -> distractor-injection -> two-stage dialogue (synopsis then realization) -> evaluable-query pipeline is a complete reusable synthesis recipe, with explicit constraint machinery (feasibility/cooldown/persona-consistency, validation rule V_d, isolation by not-re-mentioning between conflict endpoints); (3) the unique-maximizer query-conditioned gold (argmax F over candidates at the history prefix) is a clean labeling formalism; (4) the black-box + white-box split with metric set AA / SEH@K / SRS / UOCS / CRS and macro-averaging across types is a ready metric suite; (5) the SEH@K-vs-SRS gap and CRS-vs-AA divergence are reusable failure-localization diagnostics (missing memory vs low-ranked memory vs ineffective use); (6) controlled-factor sweep design (retrieval depth, dialogue length, distractor on/off, direct vs implicit query, conflict distance) is a reusable stress-test matrix; (7) related-entity distractor injection that leaves the answer unchanged is a reusable hard-negative design."}], "design_principles": ["FREEZE-THEN-EVALUATE / fixed-output discipline: both SkillEvolBench (freeze the skill library before deployment tasks) and TIAP (rescore fixed saved ranked traces) isolate the variable of interest by holding the rest of the system constant \u2014 a memory harness should separate the WRITE/consolidation phase from a frozen READ/evaluation phase so gains cannot come from test-time adaptation.", "SEPARATE THE CREDIT/SCORING DEFINITION FROM RETRIEVAL BEHAVIOR: TIAP shows that which stored form receives credit (Raw/Source/Canonical) can flip system rankings on 83-94% of queries with retrieval unchanged; any memory harness MUST define and report its scoring target/gold-membership rule explicitly and test ranking robustness to it.", "TWO-LEVEL (BLACK-BOX + WHITE-BOX) EVALUATION: final-answer correctness is necessary but insufficient \u2014 MemConflict (AA vs SEH@K/SRS/CRS) and SkillEvolBench (outcome vs process verifiers) both show answer correctness diverges from whether the right evidence was retrieved/ranked or the right procedure followed; harnesses need explicit retrieval/ranking and process diagnostics to localize failure (missing memory vs low-ranked vs ineffective use).", "CONTROL SET / ABLATION BASELINES are mandatory to attribute gains: No-Skill and Raw-Trajectory controls (SkillEvolBench), coverage-matched shared-query subsets (TIAP), and one-factor-at-a-time sweeps (MemConflict) all exist to prevent confounding the headline effect with base capability, query difficulty, or target size.", "CONTROLLED SYNTHESIS FROM STRUCTURED SEEDS + HUMAN VERIFICATION: MemConflict and SkillEvolBench both build instances from structured specs (persona profiles / family procedures) under explicit constraints, inject competition (distractors / adversarial shortcuts), and gate every instance through human review for naturalness, coverage, and correct attribution \u2014 synthetic data is generated then validated, never trusted raw.", "CALIBRATE LLM JUDGES AGAINST HUMANS BEFORE SCALING: TIAP validates its rubric on a human-labeled stratified subset (Fleiss kappa 0.83) before running a 5-model majority vote at temperature 0 on all 1,902 cases; MemConflict uses LLM-assisted matching followed by human verification \u2014 judge reliability is measured, not assumed."], "design_pitfalls": ["TARGET / CREDIT NON-INVARIANCE: if the harness lets one source produce multiple derived memories (raw turn + summary + canonical fact), leaving the scoring target implicit silently flips system rankings and even store-design recommendations (parser-density winner flips). Always pin Raw vs Source vs Canonical credit.", "COVERAGE CONFOUND: comparing targets/conditions on different query populations confounds the effect with query difficulty (TIAP: queries with a Canonical target are intrinsically easier under Raw by +0.086 nDCG). Always restrict comparisons to shared/coverage-matched query subsets.", "ANSWER-ONLY EVALUATION HIDES MEMORY FAILURES: a system can return the right answer while never recognizing a conflict (MemConflict CRS stays <=0.25 even at high AA) or rank the gold memory low (SEH@3 > SRS). Reporting only final-answer accuracy will mislead conclusions about memory quality.", "MISTAKING LOCAL RECOVERY / RAW REUSE FOR DURABLE MEMORY FORMATION: SkillEvolBench shows acquisition/replay (LSR/RSR) gains do NOT transfer to frozen deployment, and raw-trajectory reuse often BEATS distilled skills (lossy abstraction). Without a freeze + Raw-Trajectory control you will overclaim that memory/skill abstraction worked.", "DATA LEAKAGE THROUGH THE MEMORY WRITER: TIAP explicitly keeps gold answers/evidence labels out of the parser that produces transformed memories. If the consolidation/writing step ever sees evaluation labels, scores are inflated and meaningless.", "SHALLOW SHORTCUTS AND DISTRACTORS GO UNDETECTED WITHOUT PROCESS/HARD-NEGATIVE DESIGN: SkillEvolBench adversarial tasks (shortcut solutions passing shallow checks, caught by process verifiers) and MemConflict semantically-similar related-entity distractors (answer unchanged) show that without adversarial roles, hidden tests, and hard negatives, a harness rewards brittle pattern-matching rather than genuine memory use.", "UNCONTROLLED RETRIEVAL DEPTH biases conflict/sensitivity conclusions: too-shallow k inflates apparent target sensitivity or hides retrievable evidence; justify k against the recall plateau (TIAP k=60 after ~k=40 plateau) and sweep K (MemConflict K in {2,3,5})."], "temporal": {"publication_volume": [{"year": 2022, "count": 6, "note": "Pre-agentic-memory baseline. From lit_review year_distribution over a 129-paper topical working set for 'long-term memory systems for LLM agents'. The 2022 papers are largely off-topic noise (materials-science DL review, quantum crypto, model-written evals) that leaked into the working set via citation expansion -- true on-topic 2022 volume is effectively near-zero; the modern agentic-memory framing did not exist yet."}, {"year": 2023, "count": 31, "note": "First real wave: the cognitive-architecture / reflective-agent year. Seeds include CoALA (2023arXiv230902427S), Reflexion (2023arXiv230311366S), Voyager (2023arXiv230516291W), and MemGPT (2023arXiv231008560P, 107 citations) -- memory framed as an OS/context-management problem."}, {"year": 2024, "count": 33, "note": "Benchmark-driven consolidation. LoCoMo (2024arXiv240217753M) and LongMemEval (2024arXiv241010813W) appear, plus structural-memory studies (2024arXiv241215266Z), KARMA embodied memory (2024arXiv240914908W), and long-term dialogue agents."}, {"year": 2025, "count": 20, "note": "Production-system year (A-MEM 2025arXiv250212110X, Mem0 2025arXiv250419413C, Zep 2025arXiv250113956R, 'Episodic Memory is the Missing Piece' 2025arXiv250206975P). The count of 20 is LOWER than 2024 in this working set, but that is a sampling artifact of lit_review's citation-anchored seed expansion (2023-24 papers have more inbound edges so dominate expansion), NOT a real decline -- most 2025 papers carry citation_count 0 because they are too recent."}, {"year": 2026, "count": 39, "note": "Largest bucket despite the year being only ~5 months old (current date 2026-06-02). Dominated by named memory systems and benchmarks: DimMem, ElasticMem, GAM, MemConflict, EvoMemBench, MemGround, SAGE, APEX-MEM, MemORAI, plus memory-security work (memory hijacking/Trojan attacks). Nearly all carry citation_count 0/null -- too new to accrue citations. Extrapolating the partial year implies a steep acceleration over 2024-25."}], "citation_trajectories": [{"bibcode": "2024arXiv240217753M", "title": "Evaluating Very Long-Term Conversational Memory of LLM Agents (LoCoMo)", "note": "The canonical multi-session conversational-memory benchmark. Per-year citations rise then re-accelerate; total citation_count reported as 38 in search. Steady, durable benchmark adoption.", "per_year": [{"year": 2024, "citations": 21}, {"year": 2025, "citations": 17}, {"year": 2026, "citations": 24}]}, {"bibcode": "2024arXiv241010813W", "title": "LongMemEval: Benchmarking Chat Assistants on Long-Term Interactive Memory", "note": "Sharp monotonic ramp -- nearly invisible in its release year, then 6.5x in 2025 and another 2.4x into a partial 2026. Became a frontier evaluation target for the 2025-26 memory-system wave.", "per_year": [{"year": 2024, "citations": 2}, {"year": 2025, "citations": 13}, {"year": 2026, "citations": 31}]}, {"bibcode": "2025arXiv250212110X", "title": "A-MEM: Agentic Memory for LLM Agents", "note": "Explosive uptake: 5 citations in 2025 jumping to 64 in a partial 2026 -- one of the fastest-rising agentic-memory architecture papers in the set.", "per_year": [{"year": 2025, "citations": 5}, {"year": 2026, "citations": 64}]}, {"bibcode": "2025arXiv250419413C", "title": "Mem0: Building Production-Ready AI Agents with Scalable Long-Term Memory", "note": "No citations in 2025 (released mid-2025) but 78 in the first ~5 months of 2026 -- the single highest single-year keystone count in the set, signalling that production-memory systems became the 2026 frontier. (Note: search reports its cumulative citation_count as 0, inconsistent with the 78 from citation-per-year traversal; the per-year edge count is the more granular signal.)", "per_year": [{"year": 2026, "citations": 78}]}, {"bibcode": "2025arXiv250113956R", "title": "Zep: A Temporal Knowledge Graph Architecture for Agent Memory", "note": "Citations only register in 2026 (33), reflecting a 2025 release and the temporal-knowledge-graph approach gaining traction as a MemGPT successor. Explicitly benchmarks against MemGPT on Deep Memory Retrieval.", "per_year": [{"year": 2026, "citations": 33}]}, {"bibcode": "2023arXiv230902427S", "title": "Cognitive Architectures for Language Agents (CoALA)", "note": "Classic boom-bust-of-attention curve: 23 (2023) -> 110 (2024 peak) -> 20 (2025) -> 7 (partial 2026). The conceptual scaffolding year; citations migrate toward concrete systems/benchmarks as the field operationalizes.", "per_year": [{"year": 2023, "citations": 23}, {"year": 2024, "citations": 110}, {"year": 2025, "citations": 20}, {"year": 2026, "citations": 7}]}, {"bibcode": "2023arXiv230311366S", "title": "Reflexion: Language Agents with Verbal Reinforcement Learning", "note": "Foundational high-impact paper. 193 (2023) -> 256 (2024 peak) -> 71 (2025) -> 64 (partial 2026). The 3 citations logged in 2022 are pre-publication cross-references (preprint timing artifact). Episodic self-reflection memory as a precursor to dedicated memory systems.", "per_year": [{"year": 2022, "citations": 3}, {"year": 2023, "citations": 193}, {"year": 2024, "citations": 256}, {"year": 2025, "citations": 71}, {"year": 2026, "citations": 64}]}, {"bibcode": "2023arXiv230516291W", "title": "Voyager: An Open-Ended Embodied Agent with LLMs", "note": "Highest-cited keystone in the set: 1 (2022, preprint artifact) -> 175 (2023) -> 402 (2024 peak) -> 101 (2025) -> 90 (partial 2026). Introduced a lifelong skill-library memory; defined the embodied lifelong-learning frontier early.", "per_year": [{"year": 2022, "citations": 1}, {"year": 2023, "citations": 175}, {"year": 2024, "citations": 402}, {"year": 2025, "citations": 101}, {"year": 2026, "citations": 90}]}], "benchmark_progression": ["2023 -- COGNITIVE ARCHITECTURE & SELF-REFLECTION FRONTIER: no dedicated memory benchmark yet; the frontier is defined by agent frameworks that improvise memory. Reflexion (2023arXiv230311366S, verbal RL / episodic self-reflection), Voyager (2023arXiv230516291W, lifelong skill library as memory), CoALA (2023arXiv230902427S, a taxonomy of working/episodic/semantic/procedural memory), and MemGPT (2023arXiv231008560P, memory-as-OS / context paging). Evaluation is task success on agent benchmarks, not memory-specific.", "2024 -- DEDICATED CONVERSATIONAL-MEMORY BENCHMARKS ARRIVE: LoCoMo (2024arXiv240217753M) establishes very-long-term multi-session conversational memory as a measurable task, and LongMemEval (2024arXiv241010813W) adds a structured long-term interactive-memory evaluation. Structural-memory ablations (2024arXiv241215266Z: chunks vs triples vs atomic facts vs summaries) and embodied long/short-term memory (KARMA, 2024arXiv240914908W) define the frontier. The question shifts from 'can agents act' to 'can agents remember correctly across sessions'.", "2025 -- PRODUCTION MEMORY ARCHITECTURES vs THE 2024 BENCHMARKS: the frontier becomes building deployable memory layers measured against LoCoMo/LongMemEval. A-MEM (2025arXiv250212110X, agentic self-organizing memory), Mem0 (2025arXiv250419413C, production-ready scalable long-term memory), and Zep (2025arXiv250113956R, temporal knowledge-graph memory, explicitly beating MemGPT on Deep Memory Retrieval) define it, with position papers (Episodic Memory is the Missing Piece, 2025arXiv250206975P) and lifelong-learning roadmaps framing the agenda.", "2026 -- STRESS-TESTING, GOVERNANCE & SELF-EVOLVING MEMORY: the frontier moves to diagnostic/adversarial benchmarks and reliability. MemConflict (2026arXiv260520926T, memory-conflict resolution), EvoMemBench (2026arXiv260518421W, self-evolving memory), MemGround (2026arXiv260414158D, gamified long-term memory), and STALE (2026arXiv260506527C, memory-validity / staleness). In parallel, memory becomes an attack surface (Hijacking Agent Memory, 2026arXiv260529960W; provenance-role-collapse mitigation, 2026arXiv260525869J) and architectures specialize (graph/hierarchical: GAM 2026arXiv260412285W, SAGE 2026arXiv260512061W; efficiency: DimMem 2026arXiv260515759Q, delta-mem 2026arXiv260512357L)."], "narrative": "Agentic-memory research went from effectively nonexistent in 2022 to the dominant single-year topic bucket by 2026. In the SciX 129-paper topical working set assembled for 'long-term memory systems for LLM agents', the per-year distribution runs 2022:6 (almost entirely off-topic citation-expansion noise -- the modern framing did not yet exist), 2023:31, 2024:33, 2025:20, and 2026:39 -- the largest bucket despite the year being only ~5 months old as of 2026-06-02. The apparent 2025 dip to 20 is a sampling artifact rather than a real decline: lit_review's seeds are citation-anchored, so heavily-cited 2023-24 papers crowd the expansion, and most 2025-26 papers carry citation_count of 0/null simply because they are too recent to have accrued edges. The raw hybrid-search ranking, by contrast, is overwhelmingly 2026 papers (DimMem, ElasticMem, GAM, MemConflict, MemGround, SAGE, APEX-MEM, etc.), confirming the acceleration is real and steepening.\",\n"}, "branch_labels": {"procedural-skills": "Procedural & Skills", "reflection-experience": "Reflection & Experience", "benchmarks-catalog": "Benchmarks", "eval-methodology": "Eval Methodology", "synthetic-data": "Synthetic Data", "architectures": "Architectures", "security-governance": "Security & Governance", "applications-personalization": "Applications & Personalization", "forgetting": "Forgetting & Consolidation"}}</script>
<script>
const D = JSON.parse(document.getElementById('data').textContent);
const byBc = {}; D.papers.forEach(p=>byBc[p.bibcode]=p);
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const adsurl = bc => 'https://ui.adsabs.harvard.edu/abs/'+encodeURIComponent(bc);
const axurl = p => p.arxiv ? 'https://arxiv.org/abs/'+p.arxiv : null;

// nav
const NAV = [
  {k:'__home',l:'Overview'},
  {grp:'Explore'},
  {k:'__all',l:'All papers'},
  {k:'__reading',l:'★ Reading path'},
  {k:'__opps',l:'★ Opportunities'},
  {k:'__design',l:'Design deep-dives'},
  {k:'__timeline',l:'Timeline'},
  {grp:'Themes'},
  ...D.sections.map(s=>({k:s.key,l:s.label,n:s.papers.length})),
];
let active='__home', q='', fyear='', fbranch='', fsort='rel';

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(it=>{
    if(it.grp){const d=document.createElement('div');d.className='grouphdr';d.textContent=it.grp;nav.appendChild(d);return;}
    const b=document.createElement('button');b.dataset.k=it.k;
    b.innerHTML=esc(it.l)+(it.n!=null?`<span class="count">${it.n}</span>`:'');
    if(it.k===active)b.classList.add('active');
    b.onclick=()=>{active=it.k;render();};
    nav.appendChild(b);
  });
}
// year + branch filter options
(function(){
  const ys=[...new Set(D.papers.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const fy=document.getElementById('fyear'); ys.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;fy.appendChild(o);});
  const fb=document.getElementById('fbranch');
  Object.entries(D.branch_labels).forEach(([k,l])=>{const o=document.createElement('option');o.value=k;o.textContent=l;fb.appendChild(o);});
})();
document.getElementById('q').oninput=e=>{q=e.target.value.toLowerCase();render();};
document.getElementById('fyear').onchange=e=>{fyear=e.target.value;render();};
document.getElementById('fbranch').onchange=e=>{fbranch=e.target.value;render();};
document.getElementById('fsort').onchange=e=>{fsort=e.target.value;render();};

function hl(t){ if(!q)return esc(t); const i=(t||'').toLowerCase().indexOf(q); if(i<0)return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length)); }

function paperMatches(p){
  if(fyear && String(p.year)!==fyear) return false;
  if(fbranch && !p.branches.includes(fbranch)) return false;
  if(q){ const hay=(p.title+' '+p.first_author+' '+p.bibcode+' '+p.notes.map(n=>n.k+' '+n.r).join(' ')).toLowerCase();
    if(!hay.includes(q)) return false; }
  return true;
}
function sortPapers(arr){
  const a=[...arr];
  if(fsort==='cit') a.sort((x,y)=>(y.citation_count||0)-(x.citation_count||0));
  else if(fsort==='year') a.sort((x,y)=>(y.year||0)-(x.year||0));
  else if(fsort==='title') a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  return a;
}
function cardHTML(p){
  const ax=axurl(p);
  const chips=p.branches.map(b=>`<span class="chip b">${esc(D.branch_labels[b]||b)}</span>`).join('');
  const cit=(p.citation_count!=null)?`<span class="cit">${p.citation_count} cites</span>`:'';
  const rk=p.reading_rank?`<span class="rank">★ read #${p.reading_rank}</span>`:'';
  const notes=p.notes.map(n=>`
     <div class="lbl">${esc(D.branch_labels[n.branch]||n.branch)} &middot; contribution</div><p>${hl(n.k)}</p>
     ${n.r?`<div class="lbl">why it matters for the role</div><p>${hl(n.r)}</p>`:''}`).join('');
  return `<div class="card ${p.reading_rank?'read':''}" data-bc="${esc(p.bibcode)}">
    <div class="ttl">${hl(p.title||p.bibcode)}</div>
    <div class="meta">${rk}<span>${esc(p.first_author||'')}${p.year?', '+p.year:''}</span>${cit}<code class="bc-code">${esc(p.bibcode)}</code>${chips}</div>
    <div class="body">${notes}
      <div class="links"><a href="${adsurl(p.bibcode)}" target="_blank">ADS &#8599;</a>${ax?`<a href="${ax}" target="_blank">arXiv &#8599;</a>`:''}</div>
    </div></div>`;
}
function wireCards(){
  document.querySelectorAll('.card').forEach(c=>c.onclick=e=>{
    if(e.target.tagName==='A')return; c.classList.toggle('open');});
}
function renderList(bcs){
  let arr = bcs ? bcs.map(b=>byBc[b]).filter(Boolean) : D.papers;
  arr = sortPapers(arr.filter(paperMatches));
  document.getElementById('resultcount').textContent = arr.length+' paper'+(arr.length!=1?'s':'');
  return arr.length? arr.map(cardHTML).join('') : '<div class="empty">No papers match.</div>';
}
function panel(cls,title,items){ if(!items||!items.length)return'';
  return `<div class="panel ${cls}"><h3>${esc(title)}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`; }

function showControls(on){document.getElementById('controls').style.display=on?'flex':'none';}

function render(){
  buildNav();
  const v=document.getElementById('view');
  if(active==='__home'){ showControls(false); v.innerHTML=homeHTML(); }
  else if(active==='__all'){ showControls(true); v.innerHTML='<h2 class="sectionhead">All papers</h2>'+renderList(null); wireCards(); }
  else if(active==='__reading'){ showControls(false); v.innerHTML=readingHTML(); wireCards(); }
  else if(active==='__opps'){ showControls(false); v.innerHTML=oppsHTML(); }
  else if(active==='__design'){ showControls(false); v.innerHTML=designHTML(); }
  else if(active==='__timeline'){ showControls(false); v.innerHTML=timelineHTML(); }
  else { showControls(true); const s=D.sections.find(x=>x.key===active);
    v.innerHTML=`<h2 class="sectionhead">${esc(s.label)}</h2><p class="subtopic">${esc(s.subtopic)}</p>`
      +panel('themes','Themes',s.themes)+panel('measured','How forgetting is measured (or not)',s.how_measured)
      +panel('gaps','Open gaps',s.gaps)+panel('notable','Notable results / metrics',s.notable)
      +'<h3 style="margin:16px 0 8px">Papers</h3>'+renderList(s.papers); wireCards(); }
  window.scrollTo(0,0);
}
function homeHTML(){
  const stats=`${D.papers.length} unique papers · ${D.sections.length} themes · ${D.reading.length}-paper reading path`;
  return `<h2 class="sectionhead">Overview</h2><p class="subtopic">${stats}</p>
  <div class="panel"><h3>What this is</h3><p class="val">A navigable map of the agentic-memory literature, assembled for ramp-up into a memory <b>evaluation</b> role: benchmark design, evaluation methodology, synthetic-data pipelines, and open-source harnesses across semantic, episodic, and procedural memory over multi-session trajectories. Built from the SciX MCP via a seed lit-review plus two fanned-out waves of parallel sub-agent research.</p>
  <p class="hint">Caveat: this field is dominated by 2026 zero-citation preprints, so every metric here is an author self-report. Citation-graph corroboration is unavailable for this topic in the corpus.</p></div>
  <div class="panel"><h3>Start here</h3><ul>
    <li><b>&#9733; Reading path.</b> The 13-paper onboarding order, grouped by role.</li>
    <li><b>&#9733; Opportunities.</b> Six prioritized white-space areas for the role.</li>
    <li><b>Design deep-dives.</b> Full-text task, data, and metric extraction of SkillEvolBench, TIAP, MemConflict.</li>
    <li><b>Timeline.</b> The 2023 to 2026 acceleration plus keystone citation trajectories.</li>
    <li><b>Themes</b> (left nav). Each carries its own themes, gaps, and notable-metrics panels.</li>
  </ul></div>
  <div class="panel themes"><h3>The field in one paragraph</h3><p class="val">2023 framed memory as cognitive architecture and self-reflection (CoALA, Reflexion, Voyager, MemGPT). 2024 made multi-session recall measurable (LoCoMo, LongMemEval). 2025 shipped production memory layers (A-MEM, Mem0, Zep) measured against those benchmarks. 2026 turned to stress-testing, governance, and self-evolving memory, and exposed that incumbent benchmarks are saturating, scoring is non-invariant, answer-accuracy diverges from retrieval-correctness, and forgetting is essentially unmeasured.</p></div>`;
}
function readingHTML(){
  let rows=D.reading.map((r,i)=>{const p=byBc[r[0]];
    return `<div class="readrow"><div class="rk">${i+1}</div><div class="grp">${esc(r[2])}</div>
      <div><a href="#" onclick="event.preventDefault();openOne('${r[0]}')"><b>${esc(r[1])}</b></a>
      <div class="hint">${esc(p?p.bibcode:r[0])}${p&&p.citation_count!=null?' · '+p.citation_count+' cites':''} · <a href="${adsurl(r[0])}" target="_blank">ADS</a>${p&&p.arxiv?` · <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv</a>`:''}</div></div></div>`;
  }).join('');
  return `<h2 class="sectionhead">&#9733; Reading path</h2><p class="subtopic">Thirteen papers to get current fast, grouped by role. Click a title to expand its card inline.</p>${rows}
  <div id="oneview" style="margin-top:16px"></div>`;
}
function openOne(bc){const p=byBc[bc];const o=document.getElementById('oneview');
  if(!p){o.innerHTML='<div class="empty">Not in the extracted set. Open it via the ADS link above.</div>';return;}
  o.innerHTML=cardHTML(p);o.querySelector('.card').classList.add('open');wireCards();o.scrollIntoView({behavior:'smooth'});}
function oppsHTML(){
  return `<h2 class="sectionhead">&#9733; Prioritized opportunities</h2><p class="subtopic">White-space mapped to the role, ranked by leverage.</p>`
   +D.opportunities.map((o,i)=>`<div class="op"><div class="rk">${i+1}</div><div><div class="n">${esc(o[0])}</div><div class="val">${esc(o[1])}</div></div></div>`).join('');
}
function designHTML(){
  let out=`<h2 class="sectionhead">Design deep-dives</h2><p class="subtopic">Full-text extraction of the three keystone papers: exact task schemas, data-generation recipes, and metrics a harness-builder can reuse.</p>`;
  D.design.forEach(p=>{
    out+=`<div class="panel dd"><h3>${esc(p.title)}</h3><div class="bc">${esc(p.bibcode)} &middot; <a href="${adsurl(p.bibcode)}" target="_blank">ADS</a></div>
      <div class="field"><div class="lbl">Task design</div><div class="val">${esc(p.task_design)}</div></div>
      <div class="field"><div class="lbl">Data / trajectory generation</div><div class="val">${esc(p.data_generation)}</div></div>
      <div class="field"><div class="lbl">Metrics</div><div class="val">${esc(p.metrics)}</div></div>
      <div class="field"><div class="lbl">Key numbers</div><div class="kv-wrap">${(p.key_numbers||[]).map(k=>`<div class="kv">${esc(k)}</div>`).join('')}</div></div>
      <div class="field"><div class="lbl">Reusable for the role</div><div class="val">${esc(p.reusable_for_role)}</div></div></div>`;
  });
  out+=panel('themes','Cross-cutting design principles',D.design_principles);
  out+=panel('gaps','Pitfalls to avoid',D.design_pitfalls);
  return out;
}
function timelineHTML(){
  const pv=D.temporal.publication_volume; const mx=Math.max(...pv.map(x=>x.count||0));
  const bars=pv.map(x=>`<div class="bar"><div class="n">${x.count}</div><div class="col" style="height:${Math.round((x.count/mx)*100)}%"></div><div class="yr">${x.year}</div></div>`).join('');
  const notes=pv.map(x=>x.note?`<li><b>${x.year}:</b> ${esc(x.note)}</li>`:'').join('');
  const yrs=[2023,2024,2025,2026];
  const trows=D.temporal.citation_trajectories.map(c=>{
    const m={}; (c.per_year||[]).forEach(p=>m[p.year]=p.citations);
    const peak=Math.max(...Object.values(m).map(Number).filter(n=>!isNaN(n)),0);
    const cells=yrs.map(y=>{const v=m[y]; return `<td class="num ${v===peak&&v?'peak':''}">${v!=null?v:'&ndash;'}</td>`;}).join('');
    return `<tr><td><a href="${adsurl(c.bibcode)}" target="_blank">${esc(c.title)}</a></td>${cells}</tr>`;
  }).join('');
  const prog=D.temporal.benchmark_progression.map(s=>`<li>${esc(s)}</li>`).join('');
  return `<h2 class="sectionhead">Timeline: the 2023 to 2026 acceleration</h2>
  <div class="panel"><h3>Publication volume (topical working set)</h3><div class="bars">${bars}</div>
    <ul class="hint" style="margin-top:10px">${notes}</ul></div>
  <div class="panel"><h3>Keystone citation trajectories (citations per year)</h3>
    <div class="traj"><table><tr><th>Paper</th>${yrs.map(y=>`<th class="num">${y}${y===2026?'*':''}</th>`).join('')}</tr>${trows}</table></div>
    <p class="hint" style="margin-top:10px">* 2026 is a partial year (about 5 months). Green marks the peak year. Per-year edge counts from the citation graph.</p></div>
  <div class="panel notable"><h3>Benchmark frontier by year</h3><ul>${prog}</ul></div>
  <div class="panel"><h3>Narrative</h3><p class="narr">${esc(D.temporal.narrative)}</p></div>`;
}
// theme toggle (light is the reading-optimized default; choice persists)
const TKEY='amm-theme';
function setTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem(TKEY,t);}catch(e){}
  const b=document.getElementById('themebtn');if(b)b.innerHTML=(t==='dark'?'☀ Light':'☾ Dark');}
setTheme((()=>{try{return localStorage.getItem(TKEY)||'light';}catch(e){return 'light';}})());
document.getElementById('themebtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
// '/' focuses search when the box is visible
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){const el=document.getElementById('q');
    if(el&&el.offsetParent!==null){e.preventDefault();el.focus();el.select();}}
  if(e.key==='Escape'&&document.activeElement.id==='q'){q='';document.getElementById('q').value='';render();}
});
render();
</script>
</body></html>
