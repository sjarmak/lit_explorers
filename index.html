<script id="data" type="application/json">{"papers": [{"bibcode": "2026arXiv260524117L", "title": "SkillEvolBench: Benchmarking the Evolution from Episodic Experience to Procedural Skills", "first_author": "Lei, Yingtie", "year": 2026, "citation_count": 0, "branches": ["procedural-skills", "eval-methodology"], "notes": [{"branch": "procedural-skills", "k": "A diagnostic benchmark of 180 tasks across six real-world agent environments, organized into role-conditioned task families with shared latent procedures, that separates procedural-skill formation from base capability by contrasting self-generated and curated skill evolution against no-skill and raw-trajectory controls on frozen deployment tasks (context shift, adversarial shortcuts, composition).", "r": "This is the single most on-target paper for the role: it is purpose-built as a procedural-memory eval harness with an explicit acquisition-then-frozen-deployment split, ablation controls, and capacity/cost axes - exactly the benchmark-task + methodology design problem the hire owns. Its finding that raw-trajectory reuse often beats distilled skills is a direct methodological warning for synthetic skill-induction pipelines."}, {"branch": "eval-methodology", "k": "180 tasks total = 6 real-world agent environments x 5 task families per environment x 6 role-conditioned tasks per family. The 6 environments cover: code modification, API orchestration, data processing, document transformation, research synthesis, and communication operations. A 'task family' denotes a recurring PROCEDURAL capability (shared latent procedure), not a topic label. Within each family there is a fixed 6-ROLE progression split into two phases: ACQUISITION (skill-formation, library updates allowed) = {canonical (presents base procedure), enriched (exposes a missing sub-capability), variant (changes surface form, same procedure)}; DEPLOYMENT (frozen library, no updates) = {context-shift (skill need embedded in a broader request -> tests implicit invocation), adversarial (introduces shortcut solutions that pass shallow checks -> tests shortcut resistance), composition (target skill must interact with other skills)}. Each task ships with: an instruction + fixture, a verification suite (public tests for basic contract, hidden tests for edge cases/distribution shift, and process verifiers that inspect traces/artifacts for brittle strategies: hard-coded constants, swallowed exceptions, skipped validation, incomplete repairs), and a scoring rubric. Skill conditions compared: No-Skill control, Raw-Trajectory control (reuse episodic traces directly), Zero-Shot (metadata-only skill written before execution, never revised), Self-Generated/Experience-based (start empty, induce skill only after canonical attempt + verifier feedback), and Curated-Start (gap-exposed curated seed). Curated/self variants have static vs Revision vs +Always(-update) update policies.", "r": "Directly reusable scaffolding for a memory-eval harness: (1) the 6-role acquisition->deployment arc is a ready template for separating memory WRITE/consolidation from frozen READ/transfer; (2) the FREEZE-then-deploy protocol cleanly isolates whether memory was actually formed vs test-time repair; (3) the No-Skill / Raw-Trajectory / distilled-skill control set is a reusable ablation design to attribute gains to abstraction vs raw reuse vs base capability; (4) verification suite design (public + hidden + PROCESS verifiers flagging brittle strategies) maps onto white-box memory-quality checks; (5) SR/LSR/RSR/ESR decomposition (esp. CSSR/ARSR/CompSR) is a reusable metric taxonomy; (6) host-side Skill-Author call separated from the solving agent is a clean orchestration pattern for a memory-writer component."}], "arxiv": "2605.24117", "reading_rank": 9}, {"bibcode": "2023arXiv230516291W", "title": "Voyager: An Open-Ended Embodied Agent with Large Language Models", "first_author": "Wang, Guanzhi", "year": 2023, "citation_count": 690, "branches": ["procedural-skills"], "notes": [{"branch": "procedural-skills", "k": "Introduces the canonical ever-growing skill library of executable code stored/retrieved as compositional behaviors, combined with an automatic curriculum and iterative self-verification prompting, enabling skill transfer to a fresh Minecraft world.", "r": "The foundational reference design for procedural memory as a code-skill library; any benchmark harness for skill reuse must instrument the store/retrieve/compose loop Voyager defined, and its cross-world skill-transfer test is a template for cross-environment procedural-generalization eval tasks."}], "arxiv": "2305.16291", "reading_rank": 7}, {"bibcode": "2024arXiv240907429Z", "title": "Agent Workflow Memory", "first_author": "Zhiruo Wang, Zora", "year": 2024, "citation_count": 35, "branches": ["procedural-skills", "reflection-experience", "benchmarks-catalog"], "notes": [{"branch": "procedural-skills", "k": "Induces reusable, routine-level workflows from agent trajectories (offline from training examples or online from test queries) and injects them as procedural memory, with explicit cross-task / cross-website / cross-domain generalization evaluation on WebArena and Mind2Web.", "r": "AWM is the reference methodology for workflow-induction procedural memory and, critically, ships a generalization-gap evaluation protocol (widening train-test distribution gaps) that is directly reusable as a benchmark design pattern for measuring whether induced procedures transfer rather than overfit."}, {"branch": "reflection-experience", "k": "Induces reusable, transferable workflows (routines) from past agent trajectories and selectively injects them into memory to guide future generation, in both offline and online (test-time induction) settings.", "r": "Canonical procedural-memory induction work; its offline/online split and web-navigation success-rate deltas (Mind2Web, WebArena) are a directly reusable protocol for benchmarking whether abstracted procedural memory transfers across trajectories."}, {"branch": "benchmarks-catalog", "k": "Introduces Agent Workflow Memory, inducing reusable workflows from past trajectories to improve long-horizon web-navigation agents, evaluated on agent-trajectory benchmarks (e.g. web tasks) rather than conversational QA.", "r": "Anchors the procedural / agent-trajectory memory benchmark family (skill/workflow reuse on long-horizon task suites), distinct from conversational recall and central to the procedural-memory eval dimension."}], "arxiv": "2409.07429", "reading_rank": 8}, {"bibcode": "2026arXiv260408988J", "title": "SEA-Eval: A Benchmark for Evaluating Self-Evolving Agents Beyond Episodic Assessment", "first_author": "Jiang, Sihang", "year": 2026, "citation_count": 0, "branches": ["procedural-skills", "forgetting"], "notes": [{"branch": "procedural-skills", "k": "A benchmark explicitly targeting self-evolving agents that breaks from single-episode scoring to assess accumulation and reuse of tools/skills across tasks, addressing static-toolset and episodic-amnesia failure modes.", "r": "Directly addresses the evaluation-methodology gap the role centers on: how to score procedural/skill accumulation across a trajectory rather than per-episode. A primary prior-art harness to study, extend, or differentiate against when building NVIDIA's memory eval suite."}, {"branch": "forgetting", "k": "Benchmark moving beyond episodic task scoring to evaluate self-evolving agents across time, targeting 'episodic amnesia' and static-toolset limits.", "r": "One of the few protocols explicitly evaluating accumulation vs forgetting in self-evolving agents over multiple episodes."}], "arxiv": "2604.08988", "reading_rank": null}, {"bibcode": "2026arXiv260530621L", "title": "Harness Updating Is Not Harness Benefit: Disentangling Evolution Capabilities in Self-Evolving LLM Agents", "first_author": "Lin, Minhua", "year": 2026, "citation_count": 0, "branches": ["procedural-skills"], "notes": [{"branch": "procedural-skills", "k": "Argues that the act of updating an editable harness (prompts, skills, memories, tools) is routinely conflated with genuine benefit, and provides a methodology to disentangle whether harness/skill evolution actually improves task outcomes versus merely changing them.", "r": "A methodological keystone for the role: it names the exact confound a procedural-memory benchmark must control for (update activity != capability gain) and motivates controlled, attribution-style eval design - essential for credible skill-library benchmarks."}], "arxiv": "2605.30621", "reading_rank": 12}, {"bibcode": "2026arXiv260506130S", "title": "Skill1: Unified Evolution of Skill-Augmented Agents via Reinforcement Learning", "first_author": "Shi, Yaorui", "year": 2026, "citation_count": 0, "branches": ["procedural-skills"], "notes": [{"branch": "procedural-skills", "k": "Trains a single RL policy to co-evolve the three coupled operations of a persistent skill library - skill selection, utilization, and distillation - toward a shared task-outcome objective, showing distillation controls library quality and growth rate while activating a broader high-frequency skill set.", "r": "Operationalizes the library-maintenance loop (select/use/distill) that any procedural-memory harness must measure, and supplies concrete cost/library-size diagnostics (skill-cap saturation, growth-rate multipliers) that are reusable as benchmark instrumentation for library health."}], "arxiv": "2605.06130", "reading_rank": null}, {"bibcode": "2026arXiv260408377M", "title": "SkillClaw: Let Skills Evolve Collectively with Agentic Evolver", "first_author": "Ma, Ziyu", "year": 2026, "citation_count": 0, "branches": ["procedural-skills", "reflection-experience"], "notes": [{"branch": "procedural-skills", "k": "Replaces static post-deployment skills (as used by OpenClaw-style agents) with an agentic evolver that lets a population of reusable skills evolve collectively rather than independently.", "r": "The named  Benchmarks (TIAP)", "first_author": "", "year": 2026, "citation_count": null, "branches": ["eval-methodology"], "notes": [{"branch": "eval-methodology", "k": "Not a task benchmark \u2014 a FIXED-OUTPUT AUDIT (TIAP) over already-saved ranked retrieval traces. The audited object is the 'scoring target': the set of stored memory IDs eligible to receive retrieval credit for a query when one source turn has spawned multiple derived memories in the same index. Three targets are defined formally for a fixed source anchor s(q) and store S: Raw T_raw(q,S) = {m in I(S): l_S(m)=s(q) AND raw_S(m)} (only the exact raw source turn); Source T_src(q,S) = {m: l_S(m)=s(q)} (any descendant linked to the same source evidence); Canonical T_can(q,S) = {m: l_S(m)=s(q) AND can_S(m)} (transformed non-raw serving memories). By construction T_raw and T_can are subsets of T_src and are typically DISJOINT from each other. The rules a store uses to assign lineage (l_S, raw_S, can_S) are its 'lineage contract'. Three-stage method: Stage I construct Raw/Source/Canonical targets per query+store; Stage II FIXED-OUTPUT RESCORING \u2014 rescore the SAME saved top-k ranked traces under each target without rerunning retrieval; Stage III target-sensitivity analysis + semantic audit. Outputs tracked in Stage III: score shifts, query-level hit-status changes, WINNER FLIPS (sign of Delta_t(A,B)=M_t(A)-M_t(B) changes as target t varies), and DESIGN-RECOMMENDATION changes (which store config looks best). Includes a SHARED-QUERY-SUBSET control: a query is included only when all compared targets have >=1 eligible stored ID, so score changes reflect the credited target set, not query difficulty.", "r": "Critical methodological guardrail for a memory-eval harness: (1) ALWAYS define and report the scoring target (Raw vs Source vs Canonical) explicitly \u2014 credit assignment when one source spawns derived memories is a benchmark-design choice that silently flips rankings; (2) the fixed-output RESCORING pattern lets you re-grade saved traces under multiple credit policies without re-running retrieval \u2014 cheap and reproducible; (3) the SHARED-QUERY-SUBSET control prevents confounding target choice with query difficulty; (4) keep gold/evidence labels OUT of the memory-writer to prevent leakage; (5) k=60 with documented recall-plateau justification is a reusable retrieval-depth default; (6) the winner-flip / Delta_t(A,B) sign-change test is a reusable robustness check; (7) the 5-model-majority semantic audit (validated against a human-labeled stratified subset, Fleiss kappa reported) is a reusable LLM-judge calibration recipe; (8) ship a reproducibility layer (target mappings + fixtures + rescoring utils) like MTEL-Mem."}], "arxiv": "2605.24060", "reading_rank": 10}, {"bibcode": "2026arXiv260520926T", "title": "MemConflict: Evaluating Long-Term Memory Systems Under Memory Conflicts", "first_author": "", "year": 2026, "citation_count": null, "branches": ["eval-methodology"], "notes": [{"branch": "eval-methodology", "k": "Diagnostic framework treating memory validity as a query-conditioned FITNESS-FOR-USE problem along 3 dimensions: temporal validity, factual correctness, contextual applicability. These map to 3 CONFLICT TYPES: (1) DYNAMIC conflict \u2014 earlier and later states coexist; a later TRUE update should supersede the earlier state (tests temporal validity, over dynamic state attributes). (2) STATIC conflict \u2014 a later FALSE contradictory mention should NOT overwrite a stable invariant fact (tests factual correctness, over invariant attributes). (3) CONDITIONAL conflict \u2014 multiple values are each valid under different conditions; only the condition matching the query applies (tests contextual applicability, over conditional-preference attributes). Formalized as validity determination: given query q_t issued right after session s_t and history prefix H_t, return v*(alpha,q_t|H_t) = argmax over candidates of F(v|alpha,H_t,q_t); construction guarantees a unique maximizer. Each query is anchored to the history PREFIX at query time (not the full history). Query forms per type: static query issued after the contradictory mention asks for the true invariant value; dynamic query issued after a true update asks for the temporally valid value at query time; conditional query gives a preference VALUE and asks for the CONDITION under which it applies (gold = the condition c_l). Two-level evaluation protocol: BLACK-BOX (final answer) + WHITE-BOX (whether the gold supporting memory item is retrieved and how it is ranked). Evaluated on 6 memory systems: A-Mem, LangMem, Letta, MemOS, Mem0, Memobase, all wired into a common query/answer-normalization/white-box retrieval pipeline. Controlled factors swept: retrieval depth K in {2,3,5} (main K=3), dialogue length (medium/long), distractor on/off, query formulation (direct vs implicit), conflict distance (number of intervening sessions).", "r": "Highly reusable as the conflict-aware core of a memory-eval harness: (1) the dynamic/static/conditional conflict taxonomy (true-update-supersedes vs false-contradiction-must-not-overwrite vs condition-specific-applicability) is a directly portable test-case generator spec; (2) persona-seed -> structured-profile -> timeline-simulation -> conflict-injection -> distractor-injection -> two-stage dialogue (synopsis then realization) -> evaluable-query pipeline is a complete reusable synthesis recipe, with explicit constraint machinery (feasibility/cooldown/persona-consistency, validation rule V_d, isolation by not-re-mentioning between conflict endpoints); (3) the unique-maximizer query-conditioned gold (argmax F over candidates at the history prefix) is a clean labeling formalism; (4) the black-box + white-box split with metric set AA / SEH@K / SRS / UOCS / CRS and macro-averaging across types is a ready metric suite; (5) the SEH@K-vs-SRS gap and CRS-vs-AA divergence are reusable failure-localization diagnostics (missing memory vs low-ranked memory vs ineffective use); (6) controlled-factor sweep design (retrieval depth, dialogue length, distractor on/off, direct vs implicit query, conflict distance) is a reusable stress-test matrix; (7) related-entity distractor injection that leaves the answer unchanged is a reusable hard-negative design."}], "arxiv": "2605.20926", "reading_rank": 11}, {"bibcode": "2026arXiv260506716L", "title": "From Storage to Experience: A Survey on the Evolution of LLM Agent Memory Mechanisms", "first_author": "Luo, Jinghao", "year": 2026, "citation_count": 0, "branches": ["applications-personalization", "reflection-experience"], "notes": [{"branch": "applications-personalization", "k": "Surveys the shift from passive storage to experience-centric memory across LLM-agent applications, organizing mechanisms by how memory is written, reused, and evolved.", "r": "Application-taxonomy anchor that maps which memory mechanisms are used in which deployment domains; useful scaffolding for organizing benchmark coverage across application areas."}, {"branch": "reflection-experience", "k": "Formalizes memory evolution into three stages \u2014 Storage (trajectory preservation) \u2192 Reflection (trajectory refinement) \u2192 Experience (trajectory abstraction) \u2014 and names the field's split between OS-engineering and cognitive-science framings.", "r": "The maturity axis a benchmark task can be mapped onto; the single best orientation document for what capability a given task probes."}], "arxiv": "2605.06716", "reading_rank": 2}, {"bibcode": "2023arXiv230902427S", "title": "Cognitive Architectures for Language Agents (CoALA)", "first_author": "Sumers, Theodore R.", "year": 2023, "citation_count": 154, "branches": ["reflection-experience"], "notes": [{"branch": "reflection-experience", "k": "Imports the cognitive-science memory taxonomy (working / episodic / semantic / procedural) into LLM agents: modular memory components, a structured action space over internal memory + external environment, and a generalized decision loop.", "r": "The reference vocabulary a memory benchmark tests against; its taxonomy is the basis for per-memory-type probes rather than one aggregate recall score."}], "arxiv": "2309.02427", "reading_rank": 1}, {"bibcode": "2025arXiv250419413C", "title": "Mem0: Building Production-Ready AI Agents with Scalable Long-Term Memory", "first_author": "Chhikara, Prateek", "year": 2025, "citation_count": 0, "branches": ["architectures"], "notes": [{"branch": "architectures", "k": "Production fact-extraction + consolidation memory layer that beats the fixed context window; reports on LoCoMo a 26% relative LLM-judge improvement over OpenAI memory, 91% lower p95 latency, >90% token savings vs full-context.", "r": "The de facto production baseline nearly every 2026 memory system reports against; a mandatory comparison point for any harness."}], "arxiv": "2504.19413", "reading_rank": 6}], "sections": [{"key": "procedural-skills", "label": "Procedural & Skills", "subtopic": "Procedural Memory & Skill Libraries for LLM Agents (Voyager-style skill libraries, agent workflow memory, skill induction/evolution, case-based procedural reuse for coding/tool-use/GUI agents)", "themes": ["Two representations of procedural memory compete: executable code-skill libraries (Voyager, SkillClaw, Skill1, SkillDroid) versus natural-language workflows/manuals/rules (Agent Workflow Memory, AutoManual). Benchmarks must evaluate both, and they differ in how they fail (compilation/composition errors vs ambiguous-instruction drift).", "The field is shifting from episodic, single-task scoring toward longitudinal evaluation of accumulation and reuse across trajectories (SEA-Eval, SkillEvolBench, AWM's widening train-test-gap protocol). The acquisition-then-frozen-deployment split is emerging as the standard methodological pattern.", "Library maintenance is itself the hard problem: selection, utilization, and distillation must be co-managed or the library accrues episode-specific drift, clutter, and cap saturation (Skill1, SkillEvolBench, MUSE-Autoskill). Library health (size, growth rate, high-frequency-skill coverage) is becoming a measured quantity, not just a side effect.", "A credibility crisis around attribution: updating a skill/harness is routinely conflated with benefiting from it (Harness Updating Is Not Harness Benefit), and raw-trajectory reuse frequently beats distilled skills (SkillEvolBench). Controlled, ablated eval design is required to attribute gains to procedural memory rather than to base capability or mere activity.", "Generalization axes are proliferating beyond in-distribution reuse: cross-task, cross-website/domain (AWM), cross-domain transfer in coding agents (Memory Transfer Learning), and adversarial/compositional deployment shifts (SkillEvolBench). Procedural-memory benchmarks increasingly define explicit distribution-shift conditions.", "Reuse value is multi-objective: success rate plus inference/compute cost (SkillDroid's compile-once reuse, Skill1's wall-clock and library-size analyses, ClawTrace's per-step cost tracing). Efficiency is becoming a co-equal eval metric alongside task success."], "gaps": ["No standardized, shared procedural-memory benchmark with frozen held-out deployment splits is established - SkillEvolBench and SEA-Eval are brand-new (2026, ~0 citations) and not yet consolidated; the role could define the canonical harness rather than adopt one.", "Attribution methodology is immature: most systems report only end-task success and conflate harness/skill updates with capability gains (per Harness Updating Is Not Harness Benefit). There is no widely adopted control protocol (no-skill, raw-trajectory, curated-prior baselines) for isolating procedural-memory contribution.", "Synthetic-data pipelines for procedural memory are nearly absent: role-conditioned task families with known shared latent procedures (SkillEvolBench builds 180 by hand) are not generated at scale, leaving no programmatic way to control procedure overlap, distractor skills, or compositional depth in eval sets.", "Library-health and anti-erosion metrics are ad hoc: drift, clutter, interference, and cap saturation are observed but not standardized into reusable diagnostics, so cross-system comparison of library quality is not possible.", "Procedural memory is benchmarked in silos (web nav, GUI, coding, embodied) with little cross-domain transfer evaluation; how a skill library acquired in one domain helps or harms in another (Memory Transfer Learning) lacks a multi-domain harness.", "The semantic/episodic/procedural memory split the role targets is rarely co-evaluated: procedural-skill benchmarks seldom test interaction with episodic recall or semantic facts within the same trajectory, so integrated multi-memory-type eval tasks are an open design space."], "notable": ["Agent Workflow Memory: +51.1% relative success rate on WebArena over the top published autonomous method (+12.0 absolute points over BrowserGym baseline), and outperforms human-expert-workflow-augmented SteP by 7.6% relative; +24.6% relative step-wise success on Mind2Web cross-task; online AWM surpasses baselines by 8.9 to 14.0 absolute points as the train-test task-distribution gap widens.", "Voyager: 3.3x more unique items, 2.3x longer distances traveled, and tech-tree milestones unlocked up to 15.3x faster than prior SOTA in Minecraft; learned skill library transfers to a fresh world where other methods fail to generalize.", "SkillEvolBench: 180 tasks across 6 real-world agent environments, evaluated over 10 model configurations and 3 agent harnesses; finding that raw-trajectory reuse frequently outperforms distilled skills, and that larger Tier-3 skill libraries improve coverage but introduce episode-specific drift and procedural clutter rather than robust reusable skills.", "Skill1: GRPO without a library runs ~290s/step on 8x H800 80GB GPUs; removing distillation grows the library at 2.4x the rate of Skill1, runs 69% slower by training step 60, and saturates a 5,000-skill cap far earlier; the SkillRL static-library baseline grows only from 60 to 83 skills, capping final performance; Skill1 activates nearly 2x as many high-frequency skills spanning a broader strategy space.", "DyLAN (adjacent context for skill/agent selection): up to +25.0% accuracy on specific MMLU subjects via team-optimization selection - illustrative of selection-stage gains relevant to skill-selection benchmarking."], "papers": ["2026arXiv260524117L", "2023arXiv230516291W", "2024arXiv240907429Z", "2026arXiv260408988J", "2026arXiv260530621L", "2026arXiv260506130S", "2026arXiv260408377M", "2026arXiv260514477X", "2026arXiv260527366L", "2024arXiv240516247C", "2026arXiv260414004K", "2026arXiv260407791F", "2026arXiv260507358Z", "2026arXiv260414872C"]}, {"key": "reflection-experience", "label": "Reflection & Experience", "subtopic": "Reflection & Experience-Stage Memory: self-evolving / reflective memory that improves an LLM agent's policy across trajectories (the Reflection -> Experience frontier)", "themes": ["Write-read decomposition of reflective memory: nearly every recent system splits memory into a prospective/write-side policy (what + how to store, via reflection or contrastive distillation) and a retrospective/read-side policy (retrieval refined by downstream utility), and the field is converging on evaluating these two stages independently (Reflective Memory Management, Learning How and What to Memorize, TSUBASA).", "From retrieved experience to generated/abstracted experience: the frontier is moving past raw trajectory retrieval toward cross-trajectory abstraction \u2014 clustering, contrastive analysis, hierarchical experience, workflow induction, and skill evolution \u2014 because retrieved raw episodes force the base LLM to re-adapt them (CLEAR, HiExp, Agent Workflow Memory, SkillClaw).", "Self-evolution couples memory with capability: the newest work jointly optimizes memory and policy/tool-graph/skill-library so accumulated experience compounds into expanded capability rather than just a growing text store (SEARL, Mem2Evolve, SkillClaw, Self-Learning Diagnostic Agent).", "Utility-driven, longitudinal metrics over surface-match: benchmarks are shifting to downstream-utility scoring and improvement-trajectory metrics across many sessions/cases instead of single-shot retrieval accuracy (BEHEMOTH's downstream-utility metric, Evo-MedAgent's beyond-one-shot framing).", "Parametric vs non-parametric consolidation as an explicit design axis: experience can be consolidated into per-user weights or into compacted context, and recent work treats this as a controlled comparison rather than an architectural assumption (Dennis consolidation-vs-compaction, TSUBASA context distillation, CLEAR's SFT+RL CAM)."], "gaps": ["No standardized harness isolates the *reflection-induced* gain from base-model improvement: papers report end-task deltas (e.g. CLEAR's AppWorld 72.62 -> 81.15) but there is no shared protocol that ablates write-side vs read-side reflection on the SAME multi-session trajectory, so cross-paper comparison of 'does memory improve the policy' is apples-to-oranges.", "Catastrophic forgetting and memory drift in self-evolving stores are under-measured: systems like SkillClaw and Mem2Evolve let skills/experience evolve continually, but almost none report whether earlier-acquired competence degrades as memory evolves \u2014 there is no negative-transfer or forgetting metric in the agentic-memory eval canon.", "Synthetic multi-session trajectory pipelines are bespoke per paper: BEHEMOTH repurposes 18 existing datasets and others hand-build dialogue/diagnosis streams, but there is no reusable generator for controllable, ground-truth-labeled multi-session experience streams with injected conflicts, distractors, and known-reusable sub-skills.", "Parametric vs non-parametric experience consolidation is compared only in isolated studies (Dennis) on small settings; the field lacks a benchmark that scores both consolidation modes under matched compute/token budgets across episodic, semantic, and procedural memory types.", "Most reported numbers come from zero-citation 2026 preprints with single-domain evaluations (medical, web, search); external validity and reproducibility of the experience-reuse gains across domains remain unestablished, and open-source harnesses (CLEAR is a notable exception) are rare."], "notable": ["CLEAR: AppWorld test-set task completion rate improved from 72.62% to 81.15%, and averaged WebShop reward from 0.68 to 0.74 over the baseline agent.", "BEHEMOTH/CluE: cluster-based self-evolving extraction yields +9.04% relative gain across heterogeneous tasks vs prior self-evolving prompt-optimization frameworks (which degrade under heterogeneous training distributions).", "Reflexion: verbal-RL with episodic reflection memory reported strong gains in its original sequential-trial protocol (HumanEval / ALFWorld / HotPotQA), establishing the cross-attempt-improvement evaluation template; 531 citations.", "Agent Workflow Memory: induces reusable workflows offline and online (test-time), improving web-navigation success on Mind2Web and WebArena; 35 citations.", "TSUBASA: surpasses memory-augmented baselines Mem0 and Memory-R1 on long-horizon personalization across the Qwen-3 4B-to-32B family while reducing token budget (Pareto improvement on quality vs efficiency).", "Corpus signal: this subtopic is dominated by 2026 preprints (lit_review working set = 58 papers; year distribution 8/2023, 19/2024, 22/2025, 9/2026 in the seed set) with citation_contexts coverage at 0/58 papers, so citation-graph tools return empty here \u2014 relevance must be judged from abstracts."], "papers": ["2023arXiv230311366S", "2024arXiv240907429Z", "2025arXiv250308026T", "2026arXiv260407487L", "2026arXiv260407791F", "2026arXiv260411610Y", "2026arXiv260407894Z", "2026arXiv260408124H", "2026arXiv260410923C", "2026arXiv260408377M", "2026arXiv260500702X", "2026arXiv260414475S", "2026arXiv260407269L", "2026arXiv260524657D"]}, {"key": "benchmarks-catalog", "label": "Benchmarks", "subtopic": "Benchmarks and datasets for long-term / multi-session / multi-turn agent memory (task types, dataset sizes, composition)", "themes": ["Task-type taxonomy is converging but uneven: single-hop / multi-hop recall, temporal reasoning, knowledge-update, and multi-session aggregation are well-covered (LoCoMo, LongMemEval), while abstention/adversarial-refusal, conflict-resolution, multi-party speaker attribution, and procedural/implicit memory are only just being added by 2026 benchmarks.", "Synthetic vs real-world data split: the dominant benchmarks (LoCoMo, LongMemEval) are LLM-synthesized via persona + event-graph pipelines, prompting a counter-movement toward genuinely human data (REALTALK 21-day) and topic-guided generation pipelines (AgenticAI-DialogGen) to control the synthetic distribution gap.", "Scenario expansion beyond dyadic Person-AI chat: 2026 benchmarks push into continuous lifelog/always-on wearable capture (LifeMem/EgoMem), multi-party group conversations (GroupMemBench), and multimodal interactions (MemLens, MemEye).", "Diagnostic and failure-mode evaluation is emerging as a complement to single-number accuracy: stress-testing failure modes (MemFail) and conflicting-memory diagnostic testbeds (Selective QA) measure where and how memory breaks rather than aggregate score.", "Procedural/agent-trajectory memory is a separate benchmark lineage from conversational recall: workflow induction over long-horizon web/task trajectories (Agent Workflow Memory) and implicit behavioral adaptation (ImplicitMemBench) target the procedural leg of the semantic/episodic/procedural triad."], "gaps": ["No unified harness spans the full task taxonomy: recall, temporal, knowledge-update, abstention, conflict-resolution, multi-party, procedural, and personalization each live in separate benchmarks with incompatible formats and metrics, so cross-system comparison is impossible.", "Abstention / hallucination-resistance (refusing questions about never-disclosed facts) is almost never reported despite being a first-class LongMemEval ability; most LoCoMo leaderboards omit it entirely, so adversarial 'unanswerable' splits are under-resourced.", "Procedural and implicit memory are barely benchmarked relative to semantic/episodic recall; ImplicitMemBench and Agent Workflow Memory are early and isolated, with no standard task suite for skill/workflow reuse across sessions.", "Dataset scale is small and possibly contaminated: LoCoMo has only 10 conversations / 1,813 questions, raising statistical-power and train-test-leakage concerns for systems now scoring >94%, yet scalable synthetic-generation pipelines that preserve answerability ground truth are immature.", "Real-world, multi-party, and multimodal/lifelog memory benchmarks are nascent (REALTALK, GroupMemBench, MemLens, MemEye, LifeMem) with no shared evaluation protocol, leaving open how to score speaker-attribution, visual-evidence retention, and ambient-capture recall consistently."], "notable": ["LoCoMo (ACL 2024 release) composition: 10 conversations, 1,813 questions; conversations span up to ~35 sessions; QA split into single-hop, multi-hop, temporal, and open-domain categories (per Maharana 2024 / Synthius-Mem 2026).", "Human performance on LoCoMo QA is reported at 87.9 F1 (per Synthius-Mem).", "Synthius-Mem reports 94.37% LoCoMo accuracy, 98.64% core-fact accuracy, 99.55% adversarial robustness, and 21.79 ms retrieval latency, ~5x token reduction vs full-context replay; cites MemMachine at 91.69% (adversarial not reported).", "APEX-MEM reports 88.88% on LoCoMo QA and 86.2% on LongMemEval.", "LongMemEval defines five evaluated abilities: information extraction, multi-session reasoning, temporal reasoning, knowledge updates, and abstention, over scalable controllable chat histories.", "Mem0 reports on LoCoMo a 26% relative LLM-as-a-Judge improvement over OpenAI's memory, 91% lower p95 latency, and >90% token-cost savings vs full-context.", "REALTALK provides 21 days of real human-human conversation; personalized-dialogue survey (Chen 2024) catalogs 22 datasets and 17 seminal works spanning 2021-2023."], "papers": ["2024arXiv240217753M", "2026arXiv260411563G", "2024arXiv241010813W", "2025arXiv250213270L", "2026arXiv260411182Z", "2026arXiv260514498Y", "2026arXiv260408064Q", "2026arXiv260526667G", "2026arXiv260530087Y", "2026arXiv260412179M", "2026arXiv260514906R", "2026arXiv260515128G", "2025arXiv250322458G", "2024arXiv240907429Z", "2024arXiv240517974C"]}, {"key": "eval-methodology", "label": "Eval Methodology", "subtopic": "Evaluation methodology and metrics for agentic memory systems: retrieval-aware vs answer-level scoring, white-box diagnostics, failure attribution, LLM-as-judge reliability, scoring-target sensitivity, statistical rigor, and reproducibility", "themes": ["Stage-decomposed / white-box diagnostics: a clear shift from answer-only scoring toward attributing memory failures to write, retrieve, evidence-construction, or generation stages (MemTrace, AuthTrace), enabling failure-attribution rather than a single pass/fail.", "Beyond factual recall as the scoring target: benchmarks increasingly distinguish shallow recall from strategic/procedural memory use and from temporal update-tracking (StratMem-Bench, Continuous Lifelog), making the choice of scoring target a first-class methodological variable.", "LLM-as-judge reliability and calibration for memory QA: judges carry position/verbosity/self-preference biases and fine-tuned judges fail to transfer, so memory-eval pipelines must validate judge-human agreement before trusting judge-based correctness (Gu, Li, Huang).", "Reproducibility and ecological validity: benchmark contamination/leakage, content drift, and the realism-reproducibility-scalability trilemma threaten the validity of memory-system comparisons and push toward leak-controlled synthetic trajectories (NumLeak, WebForge, AlphaEval).", "Richer-than-binary correctness metrics: graded support relations and groundedness taxonomies replace binary hallucination flags, changing how grounded memory answers are scored (Sarkar).", "Metric saturation on incumbent benchmarks: high reported LoCoMo numbers indicate single-benchmark accuracy is approaching ceiling, motivating harder, adversarial, and multi-axis memory evaluation (Synthius-Mem)."], "gaps": ["No standardized failure-attribution taxonomy or shared harness: MemTrace and AuthTrace each invent their own stage decomposition, with no common schema or open tooling to make per-stage memory diagnostics comparable across systems.", "Judge reliability is studied generically but almost never validated specifically for memory QA (temporal grounding, multi-session attribution, contradiction handling); calibration of LLM judges against human labels on memory-specific question types is largely unmeasured.", "Scant statistical rigor: memory-system comparisons report point accuracies (e.g. single LoCoMo numbers) without confidence intervals, seed/variance reporting, or significance testing across systems, so ranking stability is unknown.", "Contamination control for memory benchmarks is unaddressed: NumLeak-style leakage is documented for numeric benchmarks but no memory benchmark reports leak-controlled construction, conflating memorized recall with genuine retrieval-and-use.", "Evaluation conflates retrieval quality with answer quality: few harnesses jointly report retrieval-aware metrics (did the right memory get retrieved) and answer-level metrics, leaving the retrieve-vs-reason attribution to ad hoc analysis."], "notable": ["Synthius-Mem reports 94.4% memory accuracy and 99.6% adversarial robustness on LoCoMo, illustrating near-saturation of single-benchmark memory-accuracy metrics.", "Survey on LLM-as-a-Judge (Gu et al.) accrued ~106 citations; LLMs-as-Judges survey (Li et al.) ~41 and the fine-tuned-judge empirical study (Huang et al.) ~58, indicating judge-reliability methodology is the most-cited evaluation thread in this set.", "Huang et al. (2024) empirically establish that fine-tuned judge models are not a general substitute for GPT-4-class judges, quantifying cross-task transfer failure of cheap judges.", "WebForge frames agent benchmarking as a realism-reproducibility-scalability trilemma driven by content drift, a reproducibility failure mode that transfers directly to multi-session memory benchmarks.", "NumLeak demonstrates that public numeric benchmarks act as latent pretraining labels, so date-conditioned evaluation can measure memorized recall instead of out-of-sample generalization."], "papers": ["2026arXiv260528732D", "2026arXiv260411182Z", "2026arXiv260426243W", "2026arXiv260525382W", "2026arXiv260408082S", "2024arXiv240302839H", "2024arXiv241115594G", "2024arXiv241205579L", "2025arXiv250322458G", "2025arXiv250316416Y", "2026arXiv260412162L", "2026arXiv260411563G", "2026arXiv260410988Y", "2026arXiv260530393K"]}, {"key": "synthetic-data", "label": "Synthetic Data", "subtopic": "Synthetic data generation for agent/memory evaluation: profile-driven dialogue simulation, LLM user simulators, controllable conflict/distractor injection, persona generation, synthetic-vs-real distribution gaps, and data quality/diversity for agentic memory eval", "themes": ["Profile/graph-conditioned generation: synthetic dialogue is increasingly driven by structured persona or knowledge-graph inputs (AgenticAI-DialogGen, Graph2Counsel) so that memory facts, topic continuity, and clinical/behavioral reasoning are controllable rather than emergent.", "Controllable distractor, conflict, and noise injection: benchmarks deliberately inject distractors (UniToolCall Hybrid-20), realistic user noise (VeriSim), and adversarial-abstention queries (EngramaBench) to stress retrieval and memory under non-ideal conditions.", "Synthetic-vs-real distribution gap as a first-class measurement: OmniBehavior and REALTALK frame the central risk that LLM user simulators homogenize personas and lose long-tail behavior; data realism must be measured against real traces, not assumed.", "Generator auditing by data composition: rather than judging generators only by downstream scores, the Quality\u2013Diversity\u2013Complexity framework (Havrilla) measures the synthetic data itself, surfacing quality\u2013diversity trade-offs relevant to eval-set construction.", "Controlled, model-isolating eval protocols: memory benchmarks hold the answering model fixed and vary only the memory architecture (EngramaBench), and decompose scoring to fine-grained levels (UniToolCall call/turn/conversation) to attribute performance cleanly.", "User simulators as the trajectory engine: surveys of conversational user simulation and multi-turn agent evaluation (Ni; Guan) treat the LLM user as the driver of multi-session test trajectories, with the simulator's own fidelity being a separate evaluation problem."], "gaps": ["No standard quantitative fidelity metric ties synthetic memory-eval data back to real distributions; OmniBehavior names biases (persona homogenization, Utopian bias) but there is no agreed score for whether a synthetic multi-session memory set is realistic.", "Controllable conflict/contradiction injection for memory (the base review's MemConflict territory) is largely absent from the generation pipelines surveyed \u2014 distractor injection is well developed (UniToolCall, VeriSim) but principled generation of temporally-evolving contradictory facts to test belief updating is not.", "Benchmarks are tiny and persona-thin (EngramaBench: 5 personas / 100 conversations / 150 queries), leaving the scaling question \u2014 how to generate thousands of diverse, enterprise-relevant personas without collapsing to the 'average person' \u2014 unanswered.", "Procedural and semantic memory are under-covered relative to episodic/conversational recall; tool-use trajectory generation (UniToolCall) and conversational memory (EngramaBench, AgenticAI-DialogGen) are siloed, with no unified synthetic generator spanning semantic/episodic/procedural memory types.", "Contamination/leakage controls for synthetic memory benchmarks are barely addressed; none of the generation pipelines surveyed specify how to guarantee the eval data was not (or cannot be) memorized, despite this being a known agent-eval failure mode."], "notable": ["EngramaBench composite scores (same GPT-4o answerer): full-context prompting 0.6186, Engrama graph memory 0.5367, Mem0 vector retrieval 0.4809; Engrama is the only system to beat full-context on cross-space reasoning (0.6532 vs 0.6291, n=30).", "EngramaBench scale: 5 personas, 100 multi-session conversations, 150 queries across factual recall / cross-space integration / temporal reasoning / adversarial abstention / emergent synthesis.", "UniToolCall: 22k+ tool pool, 390k+ training instances (10 public datasets + structurally controlled synthetic trajectories); fine-tuned Qwen3-8B reaches 93.0% single-turn Strict Precision under the distractor-heavy Hybrid-20 setting, beating GPT/Gemini/Claude.", "Havrilla QDC findings: quality is essential for in-distribution generalization, diversity for out-of-distribution generalization, complexity beneficial for both, with explicit quality\u2013diversity trade-offs in training data.", "OmniBehavior: built entirely from real-world traces; LLM simulator performance plateaus even as context windows expand, and simulators converge to a 'positive average person' (hyper-activity, persona homogenization, Utopian bias), losing long-tail behaviors."], "papers": ["2026arXiv260412179M", "2026arXiv260408362C", "2026arXiv260424977N", "2024arXiv241202980H", "2026arXiv260421229A", "2026arXiv260411557L", "2026arXiv260420382M", "2026arXiv260440441M", "2025arXiv250213270L", "2025arXiv250322458G", "2024arXiv240601171T", "2024arXiv240517974C"]}, {"key": "architectures", "label": "Architectures", "subtopic": "Memory architectures beyond the basics: temporal-KG, hierarchical/tree, hypergraph, tiered/OS-style, routing, parametric vs non-parametric, specialized retrieval, and consolidation/forgetting for LLM-agent memory", "themes": ["Structured memory substrates are proliferating along a spectrum - flat text -> typed/semi-structured entries -> pairwise knowledge graphs (Zep/Graphiti) -> hypergraphs (HyperMem) -> hierarchical trees (MemTree, LinkedIn) - and each structure implies different recall failure modes a benchmark must isolate.", "Temporal validity is becoming a first-class memory primitive: edge time-stamping, event tuples, and change-tracking (Zep, APEX-MEM, GRAVITY, dual-trace) shift evaluation from static fact recall toward time-aware reasoning and obsolescence handling.", "Consolidation-vs-forgetting (stability-plasticity) is emerging as an explicit architectural axis (GAM, SCM sleep-consolidation, ZenBrain) yet remains weakly benchmarked - most metrics still reward pure accumulation rather than correct pruning.", "Retrieval for memory is being specialized away from generic embedding RAG toward information-theoretic scoring (Memanto), iterative memory-as-cognition (MemCog), thought retrieval (Thought-Retriever), and OS-style paging (cooperative paging) - implying recall@k is an insufficient harness metric.", "Architecture-agnostic, cross-system comparative evaluation (GRAVITY across 5 systems; GraphRAG-vs-RAG benchmarking) is becoming the credible methodology, replacing single-system self-reports - directly relevant to building an open eval harness.", "Memory-type taxonomy (semantic/episodic/procedural and proposed extra layers like an explicit Knowledge layer or 7-layer schemes) is contested, meaning benchmarks should instrument per-type probes rather than one aggregate recall score."], "gaps": ["Forgetting and obsolescence are rarely scored: SCM and GAM implement forgetting mechanisms but no shared benchmark rewards correct removal of stale/superseded memories - existing metrics (DMR, LongMemEval, LoCoMo) measure accumulation/recall, not principled deletion.", "Hypergraph and n-ary memory (HyperMem) lack standardized multi-entity/multi-participant recall tasks; current benchmarks are built around pairwise or flat facts, so higher-order structure cannot be credited.", "Procedural-memory evaluation is thin: Thought-Retriever and reasoning-reuse systems have no widely adopted task suite measuring reuse of past reasoning/skills across sessions, unlike the relatively mature semantic-recall benchmarks.", "Retrieval-mechanism ablations are under-reported: papers swap in information-theoretic, iterative, or paging retrieval but seldom isolate the retrieval objective from the storage structure, leaving unclear what drives gains - a harness gap an open eval could fill.", "Temporal-reasoning evaluation is fragmented across system-specific reports (Zep, APEX-MEM, GRAVITY) with no shared multi-session temporal/change-tracking benchmark, so cross-architecture temporal claims are not comparable.", "Almost all reported systems show zero citations and self-defined eval splits, indicating no consolidated leaderboard or reproducible harness for memory-architecture comparison - the core opportunity for the role."], "notable": ["Zep: DMR 94.8% vs MemGPT 93.4%; up to +18.5% accuracy on LongMemEval with ~90% lower response latency than baseline.", "GRAVITY: average +7.5 to +10.1% LLM-judge accuracy across five memory systems on LongMemEval and LoCoMo; weakest host +12.2%, strongest host still +3.8 to +5.7% (gains inversely correlated with baseline strength).", "GRAVITY/APEX-MEM/HyperMem all evaluated on the LongMemEval and/or LoCoMo long-term-conversation benchmarks, establishing those two as the de facto memory-architecture eval pair."], "papers": ["2025arXiv250113956R", "2026arXiv260408256Y", "2024arXiv241014052R", "2026arXiv260426197X", "2026arXiv260412285W", "2026arXiv260420943S", "2026arXiv260412376L", "2026arXiv260422085M", "2026arXiv260411364R", "2026arXiv260423878B", "2026arXiv260501688S", "2026arXiv260528046L", "2026arXiv260414362B", "2026arXiv260412231F", "2026arXiv260409666F"]}, {"key": "security-governance", "label": "Security & Governance", "subtopic": "Memory Security, Privacy & Governance for LLM Agents (memory poisoning, indirect prompt injection into persistent stores, adversarial robustness, privacy-preserving memory, access control, auditing/provenance)", "themes": ["Trigger-optimized poisoning of the retrieval substrate (memory or RAG KB) is the dominant attack pattern \u2014 measured with a shared RSR@k / ASR / Benign-Accuracy triad \u2014 and is migrating from flat vector stores to graph-structured and cross-session shared memory.", "Persistence is the new attack surface: cross-session state and shared/multi-user memory enable contamination, worming, and unintended drift that stateless-LLM threat models do not capture, demanding multi-session-trajectory evaluation.", "Defenses are consolidating around provenance/lineage tagging and post-hoc audit graphs (MemLineage, Agent-BOM, StateGuard write-back auditing) rather than input filtering alone, giving harnesses a memory-metadata schema to attack and score against.", "Privacy evaluation is shifting from data-leakage-at-answer to contextual-integrity-in-action \u2014 measuring whether agents disclose confidential memory while taking actions over realistic trajectories (PrivacyLens pattern).", "Synthetic seed-to-trajectory data generation (PrivacyLens, When Routine Chats Turn Toxic) is becoming the standard pipeline for producing privacy/poisoning benchmark cases at scale, often paired with a small real-seed validation set.", "Availability/refusal attacks (RAG jamming, blocker documents) are a recognized but under-evaluated failure mode distinct from integrity poisoning, requiring over-refusal as a measured outcome."], "gaps": ["No standardized, open memory-security harness with shared metrics across attack families: poisoning ASR, induced over-refusal/jamming rate, cross-user leakage, and provenance-violation detection are each measured in bespoke per-paper setups.", "Defenses (MemLineage lineage enforcement, Agent-BOM auditing, StateGuard) are reported on their own attacks; there is little head-to-head benchmarking of detection/enforcement defenses against a common, adaptive poisoning suite.", "Episodic/procedural memory security is largely unaddressed \u2014 almost all attacks target semantic/retrieval memory; poisoning of stored procedures, skills, or episodic trajectories (cf. BadSkill) lacks dedicated benchmarks.", "Privacy and poisoning are evaluated separately; few benchmarks jointly test access-control/contextual-integrity violations and integrity poisoning within the same multi-session deployed-agent trajectory.", "Edge-cloud / federated memory governance is essentially untouched in this corpus \u2014 no benchmark models access control, leakage, or poisoning across a split on-device/cloud memory boundary despite on-device-LLM momentum."], "notable": ["AgentPoison (2024arXiv240712784C, 33 citations): backdoor that poisons agent memory/RAG KB via an optimized retrieval trigger with no fine-tuning of agent or retriever; the most-cited memory/KB poisoning attack in the corpus.", "Hijacking Agent Memory (2026arXiv260529960W): formalizes the standard evaluation triad \u2014 Retrieval Success Rate @k (poisoned entry in top-k), end-to-end Attack Success Rate (response follows poisoned payload), and Benign Accuracy \u2014 for conversation-injected memory Trojans.", "When Routine Chats Turn Toxic (2026arXiv260506731X): introduces a 'Harm Score' metric and a synthetic + real-seed benchmark plus a StateGuard write-back auditing defense for unintended long-term state poisoning in personalized agents (instantiated on OpenClaw).", "Phantom (2024arXiv240520485C, 24 citations): single-document trigger attack on RAG yielding four payload classes \u2014 denial-of-service, biased opinion, harmful output, and tool misuse.", "Machine Against the RAG (2024arXiv240605870S, 23 citations): a single inserted 'blocker' document induces target-query refusal (availability attack) without access to model internals.", "Greshake indirect prompt injection (2023arXiv230212173G, 134 citations): foundational taxonomy of injection-into-retrieved-data threats \u2014 data theft, worming, ecosystem contamination \u2014 demonstrated on Bing GPT-4 Chat.", "MemLineage (2026arXiv260514421O): attaches cryptographic provenance plus LLM-mediated derivation lineage to every memory entry for read/write-time policy enforcement."], "papers": ["2024arXiv240712784C", "2026arXiv260529960W", "2026arXiv260506731X", "2026arXiv260509033L", "2026arXiv260514421O", "2026arXiv260506812L", "2026arXiv260423338C", "2024arXiv240520485C", "2024arXiv240900138S", "2023arXiv230212173G", "2024arXiv240302817C", "2024arXiv240605870S", "2024arXiv240719354H"]}, {"key": "applications-personalization", "label": "Applications & Personalization", "subtopic": "Applications & Personalization of Agentic Memory: long-horizon user modeling, personalized assistants, multimodal memory, and domain deployments (coding, healthcare, GUI/computer-use, embodied)", "themes": ["Personalization is moving from static profiles to EVOLVING per-user memory with self-learning/context-distillation loops (TSUBASA, Reflective Memory Management, situational/persona steering), shifting eval from one-shot recall toward measuring preference accumulation, revision, and drift over many sessions.", "Procedural/experience memory is the dominant memory type in deployment domains: coding agents transfer memory across domains (Memory Transfer Learning), self-evolving agents distill experience into reusable capabilities (Mem2Evolve), and GUI/visual agents compile traces into reusable skills (SkillDroid, MMSkills). Eval must score reuse quality AND efficiency, not just task success.", "Multimodal memory is emerging as a distinct frontier (PersonaVLM, MMSkills) \u2014 memory keyed on images/perception+action, not just text logs \u2014 yet benchmarks and synthetic pipelines remain overwhelmingly text-conversation-based.", "Domain deployments demand domain-grounded evaluation frameworks rather than generic recall QA: healthcare proposes longitudinal coherence/continuity/adaptation/agency layers (longitudinal health agent) and clinical world models (Clinical World Model + Skill-Mix), which generic memory benchmarks do not capture.", "Memory enables a shift from reactive recall to PROACTIVE, intent-aware action (PASK) and to multi-user isolation (Multi-User LLM Agents) \u2014 production axes (proactivity, per-user partitioning, cross-user leakage) that current single-user recall benchmarks largely ignore.", "The 'harness' itself is becoming the unit of engineering and study for personal/deployed agents (SemaClaw harness engineering, M*'s per-task memory harness), aligning the application literature with the open-source eval-harness focus of the role."], "gaps": ["Almost no standardized, multi-session benchmark targets MULTIMODAL personalized memory; PersonaVLM and MMSkills introduce methods but the field lacks a shared multimodal long-horizon eval set with synthetic-data generation recipes.", "Domain deployments (healthcare, coding, GUI) propose bespoke evaluation frameworks (continuity/adaptation layers, clinical world models, skill-reuse efficiency) but there is no cross-domain harness that lets the same memory system be scored under each domain's specific longitudinal criteria.", "Multi-user / per-user memory isolation and cross-user leakage (Multi-User LLM Agents) is essentially unbenchmarked \u2014 no synthetic adversarial test set probes whether one user's memory contaminates another's responses.", "Procedural-memory transfer and reuse are claimed to generalize across domains (Memory Transfer Learning, Mem2Evolve) but evaluations rarely separate in-domain reuse from genuine out-of-distribution transfer, leaving the transfer claim under-measured.", "Proactive use of memory (acting on remembered intent unprompted, PASK) lacks evaluation methodology \u2014 recall-style benchmarks score retrieval accuracy but not whether/when an agent should surface remembered information without being asked, including false-proactivity costs."], "notable": ["LongMemEval: commercial chat assistants and long-context LLMs show a ~30% accuracy drop when memorizing information across sustained multi-session interactions; 500 curated questions over five memory abilities (extraction, multi-session reasoning, temporal reasoning, knowledge updates, abstention).", "Synthius-Mem (LoCoMo): reports 94.4% memory accuracy and 99.6% adversarial robustness on LoCoMo for a brain-inspired hallucination-resistant persona memory \u2014 a notable claimed ceiling for persona memory on that benchmark.", "SkillDroid: mobile GUI agents 'compile once' so reused tasks skip per-step LLM inference at each action step, framing skill-memory reuse as an inference-cost reduction (not just accuracy) objective.", "MemCoT: with its multi-view long-term memory + dual short-term (semantic + episodic trajectory) memory, achieves SOTA for several open- and closed-source models on the LoCoMo and LongMemEval-S benchmarks.", "Longitudinal health agent framework defines four evaluation layers \u2014 coherence, continuity, adaptation, agency \u2014 as longitudinal outcome metrics, explicitly arguing memory/personalization alone is insufficient for multi-visit health support.", "TSUBASA targets long-horizon personalization by pairing an evolving memory with self-learning via context distillation, positioning context distillation as the synthetic-data mechanism for personalization rather than raw history replay."], "papers": ["2026arXiv260407894Z", "2026arXiv260413074N", "2026arXiv260414004K", "2026arXiv260410923C", "2026arXiv260414872C", "2026arXiv260513527Z", "2026arXiv260412019G", "2026arXiv260408226S", "2026arXiv260408000X", "2025arXiv250308026T", "2026arXiv260408567Y", "2026arXiv260411548Z", "2026arXiv260406716L"]}, {"key": "forgetting", "label": "Forgetting & Consolidation", "subtopic": "Forgetting & consolidation metrics in agentic memory systems (catastrophic forgetting, negative transfer, memory consolidation incl. sleep-consolidation, algorithmic forgetting/pruning/eviction, stale-memory obsolescence, knowledge-update/belief-revision, stability-plasticity) \u2014 and how, or whether, any of it is measured.", "themes": ["Neuroscience-grounded consolidation (sleep-consolidation, synaptic-tagging-and-capture, hippocampal-cortical metaphors) is the dominant framing for 2026 forgetting work: SCM, Evolve, ZenBrain, Adaptive Memory Crystallization.", "Obsolescence / stale-memory and belief-revision over time is emerging as its own evaluable problem (STALE benchmark, Time-is-Not-a-Label temporal KGs, NeuSymMS self-curation), distinct from static fact retrieval.", "Eviction/pruning is increasingly designed as forget-with-recall or utility-driven retention (Cooperative Memory Paging, Learning to Forget/H2-EMV, Memanto information-theoretic scoring) rather than hard deletion.", "Self-evolving stores raise the negative-transfer/forgetting risk explicitly, and a small set of multi-episode benchmarks (SEA-Eval) now try to measure accumulation-vs-amnesia beyond single-episode scoring.", "Continual-RL forgetting machinery (forward transfer, forgetting%, stability-plasticity at neuron level) is being imported into agent memory (Adaptive Memory Crystallization, Neuron-level Balance, Lifelong-Learning roadmap)."], "gaps": ["No shared/standardized forgetting metric for textual agent memory: continual-RL borrows forward-transfer and forgetting% (AMC), STALE uses bespoke 3-dimensional accuracy, but there is no common retention-curve or forgetting-rate protocol across LLM-agent memory papers.", "Most self-evolving / consolidating stores (A-MEM, EvolveMem, NeuSymMS, ZenBrain) report only downstream task quality and never quantify negative transfer or capability lost during self-modification \u2014 consolidation is asserted, not measured.", "Stability-plasticity is invoked rhetorically in LLM-agent memory but quantified only in RL/neuromorphic settings (Neuron-level Balance, probabilistic metaplasticity); no agent-memory paper reports a stability-plasticity operating point.", "Obsolescence detection is benchmarked almost solely by STALE; there is little work measuring whether deletion/pruning policies remove the RIGHT stale items (precision/recall of obsolescence decisions) rather than just shrinking the store.", "Sleep-consolidation systems (SCM, Evolve) describe consolidation mechanisms but the searches surfaced no ablation isolating the consolidation step's effect on long-horizon retention vs a no-consolidation control."], "notable": ["STALE: even the best frontier model reaches only 55.2% overall accuracy at recognizing/acting on invalidated memories, and models routinely accept outdated assumptions embedded in user queries (the 'Implicit Conflict' / Premise Resistance failure).", "Adaptive Memory Crystallization: 67-80% reduction in catastrophic forgetting, +34-43% forward transfer over the strongest baseline, and 62% smaller memory footprint across Meta-World MT50 / Atari 20-game / MuJoCo continual locomotion.", "Learning to Forget (H2-EMV): learned selective forgetting cut memory 45% and query-time compute 35% with no QA-accuracy loss, and improved second-round-query accuracy by 70% by adapting to user-specific relevance \u2014 evidence that forgetting can be net-positive when relevance-driven.", "Cooperative Memory Paging shows evicted (forgotten) content can be made recoverable via keyword bookmarks, reframing context-window eviction from lossy forgetting to deferred recall.", "The 2026 wave is overwhelmingly neuroscience-metaphor-driven (sleep consolidation, synaptic tagging/capture, 7-layer hippocampal-cortical designs), but quantitative forgetting evaluation lags the architectural ambition \u2014 only AMC, H2-EMV, and STALE report hard forgetting/obsolescence numbers."], "papers": ["2026arXiv260420943S", "2026arXiv260506527C", "2026arXiv260413085K", "2026arXiv260411306B", "2026arXiv260423424H", "2026arXiv260423878B", "2026arXiv260422085M", "2026arXiv260411544W", "2025arXiv250212110X", "2026arXiv260513941L", "2025arXiv250107278Z", "2025arXiv250408000L", "2026arXiv260517596S", "2026arXiv260408988J", "2026arXiv260412376L"], "how_measured": ["STALE (2026arXiv260506527C): three-dimensional accuracy protocol over 400 scenarios / 1,200 queries \u2014 State Resolution (detect a prior belief is outdated), Premise Resistance (reject queries falsely presupposing a stale state), Implicit Policy Adaptation (apply updated state downstream). Headline metric: overall accuracy; frontier best = 55.2%. This is the most concrete obsolescence/belief-revision measurement found.", "Adaptive Memory Crystallization (2026arXiv260413085K): explicit catastrophic-forgetting reduction (67-80%), forward-transfer gain (+34-43% over strongest baseline), and memory-footprint reduction (62%) on Meta-World MT50, Atari 20-game sequential, MuJoCo continual locomotion \u2014 plus theoretical Q-learning error bounds / memory-capacity lower bounds tying SDE params to performance.", "Learning to Forget / H2-EMV (2026arXiv260411306B): retention measured as QA-accuracy held constant while memory size drops 45% and query-time compute drops 35%; a temporal-improvement metric (+70% second-round-query accuracy) captures whether learned forgetting helps rather than harms over time.", "Cooperative Memory Paging (2026arXiv260412376L): forgetting framed as evict-then-recover; the implicit metric is recovery success rate of evicted content via keyword bookmarks (whether the model re-retrieves what was paged out).", "Stability-plasticity is quantified at the mechanism level in Neuron-level Balance (2025arXiv250408000L) for deep RL, but is NOT given a standard agent-memory metric in the LLM-agent papers \u2014 most invoke the dilemma narratively.", "GAP \u2014 pervasive NO-METRIC pattern: A-MEM (2025arXiv250212110X), EvolveMem (2026arXiv260513941L), NeuSymMS (2026arXiv260517596S), and ZenBrain (2026arXiv260423878B) describe consolidation / self-evolution / self-curation / forgetting layers but report end-task quality, not a forgetting rate, retention curve, or negative-transfer delta. The field largely lacks a standardized forgetting-rate / retention-curve protocol for textual agent memory; STALE-style accuracy and AMC-style forward-transfer/forgetting% (borrowed from continual RL) are the closest things to standards and are not yet shared across papers."]}], "reading": [["2023arXiv230902427S", "CoALA \u2014 the taxonomy", "Foundations"], ["2026arXiv260506716L", "From Storage to Experience (survey)", "Foundations"], ["2025arXiv250316416Y", "Survey on Evaluation of LLM-based Agents", "Foundations"], ["2025arXiv250113956R", "Zep / Graphiti (temporal-KG)", "Systems"], ["2025arXiv250212110X", "A-MEM (agentic memory)", "Systems"], ["2025arXiv250419413C", "Mem0 (production)", "Systems"], ["2023arXiv230516291W", "Voyager (skill library)", "Procedural"], ["2024arXiv240907429Z", "Agent Workflow Memory", "Procedural"], ["2026arXiv260524117L", "SkillEvolBench", "Procedural"], ["2026arXiv260524060P", "TIAP / Same Ranking, Different Winner", "Methodology"], ["2026arXiv260520926T", "MemConflict", "Methodology"], ["2026arXiv260530621L", "Harness Updating \u2260 Harness Benefit", "Methodology"], ["2026arXiv260506527C", "STALE (bonus: forgetting)", "Forgetting"]], "opportunities": [["Unified multi-type white-box harness", "Nothing spans semantic+episodic+procedural with stage-attributed diagnostics, explicit scoring targets (TIAP), fixed-answerer controls (EngramaBench), cross-system eval (GRAVITY) and CIs. Flagship open-source contribution."], ["Canonical procedural-memory benchmark", "SkillEvolBench/SEA-Eval are days-old & unconsolidated; adopt the freeze-then-deploy arc + No-Skill / Raw-Trajectory attribution controls ('Harness Updating \u2260 Benefit')."], ["Forgetting / obsolescence metric suite", "Thinnest area: STALE (55.2% ceiling) + AMC continual-RL metrics are the only hard numbers; standardize a retention-curve + obsolescence-precision/recall protocol for textual memory."], ["Synthetic-data realism metric", "OmniBehavior/REALTALK prove the gap; build a fidelity score + controllable conflict/distractor injection (MemConflict recipe) + QDC auditing."], ["Shared memory-security harness", "RSR@k / ASR / Benign + over-refusal + cross-user leakage + provenance-violation, covering episodic/procedural stores (today's attacks only hit semantic)."], ["Unbenchmarked production axes", "Multi-user isolation, proactive memory use, multimodal long-horizon recall."]], "design": [{"bibcode": "2026arXiv260524117L", "title": "SkillEvolBench: Benchmarking the Evolution from Episodic Experience to Procedural Skills", "task_design": "180 tasks total = 6 real-world agent environments x 5 task families per environment x 6 role-conditioned tasks per family. The 6 environments cover: code modification, API orchestration, data processing, document transformation, research synthesis, and communication operations. A 'task family' denotes a recurring PROCEDURAL capability (shared latent procedure), not a topic label. Within each family there is a fixed 6-ROLE progression split into two phases: ACQUISITION (skill-formation, library updates allowed) = {canonical (presents base procedure), enriched (exposes a missing sub-capability), variant (changes surface form, same procedure)}; DEPLOYMENT (frozen library, no updates) = {context-shift (skill need embedded in a broader request -> tests implicit invocation), adversarial (introduces shortcut solutions that pass shallow checks -> tests shortcut resistance), composition (target skill must interact with other skills)}. Each task ships with: an instruction + fixture, a verification suite (public tests for basic contract, hidden tests for edge cases/distribution shift, and process verifiers that inspect traces/artifacts for brittle strategies: hard-coded constants, swallowed exceptions, skipped validation, incomplete repairs), and a scoring rubric. Skill conditions compared: No-Skill control, Raw-Trajectory control (reuse episodic traces directly), Zero-Shot (metadata-only skill written before execution, never revised), Self-Generated/Experience-based (start empty, induce skill only after canonical attempt + verifier feedback), and Curated-Start (gap-exposed curated seed). Curated/self variants have static vs Revision vs +Always(-update) update policies.", "data_generation": "Source-driven and human-curated; NO reuse of existing benchmark instances. Steps: (1) Use open-source agent skill collections, skill-oriented benchmarks, and practitioner examples as EVIDENCE for task topics/workflow motifs (they guide the design space but do not define tasks). (2) Cluster observed workflows by artifact type, required tools, interaction pattern, and solution procedure. (3) Retain families satisfying 3 desiderata: real-world relevance, procedural-skill fit, verifiable evolvability (must be writable as a skill, transferable beyond one fixture, evaluable via deterministic outcome checks + process evidence). (4) For each family instantiate the 6 roles. (5) Author a GAP-EXPOSED CURATED SKILL per family: not an oracle, not copied from any instance \u2014 first define the family-level procedure and the gaps that should stay exposed, a skill-creator drafts an initial skill, then humans manually refine granularity so it supports the canonical task but leaves enriched/variant/adversarial/composition unresolved. (6) Manual review of each family+curated skill for realism, role alignment, verifier coverage, and 'useful but incomplete'. SKILL EVOLUTION LOOP (per environment, run as an independent lifelong episode with a fresh env-scoped library that is reset before the next env to prevent cross-env leakage): agent solves an acquisition task -> logged execution artifacts (instructions, file accesses, tool calls, commands, edits, generated outputs, tests, final responses) are compacted into a trajectory summary tau-tilde -> verifier returns structured feedback v (outcome results, process checks, rewards, diagnostics; no hidden model state / private CoT) -> a host-side SKILL AUTHOR call (separate from the task-solving agent) takes the family skill state + acquisition history and emits a structured library edit: write new skill / refine existing / do nothing. Library is FROZEN before deployment tasks. Optional REPLAY reruns the original acquisition tasks with the final frozen library (no updates) as a within-environment counterfactual separating local recovery from transfer.", "metrics": "Per attempt the verifier returns outcome score O_a (functional correctness via public+hidden tests), process score P_a (followed intended procedure), overall G_a, and binary success B_a. Core metric: success rate SR(I) = (1/|I|) * sum over a in I of B_a, instantiated on protocol-defined subsets: LSR = success on acquisition tasks (updates still allowed); RSR = replay success on original acquisition tasks after freezing (local recovery, NOT transfer; RSR delta baseline is No-Skill LSR since No-Skill has no replay); ESR = frozen-deployment success on held-out context-shift/adversarial/composition tasks. ESR is decomposed into CSSR (implicit skill invocation under context shift), ARSR (robustness to shortcut/adversarial solutions), and CompSR (multi-skill composition). Reporting: success-rate percentages plus percentage-point (pp) deltas vs the No-Skill baseline; skill conditions also reported as pp delta vs Raw-Trajectory baseline to detect the lossy-abstraction bottleneck.", "key_numbers": ["180 tasks = 6 environments x 5 families x 6 roles; evaluated across 10 model configs and 3 agent harnesses (Claude Code: Opus 4.6/4.5, Sonnet 4.6/4.5; Codex CLI: GPT-5.4, GPT-5.3-Codex, GPT-5.2-Codex; Gemini CLI: Gemini 3.1 Pro, 3 Flash, 2.5 Pro)", "Self-Generated Experience, Claude Opus 4.6: LSR +5.5 pp and RSR +10.0 pp vs No-Skill, but ESR/CSSR/CompSR decrease", "GPT-5.2-Codex Self-Generated+Always improves most metrics but stays 10.0 pp BELOW No-Skill on ARSR", "Raw-Trajectory comparison (Fig 4): many cells negative (e.g. -10.0, -13.3 pp), i.e. distilled skills underperform direct episodic reuse on deployment axes \u2014 'lossy abstraction bottleneck'", "No-Skill baselines hover ~38-43% LSR; deployment metrics (ARSR, CompSR) frequently 16-33%", "Central finding: agents show local procedural adaptation but NOT reliable reusable skill formation; gains unstable under frozen deployment; raw trajectories often beat distilled skills"], "reusable_for_role": "Directly reusable scaffolding for a memory-eval harness: (1) the 6-role acquisition->deployment arc is a ready template for separating memory WRITE/consolidation from frozen READ/transfer; (2) the FREEZE-then-deploy protocol cleanly isolates whether memory was actually formed vs test-time repair; (3) the No-Skill / Raw-Trajectory / distilled-skill control set is a reusable ablation design to attribute gains to abstraction vs raw reuse vs base capability; (4) verification suite design (public + hidden + PROCESS verifiers flagging brittle strategies) maps onto white-box memory-quality checks; (5) SR/LSR/RSR/ESR decomposition (esp. CSSR/ARSR/CompSR) is a reusable metric taxonomy; (6) host-side Skill-Author call separated from the solving agent is a clean orchestration pattern for a memory-writer component."}, {"bibcode": "2026arXiv260524060P", "title": "Same Ranking, Different Winner: How Scoring Targets Shape LLM Memory Benchmarks (TIAP)", "task_design": "Not a task benchmark \u2014 a FIXED-OUTPUT AUDIT (TIAP) over already-saved ranked retrieval traces. The audited object is the 'scoring target': the set of stored memory IDs eligible to receive retrieval credit for a query when one source turn has spawned multiple derived memories in the same index. Three targets are defined formally for a fixed source anchor s(q) and store S: Raw T_raw(q,S) = {m in I(S): l_S(m)=s(q) AND raw_S(m)} (only the exact raw source turn); Source T_src(q,S) = {m: l_S(m)=s(q)} (any descendant linked to the same source evidence); Canonical T_can(q,S) = {m: l_S(m)=s(q) AND can_S(m)} (transformed non-raw serving memories). By construction T_raw and T_can are subsets of T_src and are typically DISJOINT from each other. The rules a store uses to assign lineage (l_S, raw_S, can_S) are its 'lineage contract'. Three-stage method: Stage I construct Raw/Source/Canonical targets per query+store; Stage II FIXED-OUTPUT RESCORING \u2014 rescore the SAME saved top-k ranked traces under each target without rerunning retrieval; Stage III target-sensitivity analysis + semantic audit. Outputs tracked in Stage III: score shifts, query-level hit-status changes, WINNER FLIPS (sign of Delta_t(A,B)=M_t(A)-M_t(B) changes as target t varies), and DESIGN-RECOMMENDATION changes (which store config looks best). Includes a SHARED-QUERY-SUBSET control: a query is included only when all compared targets have >=1 eligible stored ID, so score changes reflect the credited target set, not query difficulty.", "data_generation": "No synthetic trajectory generation \u2014 it operates on two existing conversational-memory benchmarks plus one stress test, with deterministic target mappings. Datasets: LoCoMo (annotates turn IDs for QA gold; lexical F1/BLEU-1 + retrieval recall over annotated evidence turns) and LongMemEval-S (annotates evidence sessions+positions; GPT-4o-style judge for answers; reports Recall and nDCG); supplementary BEAM-1M grounded slice (uses source_chat_ids field) as a single provider-robustness check. Target mapping is DETERMINISTIC: join benchmark source fixtures to the raw memory ID and to all transformed-descendant IDs exported with the same source anchor; Source = union of raw + transformed IDs; Canonical = non-raw transformed serving IDs only. Crucially, gold answers / evidence labels are held out and NEVER given to the parser that produces transformed memories, so they cannot leak into the store. Retrieval setup: 4 native retrievers (lexical, all-MiniLM-L6-v2, BGE-M3, mxbai-embed-large), saved top-k=60 ranked traces (k=60 chosen because Recall@k plateaus after ~k=40, <6 pp gain k=40->60), extractive answer mode, seed 1337, embeddings served locally via Ollama. Transfer runs add external architectures Mem0 and MemoryOS (full LoCoMo + LongMemEval-S); Zep excluded (graph-native memories lack a stable source-turn->descendant ID map). Parser-density sweep uses parser_max_facts = 1/5/8 (F1/F5/F8). SEMANTIC AUDIT of contested credits (cases where Raw misses but Source or Canonical hits): a deterministic extraction script pulls ALL 1,902 raw_miss/source_hit/canonical_hit disagreement cases from the 8 native runs; each credited memory is judged vs source evidence + required answer into supports / partial / does_not_support. Validated first on a 115-case human-labeled subset (stratified by credited rank bucket 1-5/6-20/21-60), then scaled to all 1,902 with a 5-model majority vote (claude-sonnet-4, claude-opus-4-7, gemini-3.1-pro, gpt-5.5, deepseek-v4-pro) at temperature 0.", "metrics": "Primary IR metric is nDCG (also Recall, MRR in transfer). System gap under target t: Delta_t(A,B) = M_t(A) - M_t(B) where M_t is the metric evaluated against target set T_t. Target NON-INVARIANCE = the sign of Delta_t flips as t changes (a winner flip). Query-level instability = fraction of shared queries whose nDCG changes (Delta != 0) when only the target changes. Paired statistics use 3,000 bootstrap resamples, percentile 95% CIs, seed 1337. Semantic-audit rubric reliability via Fleiss kappa (all raters) and Cohen kappa (pairwise); audit reports supports/partial/does_not_support proportions under 5-model majority vote. Ships MTEL-Mem reproducibility layer (target mappings, source fixtures, rescoring utilities).", "key_numbers": ["Switching ONLY the scoring target changes nDCG on 83.4% to 94.0% of shared queries (Raw vs Canonical) across LoCoMo and LongMemEval-S", "Query-level Delta!=0 rate per run: LoCoMo 84.3-88.4%, LongMemEval-S 83.4-94.0%; 65% of LoCoMo and 71% of LongMemEval-S query-provider pairs shift by >=0.1 nDCG", "Coverage confound: queries WITH a Canonical target are easier under Raw (mean run-level Raw-nDCG gap +0.086, 95% CI [+0.049,+0.123]); answer F1 gap only +0.008 [+0.002,+0.014] -> must rescore on shared subsets", "LongMemEval-S Canonical>Raw for every provider; largest BGE-M3 +0.336 [0.302,0.371] and mxbai +0.420 [0.382,0.457]", "LoCoMo Source stays above Canonical for all 4 providers; strongest reversal BGE-M3 Canonical-Source = -0.088 (CI excludes 0)", "Semantic audit of all 1,902 contested credits (5-model majority): only 29.2% fully support, 39.6% partial, 31.2% do not support; by dataset 33.1% justified on LoCoMo vs 21.3% on LongMemEval-S", "Rubric reliability on 115-case validation subset: Fleiss kappa = 0.83 (binary mapping)", "Parser-density winner flips: for lexical F1 vs F5, Raw prefers sparse F1, Source prefers dense F5, Canonical returns to F1 (n=453)"], "reusable_for_role": "Critical methodological guardrail for a memory-eval harness: (1) ALWAYS define and report the scoring target (Raw vs Source vs Canonical) explicitly \u2014 credit assignment when one source spawns derived memories is a benchmark-design choice that silently flips rankings; (2) the fixed-output RESCORING pattern lets you re-grade saved traces under multiple credit policies without re-running retrieval \u2014 cheap and reproducible; (3) the SHARED-QUERY-SUBSET control prevents confounding target choice with query difficulty; (4) keep gold/evidence labels OUT of the memory-writer to prevent leakage; (5) k=60 with documented recall-plateau justification is a reusable retrieval-depth default; (6) the winner-flip / Delta_t(A,B) sign-change test is a reusable
