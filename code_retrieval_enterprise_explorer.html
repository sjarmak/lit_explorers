*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font:15px/1.55 var(--sans);background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}a:hover{color:var(--accent-hover);text-decoration:underline;text-underline-offset:2px}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
header{position:sticky;top:0;z-index:20;padding:15px 26px;border-bottom:1px solid var(--border);background:var(--paper);display:flex;align-items:center;gap:18px}
header .brand h1{margin:0;font-size:18px;font-weight:650;letter-spacing:-.01em}
header .sub{color:var(--dim);font-size:12.5px;margin-top:3px}
header .spacer{flex:1}
#themebtn{font:inherit;font-size:12.5px;color:var(--dim);background:var(--surface-2);border:1px solid var(--border);padding:7px 13px;border-radius:8px;cursor:pointer;white-space:nowrap;transition:border-color .16s,color .16s}
#themebtn:hover{border-color:var(--border-strong);color:var(--ink)}
.layout{display:flex;align-items:flex-start}
nav{width:236px;flex:0 0 236px;border-right:1px solid var(--border);padding:16px 12px;position:sticky;top:64px;align-self:flex-start;height:calc(100vh - 64px);overflow:auto;background:var(--surface-2)}
nav button{display:flex;justify-content:space-between;align-items:center;width:100%;text-align:left;background:none;border:none;color:var(--dim);padding:8px 11px;border-radius:8px;cursor:pointer;font:inherit;font-size:13.5px;transition:background .15s,color .15s}
nav button:hover{background:var(--surface-3);color:var(--ink)}
nav button.active{background:var(--accent-weak);color:var(--accent);font-weight:650}
nav .grouphdr{color:var(--faint);text-transform:uppercase;font-size:10px;letter-spacing:.09em;font-weight:600;margin:18px 11px 5px}
nav .count{opacity:.7;font-variant-numeric:tabular-nums;font-size:12px}
main{flex:1;min-width:0;padding:26px 34px 60px;max-width:1040px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;align-items:center}
.controls input,.controls select{background:var(--surface);border:1px solid var(--border);color:var(--ink);padding:9px 12px;border-radius:9px;font:inherit;font-size:13.5px;transition:border-color .16s}
.controls input:hover,.controls select:hover{border-color:var(--border-strong)}
#q{flex:1;min-width:240px}
.hint{color:var(--dim);font-size:12.5px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 17px;margin-bottom:12px;cursor:pointer;box-shadow:var(--shadow);transition:border-color .16s,box-shadow .16s,transform .16s}
.card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-hover);transform:translateY(-1px)}
.card.read{background:var(--accent-weak);border-color:var(--accent)}
.card .ttl{font-weight:650;font-size:15.5px;letter-spacing:-.005em;line-height:1.35}
.card .meta{color:var(--dim);font-size:12px;margin:7px 0 0;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.chip{background:var(--surface-2);border:1px solid var(--border);color:var(--dim);padding:2px 9px;border-radius:20px;font-size:11px;white-space:nowrap}
.chip.b{color:var(--accent);border-color:var(--accent-weak);background:var(--accent-weak)}
.bc-code{color:var(--faint);font-family:var(--mono);font-size:11px}
.cit{color:var(--warn);font-variant-numeric:tabular-nums;font-weight:600}
.rank{background:var(--accent);color:var(--accent-ink);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:700;letter-spacing:.01em}
.card .body{display:none;margin-top:13px;border-top:1px solid var(--border);padding-top:11px}
.card.open .body{display:block}

.lbl:first-child{margin-top:0}
.card .body p,.val,.narr{font-family:var(--serif);font-size:15.5px;line-height:1.62;margin:0 0 4px;max-width:72ch;color:var(--ink)}
.links{margin-top:13px;display:flex;gap:16px}

.sectionhead{margin:0 0 5px;font-size:24px;font-weight:650;letter-spacing:-.018em}
.subtopic{color:var(--dim);margin:0 0 20px;font-size:14px;max-width:74ch}

.panel.themes{background:var(--good-bg);border-color:transparent}.panel.themes h3{color:var(--good)}
.panel.gaps{background:var(--bad-bg);border-color:transparent}.panel.gaps h3{color:var(--bad)}
.panel.notable{background:var(--warn-bg);border-color:transparent}.panel.notable h3{color:var(--warn)}

.panel.notable li::before{background:var(--warn)}.panel.measured li::before{background:var(--violet)}

.traj{margin-top:12px;overflow-x:auto}
.traj table{border-collapse:collapse;width:100%;font-size:13px}
.traj th,.traj td{border-bottom:1px solid var(--border);padding:9px 11px;text-align:left}
.traj th{color:var(--dim);font-weight:600}.traj td.num{text-align:right;font-variant-numeric:tabular-nums}

.peak{color:var(--good);font-weight:700}

.dd .field{margin-bottom:14px}
.kv-wrap{display:flex;flex-direction:column;gap:6px}
.kv{background:var(--surface-2);border:1px solid var(--border);padding:8px 12px 8px 11px;border-radius:9px;font-size:13px;line-height:1.45;font-variant-numeric:tabular-nums}
.kv::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--good);margin-right:9px;vertical-align:1px}
.op{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow)}
.op .n{font-weight:650;color:var(--ink);font-size:15px;margin-bottom:3px}
.rk{background:var(--accent);color:var(--accent-ink);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 26px;font-size:12.5px}
.readrow{display:flex;gap:14px;align-items:baseline;padding:11px 8px;border-bottom:1px solid var(--border)}
.readrow:hover{background:var(--surface-2)}
.readrow .grp{color:var(--accent);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:650;width:96px;flex:0 0 96px}
.readrow b{font-size:14.5px}
mark{background:var(--mark);color:var(--ink);border-radius:3px;padding:0 1px}
.empty{color:var(--dim);padding:28px;text-align:center;font-style:italic}
@media (max-width:780px){
  header{padding:13px 16px}.layout{flex-direction:column}

  nav button{width:auto}nav .grouphdr{width:100%;margin:6px 8px 2px}nav .count{display:none}

<script id="data" type="application/json">{"meta": {"title": "Code Retrieval & Enterprise Codebases", "h1": "Code Retrieval & Enterprise Codebases", "sub": "Literature explorer &middot; 85 papers, 5 themes &middot; SciX MCP (arXiv + ADS) + industry sources &middot; built 2026-06-08", "tkey": "litx-code", "what_is": "A map of code-retrieval and code-search research with an emphasis on what breaks once you leave the single-file demo and enter a living, multi-million-line enterprise codebase. Built via SciX MCP hybrid search plus sub-agent deep-dives, cross-referenced against industrial code-search blogs (Kythe, Zoekt, Glean, SCIP) and three local benchmark projects (EnterpriseBench, CodeScaleBench, codeprobe).", "caveat": "The dense/ANN index was down during source gathering, so recall here is lexical/hybrid only &mdash; some named systems (RepoFusion, RepoGraph, GRACE) did not surface. Industrial systems (Kythe / Zoekt / Glean / SCIP) are blog-grounded, not peer-reviewed. Several named benchmarks (published EnterpriseBench arXiv:2510.27287, SWE-bench Pro, Long Code Arena, Gemini 1.5 long-context) are referenced in the deep-dives but absent from this corpus and are therefore described in panels rather than listed as papers.", "start_here": ["<b>&#9733; Reading path.</b> Start with <i>Why Code Isn't Text IR</i> (CodeSearchNet, CodeBERT, the vocabulary-mismatch papers), then walk the technique ladder (lexical &rarr; neural &rarr; graph &rarr; rerank), then scale up to repository-level retrieval and code graphs, and finish on the enterprise reality and open frontier.", "<b>&#9733; Opportunities.</b> The 12 open problems from the brainstorm &mdash; access-control-aware retrieval, contamination-proof eval, staleness gating, symbolic+semantic fusion at scale &mdash; are in the Opportunities tab; the thinnest academically are permission-bounded retrieval and tribal-knowledge retrieval.", "<b>Design deep-dives.</b> The Design tab dissects three keystones: a benchmark family (CodeSearchNet/CoIR), a graph-localization system (LocAgent), and a local enterprise benchmark (EnterpriseBench) &mdash; task design, evidence, and what is reusable.", "<b>Timeline.</b> The Temporal tab traces the maturation from 2016 NL&rarr;API lineage through the 2020 CodeBERT explosion to the 2024-2026 agentic / graph / enterprise wave.", "<b>Themes</b> (left nav). Five themes: why code is not text IR, retrieval techniques, repository-scale &amp; code graphs, enterprise challenges, and the open frontier."], "one_paragraph": "Code retrieval began as text IR with a different corpus and immediately hit a wall: queries and code share little vocabulary, code's lexicon is open-ended, and meaning lives in symbols, references, and structure that a bag-of-tokens embedding flattens away. The field answered with a ladder &mdash; lexical/trigram (rare-token recall), dense neural embeddings (intent), AST/graph methods (behavior), and retrieve-then-rerank cascades &mdash; that is additive, not a sequence of replacements. Scaling to repositories turned retrieval into navigation: iterated similarity RAG, queryable code graphs, and agentic localization. And scaling to the enterprise changed which problems even exist &mdash; billions of LOC, polyglot cross-language dependency chains, access-control boundaries, dead code and churn, tribal knowledge outside the source, and an evaluation crisis where ground truth is contaminated or tautological. The frontier is now an infrastructure problem: a fused symbolic+semantic index that stays fresh under O(changes) updates, gates on freshness and permissions, and is measured honestly.", "podcast": "Companion to the five-episode <b>Code Intel Digest &mdash; Code Retrieval &amp; Enterprise Codebases</b> deep-dive series (Why Code Isn't Text IR; Techniques: Lexical &rarr; Neural &rarr; Graph; Repository-Scale &amp; Code Graphs; The Unique Challenges of Large Enterprise Codebases; Frontier &amp; Open Problems).", "note_r_label": "why it matters", "measured_label": "Evidence &amp; benchmarks", "design_label": "Reusable in practice", "design_sub": "Deep dives into keystone systems and benchmarks: design, evidence, and what is reusable."}, "branch_labels": {"foundations": "Why Code != Text IR", "techniques": "Techniques: Lexical/Neural/Graph", "repo-scale": "Repository-Scale & Code Graphs", "enterprise": "Enterprise Codebase Challenges", "frontier": "Frontier & Open Problems"}, "papers": [{"bibcode": "2019arXiv190909436H", "title": "CodeSearchNet Challenge: Evaluating the State of Semantic Code Search", "first_author": "Husain", "year": 2019, "citation_count": 780, "branches": ["foundations", "techniques"], "notes": [{"branch": "foundations", "k": "Foundational NL&rarr;code retrieval benchmark, built around the query/code vocabulary gap", "r": "Defined the shared yardstick and named the core reason text IR fails on code: query and result rarely share words"}], "reading_rank": 2, "arxiv": "1909.09436"}, {"bibcode": "2020arXiv200208155F", "title": "CodeBERT: A Pre-Trained Model for Programming and Natural Languages", "first_author": "Feng", "year": 2020, "citation_count": 914, "branches": ["foundations", "techniques"], "notes": [{"branch": "techniques", "k": "Seminal bimodal PL/NL encoder; pretrain on (comment, code) pairs then retrieve", "r": "The recipe most later embedding models inherit, and the token-level baseline the structure-aware successors reacted to"}], "reading_rank": 1, "arxiv": "2002.08155"}, {"bibcode": "2020arXiv200908366G", "title": "GraphCodeBERT: Pre-training Code Representations with Data Flow", "first_author": "Guo", "year": 2020, "citation_count": 457, "branches": ["foundations", "techniques"], "notes": [{"branch": "techniques", "k": "Injects data-flow (where-the-value-comes-from) structure with graph-guided masked attention", "r": "First clean win for structure over tokens; model shifts attention to structure-level edges in code search, SOTA on four tasks"}], "reading_rank": 4, "arxiv": "2009.08366"}, {"bibcode": "2021arXiv210900859W", "title": "CodeT5: Identifier-aware Unified Pre-trained Encoder-Decoder Models for Code", "first_author": "Wang", "year": 2021, "citation_count": 366, "branches": ["techniques"], "notes": [{"branch": "techniques", "k": "Identifier-aware unified encoder-decoder for code understanding and generation", "r": "Part of the CodeBERT&rarr;GraphCodeBERT&rarr;CodeT5/UniXcoder embedding-lane lineage"}], "reading_rank": 0, "arxiv": "2109.00859"}, {"bibcode": "2022arXiv220303850G", "title": "UniXcoder: Unified Cross-Modal Pre-training for Code Representation", "first_author": "Guo", "year": 2022, "citation_count": 123, "branches": ["techniques"], "notes": [{"branch": "techniques", "k": "Unified cross-modal embeddings spanning code, comment, and AST", "r": "Consolidates the encoder lineage into one cross-modal representation for search and generation"}], "reading_rank": 0, "arxiv": "2203.03850"}, {"bibcode": "2024arXiv240702883L", "title": "CoIR: A Comprehensive Benchmark for Code Information Retrieval", "first_author": "Li", "year": 2024, "citation_count": 12, "branches": ["foundations", "techniques"], "notes": [{"branch": "foundations", "k": "Comprehensive multi-task, multi-language code-IR benchmark; modern successor to CodeSearchNet", "r": "Consolidates a fragmented evaluation landscape into one suite so cross-paper scores become comparable"}], "reading_rank": 7, "arxiv": "2407.02883"}, {"bibcode": "2024arXiv240611589G", "title": "CoSQA+: Enhancing Code Search Dataset with Matching Code", "first_author": "Gong", "year": 2024, "citation_count": 6, "branches": ["foundations", "techniques"], "notes": [{"branch": "foundations", "k": "Code-search eval built from genuine developer web-search queries, not synthetic docstrings", "r": "Tests the real intent&rarr;code gap with queries drawn from search logs"}], "reading_rank": 0, "arxiv": "2406.11589"}, {"bibcode": "2024arXiv240519782C", "title": "Dataflow-Guided Retrieval Augmentation fo nt": 0, "branches": ["frontier", "enterprise"], "notes": [{"branch": "frontier", "k": "Quantifies benchmark/pretraining overlap via surface- and semantic-level matching", "r": "Models score higher on the seen subset of HumanEval/MBPP: the empirical case for contamination-proof eval"}], "reading_rank": 0, "arxiv": "2403.04811"}], "sections": [{"key": "foundations", "label": "Why Code != Text IR", "subtopic": "Code retrieval is not text IR with a different corpus: query/code vocabulary mismatch, an open code lexicon, and meaning that lives in structure all break the assumptions of classical IR.", "themes": ["Vocabulary mismatch: a developer's query and the target snippet often share almost no tokens (CodeSearchNet).", "Open vocabulary: code coins identifiers endlessly, so OOV cripples neural LMs (Big Code != Big Vocabulary).", "Structure is signal text IR throws away: data/control flow, call graphs (MISIM, GraphCodeBERT).", "The intent&rarr;query&rarr;code chain is lossy at every hop, spawning a whole query-reformulation subfield.", "Even metrics can't be borrowed: CodeBLEU re-injects AST + data flow that BLEU and exact-match miss.", "Industry consensus: 'mgrep finds the file, grep finds the line' &mdash; no single mode suffices, everyone ends up hybrid."], "how_measured": ["CodeSearchNet (2019): paired (docstring, function), 6 languages, MRR.", "CoIR (2024): comprehensive multi-task multi-language code-IR suite, the modern successor.", "CoSQA+ (2024): real developer web-search queries.", "CodeBLEU (2020): AST + data-flow-aware synthesis metric (vs BLEU / exact-match)."], "gaps": ["Cross-paper retrieval scores (MRR on CodeSearchNet) are not apples-to-apples; preprocessing and language subsets differ &mdash; the fragmentation CoIR was built to fix.", "Pre-2016 classic lexical/structural search (Sourcerer, Portfolio, Sniff, grep/ctags) is absent (pre-arXiv venues)."], "notable": ["CodeBERT is the seminal bimodal encoder and the token-level baseline its structure-aware successors react to.", "CodeMatcher is the 'strong lexical baseline' that should temper any pure-neural pitch."], "papers": ["2019arXiv190909436H", "2020arXiv200208155F", "2020arXiv200910297R", "2020arXiv200307914K", "2020arXiv200605265Y", "2021arXiv210809646M", "2024arXiv240702883L", "2024arXiv240611589G", "2022arXiv220402765D", "2023arXiv231107989Z", "2016arXiv160508535G", "2020arXiv200812193H", "2020arXiv200514373L"]}, {"key": "techniques", "label": "Techniques: Lexical/Neural/Graph", "subtopic": "An additive ladder, not a sequence of replacements: lexical owns rare tokens, dense embeddings own intent, graph methods own behavior, and cascades place each technique where its cost is justified.", "themes": ["Rung 1 &mdash; lexical/trigram/BM25: fast, exact, interpretable, owns rare-token recall (Zoekt lineage, CodeMatcher).", "Rung 2 &mdash; neural bi-encoders + contrastive learning: CodeBERT, ContraCode, CoCoSoDa; need hard negatives (RocketQA) or they underperform.", "Rung 3 &mdash; AST/graph: data flow (GraphCodeBERT), flow graphs (deGraphCS), GNNs (GraphSearchNet), graph matching.", "Rung 4 &mdash; hybrid retrieve-then-rerank / late interaction: multi-stage ranking (Lin et al.), ColBERT, Cascaded Fast & Slow, CoRNStack.", "Fuse on ranks, not scores: BM25 and dense lanes live on incomparable scales; RRF sidesteps calibration.", "Contriever is the receipt: unsupervised dense loses to BM25 &mdash; dense only wins with supervision."], "how_measured": ["CodeSearchNet / CoIR as the standing benchmark spine; MRR on code search.", "GraphCodeBERT: SOTA on code search, clone detection, translation, refinement.", "ColBERT: parity with full BERT rerankers at ~2 orders faster, ~4 orders fewer FLOPs/query.", "RocketQA / CoCoSoDa ablations attribute gains to hard-negative mining + augmentation."], "gaps": ["Dense/ANN index was down during gathering &mdash; recall is lexical/hybrid only; CoRNStack metrics unverified via live lookup.", "Graph methods are most expressive but cost parsing + GNN inference, hard to amortize across a multi-million-file monorepo."], "notable": ["The trade curves matter more than leaderboard rows: single-vector vs late-interaction (index size), token vs graph (parse cost), unsupervised vs supervised dense (training data).", "The 2026 industrial pipeline: Query &rarr; [BM25 top-20] + [Vector top-20] &rarr; RRF top-30 &rarr; cross-encoder rerank &rarr; top 5-10."], "papers": ["2020arXiv200908366G", "2020arXiv200208155F", "2022arXiv220303850G", "2021arXiv210900859W", "2020arXiv200412832K", "2021arXiv211007811G", "2024arXiv240201007S", "2020arXiv200704973J", "2022arXiv220403293S", "2020arXiv201008191Q", "2021arXiv211209118I", "2022arXiv220110005N", "2020arXiv201006467L", "2021arXiv210313020Z", "2021arXiv211102671L", "2020arXiv201012908L", "2020arXiv201204188Z", "2020arXiv200208653W", "2020arXiv200303238W"]}, {"key": "repo-scale", "label": "Repository-Scale & Code Graphs", "subtopic": "A file is a unit you read; a repository is a world you navigate. The field forks into retrieve-better-snippets (iterated similarity RAG) versus query-a-structured-model (code graphs), with agentic navigation walking between them.", "themes": ["Camp 1 &mdash; similarity, iterated: RepoCoder's retrieve-generate-retrieve loop; DraCo steers it with dataflow.", "Camp 2 &mdash; query a structured world model: CodexGraph (graph DB + LLM-written queries), CodeGRAG (GNN expert), AOCI (symbolic-semantic blueprint).", "Code-property-graph / knowledge-graph lineage: QVoG at 1M+ LOC, Code Digital Twin for tacit knowledge.", "Camp 3 &mdash; agentic navigation: SWE-agent's agent-computer interface, OpenHands, MAGIS, LocAgent, CodePlan, ARISE.", "Localization is a first-class sub-problem; flat similarity misses fix sites several call/import hops from the symptom.", "Retrieval scope is three problems: local-aware, global-aware, third-party-library-aware (A^3-CodGen)."], "how_measured": ["RepoBench, CrossCodeEval: repo-level / cross-file completion (EM, identifier-F1).", "SWE-bench: issue-resolution (Pass@k) the agentic camp competes on.", "LocAgent: 92.7% file-level localization, +12% Pass@10, ~86% cheaper with a fine-tuned 32B.", "QVoG: ~15 min vs ~19 min (CodeQL) at 1M+ LOC; AOCI: 2,160 evals + 19 industrial tasks, zero defects."], "gaps": ["Graphs cost a static-analysis build step + language-specific extractors + index maintenance; similarity RAG is cheaper and language-agnostic.", "Referenced-but-uncorpus: RepoGraph (ICLR 2025), GRACE multi-semantic code graphs (arXiv:2509.05980) &mdash; the next reading.", "Many results are small-N arXiv preprints (Jin n=24 localization tasks; AOCI industrial slice n=19)."], "notable": ["Industrial primitives are the ancestors of the academic 'code knowledge graph': Kythe (build-integrated), Glean (incremental Angle index), SCIP (cross-repo precise nav), Zoekt (trigram).", "Jin 2026: across S-expr/JSON/YAML/Markdown there is no comprehension difference &mdash; pick descriptor format by safe-failure mode, not LLM preference."], "papers": ["2023arXiv230312570Z", "2023arXiv230603091L", "2023arXiv231011248D", "2024arXiv240719487W", "2024arXiv240212317S", "2023arXiv231006770J", "2024arXiv240515793Y", "2024arXiv240716741W", "2024arXiv240405427Z", "2025arXiv250309089C", "2026arXiv260503117S", "2024arXiv240601422M", "2023arXiv230912499B", "2026arXiv260502421L", "2024arXiv240608098L", "2025arXiv250318175S", "2026arXiv260410767C", "2025arXiv250307967P", "2024arXiv240203630L", "2026arXiv260422659L", "2024arXiv240902977L", "2024arXiv240909030W", "2023arXiv231205772L", "2024arXiv240803910L", "2024arXiv240502355D", "2024arXiv240317927T", "2024arXiv240519782C", "2024arXiv241204478K", "2026arXiv260413108J", "2025arXiv250321710Y"]}, {"key": "enterprise", "label": "Enterprise Codebase Challenges", "subtopic": "Scale does not just make existing problems bigger &mdash; it changes which problems exist: billions of LOC, polyglot dependency chains, access boundaries, dead code, tribal knowledge, build complexity, and an evaluation crisis where ground truth is contaminated or tautological.", "themes": ["Sheer size: Google ~2B LOC, 9M files, ~40K commits/day &mdash; query-time linear search is infeasible.", "Escalation ladder: grep &rarr; trigram (Zoekt) &rarr; semantic index (Kythe) &rarr; incremental build-integrated (Glean) &rarr; cross-repo precise nav (SCIP). Text layer and semantic layer are routinely conflated.", "Polyglot: defects hide at the language boundary; dependency-usage context (K-Trans) carries the hard-to-retrieve knowledge.", "Tribal/proprietary knowledge: the 'why' lives in a person or Slack thread; product context lifts decision compliance 46%&rarr;95%.", "Access-control boundaries: 'find references' that returns unreadable code is a leak &mdash; the thinnest academic sub-topic.", "Local benchmark projects encode the real enterprise tasks: EnterpriseBench (multi-repo nav, tool-access-as-variable, dead_code_necropsy), CodeScaleBench (benchmarks the retrieval engines, not just LLMs), codeprobe (contamination-proof probes, multi-source consensus)."], "how_measured": ["Published EnterpriseBench (arXiv:2510.27287): 550 tasks, access-control hierarchies, SOTA ~21.5% (best agents fail ~4/5).", "RepoQA: Searching-Needle-Function, 500 tasks / 50 repos / 5 languages; GPT-4 1.31% setup pass rate.", "MutaGReP: plans use <5% of a 128K window yet rival full-repo GPT-4o (LongCodeArena).", "Local CodeScaleBench (Haiku 4.5): mean reward 0.536 baseline &rarr; 0.565 MCP &mdash; real but modest.", "Local EnterpriseBench: 112 tasks, 51% spanning 2-5 real OSS repos via real dependency chains; checkpoint partial-credit, 9 artifact validators.", "codeprobe: multi-source consensus (Sourcegraph + AST oracle + grep, ship only when >=2 agree) + bias detectors (backend_overlap, overshipping, no_independent_baseline)."], "gaps": ["Access-control / retrieval-under-permission-boundaries is near-absent academically (only published EnterpriseBench + Sourcegraph compliance framing).", "Industrial systems (Kythe/Zoekt/Glean/SCIP) are blog-grounded, not peer-reviewed.", "Benchmark numbers collapse on production: Passerine reached ~73% plausible on machine-reported but only ~25.6% plausible / 17.9% correct on human-reported Google bugs."], "notable": ["The ground-truth tautology: if you generate the 'right answer' with the same tool you are evaluating, you have measured nothing (codeprobe).", "Treat tool access as a controlled variable; always report a no-tool baseline &mdash; a tool that does not beat baseline is overhead (EnterpriseBench / CodeScaleBench).", "RepoQA finding: models often understand code better with comments removed &mdash; synthetic comments are a distractor."], "papers": ["2024arXiv240601359D", "2024arXiv240606025L", "2024arXiv240107339Z", "2024arXiv240915204B", "2024arXiv240913122W", "2024arXiv240811058J", "2025arXiv250215872K", "2023arXiv230902182C", "2025arXiv250417972A", "2026arXiv260508112D", "2025arXiv250318305O", "2024arXiv240814354Z", "2025arXiv250307967P", "2024arXiv240204141D", "2024arXiv241211869L", "2025arXiv250107531R", "2026arXiv260516517K"]}, {"key": "frontier", "label": "Frontier & Open Problems", "subtopic": "The bottleneck is no longer 'can a model write a function' but an infrastructure problem: put fresh, authorized, dependency-correct, build-grounded context in front of an agent inside a living monorepo.", "themes": ["Staleness-aware retrieval: stale context is net-negative &mdash; gate retrieval on freshness, not just relevance (Weng; DocSync).", "Incremental real-time indexing: reframe indexing cost from O(repository) to O(changes) (Glean) &mdash; almost no peer-reviewed work, industry holds the frontier.", "Graph-guided edit localization: 69.7% of correctly localized bugs need multi-hop KG traversal (KGCompass); GALA extends to multimodal GUI bugs.", "Symbolic+semantic fusion at monorepo scale: nobody ships the fused, always-fresh index &mdash; the unclaimed prize (AOCI, QVoG vs Kythe/SCIP/Zoekt/Glean).", "Access-control & tribal-knowledge retrieval: 'bounded delegation' with least-privilege scoping is what 860 developers asked for (To Copilot and Beyond).", "Honest evaluation: contamination (Riddell) and tool-vs-no-tool causality undermine benchmark numbers unless explicitly controlled."], "how_measured": ["Staleness: stale-only retrieval &rarr; obsolete-API refs 15/17 (Qwen2.5-Coder-7B), 13/17 (gpt-4.1-mini), +88.2/+76.5 pp vs current-only; no-retrieval passed 1/17.", "Localization: KGCompass 45.67% on SWE-bench-Lite at $0.20/repair.", "Tribal knowledge: +49 pp decision compliance from product context.", "Contamination: Riddell shows models score significantly higher on the seen subset of HumanEval/MBPP."], "gaps": ["Permission-aware retrieval and tribal-knowledge retrieval are the thinnest academically; enforcement leans on industry (PermLLM arXiv:2505.22860, Access Control for LLM Agents arXiv:2510.11108).", "Long-context-vs-retrieval policy is genuinely open and thin in this corpus (Gemini 1.5 long-context referenced but absent); RepoQA is the needle-in-haystack foil.", "Incremental indexing has almost no peer-reviewed coverage."], "notable": ["The defining bet: the first system that ships a fused symbolic+semantic index that stays fresh under O(changes) updates wins this frontier.", "Retrieval can hurt &mdash; Weng's result is direct dissent against RAG-maximalist orthodoxy and argues for retrieval gating."], "papers": ["2026arXiv260514478W", "2024arXiv241204478K", "2026arXiv260502163B", "2025arXiv250321710Y", "2026arXiv260408089L", "2025arXiv250309089C", "2026arXiv260503117S", "2026arXiv260502421L", "2024arXiv240608098L", "2026arXiv260407830C", "2026arXiv260508112D", "2026arXiv260425960J", "2026arXiv260524397C", "2025arXiv250318305O", "2024arXiv240606025L", "2024arXiv240304811R", "2026arXiv260413108J"]}], "reading": [["2020arXiv200208155F", "CodeBERT: A Pre-Trained Model for Programming and Natural Languages", "Foundations"], ["2019arXiv190909436H", "CodeSearchNet Challenge: Evaluating Semantic Code Search", "Foundations"], ["2023arXiv231006770J", "SWE-bench: Can Language Models Resolve Real-World GitHub Issues?", "Repo-scale / Enterprise"], ["2020arXiv200908366G", "GraphCodeBERT: Pre-training Code Representations with Data Flow", "Techniques"], ["2020arXiv200307914K", "Big Code != Big Vocabulary: Open-Vocabulary Models for Source Code", "Foundations"], ["2020arXiv200514373L", "CodeMatcher: Lexical Search Rivaling Neural Code Search", "Foundations / Techniques"], ["2024arXiv240702883L", "CoIR: A Comprehensive Benchmark for Code Information Retrieval", "Foundations"], ["2023arXiv230312570Z", "RepoCoder: Iterative Retrieval and Generation", "Repo-scale"], ["2023arXiv230603091L", "RepoBench: Repository-Level Code Auto-Completion", "Repo-scale"], ["2024arXiv240515793Y", "SWE-agent: Agent-Computer Interfaces", "Repo-scale"], ["2025arXiv250309089C", "LocAgent: Graph-Guided LLM Agents for Code Localization", "Repo-scale / Frontier"], ["2026arXiv260508112D", "Product Context Improves Agent Decision Compliance by 49%", "Enterprise / Frontier"]], "opportunities": [["Retrieval under access-control boundaries", "Make permission a first-class retrieval feature, not a post-hoc filter: 'find references' must respect what the caller is allowed to read, or it leaks. The thinnest academic sub-topic; enforcement leans on PermLLM-style permissioned LLMs and dynamic ACLs for agentic information flows."], ["Contamination-proof eval from private history", "Public benchmarks (HumanEval, SWE-bench) are memorized; Riddell quantifies the seen-subset advantage. Mine contamination-proof probes from private/own repo history (codeprobe) instead of trusting memorized public sets."], ["Symbolic+semantic hybrid index at monorepo scale", "Symbolic indexes (Kythe/SCIP) are precise but build-coupled; semantic embeddings are cheap but imprecise on exact references. Nobody ships the fused, always-fresh index &mdash; the unclaimed prize (AOCI, QVoG are the corpus anchors)."], ["Staleness-aware retrieval", "Carry commit timestamps / version pins into the index and decline stale context rather than serving it &mdash; Weng shows serving stale context is worse than serving nothing (obsolete-API refs in 15/17 samples)."], ["Polyglot dependency-aware retrieval", "Cross-language defects hide at the boundary; retrieving class definitions plus their dependencies is vital for code buildability (K-Trans: dependency-usage examples contribute most; Multilingual Code Intelligence survey)."], ["Tribal-knowledge retrieval", "The 'why' of a decision lives in people, Slack threads, design docs &mdash; never in source. A separate retrieval substrate for decisions/specs/personas lifted compliance 46%&rarr;95%; it is retrievable and measurably changes behavior."], ["Build-graph-grounded context selection", "What even is the dependency graph is a question the build system answers; ground context selection in the build graph (Kythe/Glean are build-integrated) rather than text similarity over files."], ["Tool-vs-no-tool causal evaluation", "The field lacks a clean isolation of 'did the tool help, or did the model already know?' Always report a no-tool baseline and isolate the tool variable (CodeScaleBench engines comparison; codeprobe MCP-vs-no-MCP isolation modes)."], ["Long-context vs retrieval policy", "When does a million-token full-repo dump beat selective retrieval? Capacity is not comprehension (RepoQA); a <5%-of-window grounded plan rivals full-repo GPT-4o (MutaGReP). The honest open question is the crossover point."], ["Incremental real-time index maintenance", "Reframe indexing from O(repository) to O(changes): a 40K-commits/day monorepo cannot be fully re-indexed per change. Glean is the production exemplar; peer-reviewed work is nearly absent."], ["Graph-guided edit localization", "Flat similarity structurally misses bug-fix sites: 69.7% of correctly localized bugs needed multi-hop KG traversal (KGCompass). Build a language-agnostic, incrementally-updatable repository graph before scaling embeddings."], ["Cost-latency-bounded retrieval at scale", "Latency and UX are first-order at enterprise scale (Meta CodeCompose). Design retrieval under explicit cost/latency budgets &mdash; a cascade that spends the expensive technique only on a short pre-pruned list."]], "design": [{"title": "CodeSearchNet → CoIR: the code-IR benchmark family", "bibcode": "2024arXiv240702883L", "task_design": "NL→code retrieval evaluated as ranking the correct function for a natural-language query. CodeSearchNet pairs (docstring, function) across 6 languages and was built explicitly around the query/code vocabulary gap; CoIR generalizes to a comprehensive multi-task, multi-language code-IR suite consolidating a fragmented landscape into one benchmark.", "data_generation": "CodeSearchNet harvests docstring/function pairs from open-source repos; CoIR aggregates and standardizes many code-IR tasks (text-to-code, code-to-code, retrieval-augmented) so models are compared on one preprocessing regime. CoSQA+ adds genuine developer web-search queries to escape synthetic-docstring bias.", "metrics": "Mean Reciprocal Rank (MRR) / nDCG / recall@k over a candidate pool; CoIR reports per-task and aggregate scores across languages.", "key_numbers": ["6 languages (CodeSearchNet)", "CoIR consolidates a multi-task multi-language suite (the modern successor)", "Cross-paper CodeSearchNet MRR is not apples-to-apples — the exact problem CoIR fixes"], "reusable_for_role": "Evaluation harness designers: use CoIR (not raw CodeSearchNet MRR) as the standing spine for comparing retrievers, and CodeBLEU-style structural metrics for synthesis — never plain BLEU or exact-match, which silently punish semantically-correct outputs."}, {"title": "LocAgent: graph-guided code localization", "bibcode": "2025arXiv250309089C", "task_design": "Given a GitHub issue, localize the file(s)/function(s) to edit by parsing the codebase into a directed heterogeneous graph (files/classes/functions as nodes; imports/invocations/inheritance as edges) and letting the agent do multi-hop reasoning over it, rather than flat similarity retrieval.", "data_generation": "Localization tasks derived from real issue-resolution benchmarks; graph constructed by static parsing of the repository, so it is language-agnostic and incrementally updatable.", "metrics": "File-level localization accuracy; downstream issue-resolution success (Pass@10); cost per task.", "key_numbers": ["92.7% file-level localization accuracy", "+12% issue-resolution success (Pass@10)", "~86% lower cost with a fine-tuned Qwen-2.5-Coder-32B vs proprietary SOTA", "Corroborated by KGCompass: 69.7% of localized bugs need multi-hop traversal"], "reusable_for_role": "Agent-infra builders: make localization its own measurable component (cf. MAGIS's Repository Custodian), build a repository graph before scaling embeddings, and traverse it with multi-hop reasoning to reach fix sites that are not lexically near the symptom."}, {"title": "EnterpriseBench (local): multi-repo navigation with tool-access as a controlled variable", "bibcode": "", "task_design": "Coding-agent navigation of large, distributed, MULTI-REPO enterprise codebases. 112 tasks / 10 task types / 7 workflow suites (Dependency Mgmt, Customer Escalation, Technical Debt, Feature Delivery, Incident Response, Platform Eng, Security Ops). Encodes monorepo boundary navigation, dead/stale code (dead_code_necropsy task type), polyglot dependency complexity, and config drift. Crucially makes tool access a controlled variable: grep/find vs Sourcegraph-MCP vs hybrid.", "data_generation": "51% of tasks span 2-5 real OSS repos via real dependency chains (grpc-go→etcd→kubernetes; protobuf→Go→Python→TS). Distinct from the published arXiv:2510.27287 namesake. Refuses to assume the agent can see everything.", "metrics": "Checkpoint partial-credit scoring with 9 artifact validators; contrasts SWE-bench / ITBench / DevOps-Gym; always reports a no-tool baseline.", "key_numbers": ["112 tasks / 10 task types / 7 workflow suites", "51% of tasks span 2-5 real OSS repos", "9 artifact validators", "Published EnterpriseBench (arXiv:2510.27287) SOTA ~21.5% — best agents fail ~4/5 enterprise tasks"], "reusable_for_role": "Enterprise eval designers: treat tool access as a controlled variable and always report a no-tool baseline (a tool that doesn't beat baseline is overhead); use checkpoint partial-credit and artifact validators instead of single pass/fail; pair with codeprobe's multi-source consensus to defeat the ground-truth tautology."}], "design_principles": ["Default to hybrid, not embeddings: treat exact/lexical match as a first-class lane and fuse with a dense retriever on ranks (RRF), not raw scores.", "Add a structural lane where you can parse the language: AST/data-flow signals (GraphCodeBERT/MISIM) pay off on symbol-level and cross-file queries; degrade to lexical+dense on files that don't parse.", "Spend the expensive technique only on the shortlist: a cheap first stage prunes the corpus; a cross-encoder or ColBERT-style late interaction reranks the top 20-30.", "Mine hard negatives or your embeddings underperform (RocketQA, CoCoSoDa) — the retriever is only as good as its negatives.", "Index, don't just embed: a static-analysis graph (CodexGraph) or symbolic-semantic blueprint (AOCI) answers multi-hop structural questions vector RAG cannot.", "Make localization its own component, separate from patch generation (MAGIS, LocAgent).", "Give the agent a map before it explores: front-load architecture context; undirected grep/glob is a measurable tax and search can backfire.", "Gate retrieval on freshness and permissions, not just relevance: stale or unauthorized context is worse than none.", "Treat tool access as a controlled variable in evals and always report a no-tool baseline.", "Budget for the half of the truth not in the source: a separate retrieval substrate for tribal/product knowledge can outweigh another point of code-search recall."], "design_pitfalls": ["Shipping 'semantic code search' as embeddings-only and being surprised it can't find OAuth2TokenValidator — embeddings miss rare exact identifiers that grep nails.", "Fusing lexical and dense lanes on raw scores; BM25 and cosine live on incomparable scales — fuse on ranks.", "Evaluating code retrieval/synthesis with text metrics (BLEU, exact-match), which punish semantically-correct outputs — use CodeBLEU and a real code-IR suite.", "Conflating the trigram text layer (Zoekt: where does this string appear) with the semantic layer (Kythe/SCIP: where is this symbol defined) — they answer different questions.", "Full-reindexing a 40K-commits/day monorepo: a stale index silently degrades every agent downstream; incremental indexing is architecture, not optimization.", "Serving stale retrieval results: under hidden freshness, retrieval was net-negative and injected obsolete APIs (Weng).", "Undirected exploration: more searching is not more finding — SWE-agent shows iterative search can degrade performance vs no search.", "Choosing descriptor formats by presumed LLM preference rather than safe-failure mode (JSON fails atomically, YAML silently corrupts 50%, S-expressions detect all structural errors).", "Trusting public-benchmark numbers as production capability — they collapse on human-reported enterprise work (Passerine ~25.6% vs ~73% machine-reported).", "The ground-truth tautology: generating the 'right answer' with the same tool you're evaluating measures nothing — require multi-source consensus (>=2 of {Sourcegraph, AST oracle, grep})."], "temporal": {"publication_volume": [{"year": 2016, "count": 1, "note": "Deep API Learning / DeepCS lineage — learning the NL→API mapping before the encoder era."}, {"year": 2019, "count": 1, "note": "CodeSearchNet establishes the foundational NL→code retrieval benchmark."}, {"year": 2020, "count": 15, "note": "The CodeBERT explosion: bimodal encoders, GraphCodeBERT data flow, ColBERT late interaction, MISIM, CodeMatcher, CodeBLEU, RocketQA — the technique ladder forms."}, {"year": 2021, "count": 6, "note": "Contrastive + graph rungs mature (Contriever, CodeT5, deGraphCS, GraphSearchNet); query reformulation review."}, {"year": 2022, "count": 4, "note": "Unified/cross-modal embeddings (UniXcoder, CoCoSoDa), survey consolidation, large-scale text+code contrastive."}, {"year": 2023, "count": 8, "note": "Repo-scale arrives: RepoCoder, RepoBench, CrossCodeEval, SWE-bench, CodePlan, A^3-CodGen — retrieval becomes navigation."}, {"year": 2024, "count": 29, "note": "The agentic + graph + RAG wave: SWE-agent, OpenHands, CodexGraph, DraCo, QVoG, CoIR, RepoQA, MutaGReP plus the enterprise-completion cluster."}, {"year": 2025, "count": 8, "note": "Graph-guided localization and knowledge graphs (LocAgent, KGCompass, Code Digital Twin, K-Trans); industrial-scale clone detection."}, {"year": 2026, "count": 13, "note": "Frontier: staleness diagnostics, doc-drift, multimodal graph localization, symbolic-semantic indexing, access-control/tribal-knowledge framing, contamination-aware eval."}], "citation_trajectories": [{"bibcode": "2020arXiv200208155F", "title": "CodeBERT", "per_year": [{"year": 2020, "citations": 914}]}, {"bibcode": "2019arXiv190909436H", "title": "CodeSearchNet", "per_year": [{"year": 2019, "citations": 780}]}, {"bibcode": "2020arXiv200908366G", "title": "GraphCodeBERT", "per_year": [{"year": 2020, "citations": 457}]}, {"bibcode": "2021arXiv210900859W", "title": "CodeT5", "per_year": [{"year": 2021, "citations": 366}]}, {"bibcode": "2023arXiv231006770J", "title": "SWE-bench", "per_year": [{"year": 2023, "citations": 243}]}], "benchmark_progression": ["2019: CodeSearchNet — the foundational NL→code retrieval yardstick (MRR, 6 languages).", "2020: CodeBLEU re-grounds synthesis evaluation in AST + data flow.", "2023: RepoBench / CrossCodeEval make cross-file completion measurable; SWE-bench makes real issue resolution the agentic yardstick.", "2024: CoIR consolidates code-IR eval; RepoQA tests long-context understanding; CodeRAG-Bench isolates whether retrieval helps.", "2025-2026: localization-specific (KGCompass, LocAgent), staleness diagnostics (Weng), contamination-aware (Riddell), and enterprise sandboxes (published EnterpriseBench ~21.5% SOTA) — the bars move from 'retrieve from a visible repo' to 'navigate a repo you can't fully see, freshly and honestly'."], "narrative": "The field matured along one arc: borrow text IR, discover it breaks on code, then climb a technique ladder (lexical → neural → graph → rerank) before scaling from file to repository to enterprise. Citations concentrate in the 2020 encoder wave (CodeBERT, GraphCodeBERT) and the 2023 SWE-bench pivot to issue resolution, but the volume center of gravity is the 2024 agentic/graph/RAG explosion. By 2026 the frontier is explicitly an infrastructure problem — freshness, access-control, multi-hop graph localization, and honest tool-causal evaluation — where industry (Kythe, Glean, SCIP, Zoekt) still leads the peer-reviewed literature."}}</script>
<script>
const D = JSON.parse(document.getElementById('data').textContent);
const byBc = {}; D.papers.forEach(p=>byBc[p.bibcode]=p);
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const adsurl = bc => 'https://ui.adsabs.harvard.edu/abs/'+encodeURIComponent(bc);
const axurl = p => p.arxiv ? 'https://arxiv.org/abs/'+p.arxiv : null;

// nav
const NAV = [
  {k:'__home',l:'Overview'},
  {grp:'Explore'},
  {k:'__all',l:'All papers'},
  {k:'__reading',l:'★ Reading path'},
  {k:'__opps',l:'★ Opportunities'},
  {k:'__design',l:'Design deep-dives'},
  {k:'__timeline',l:'Timeline'},
  {grp:'Themes'},
  ...D.sections.map(s=>({k:s.key,l:s.label,n:s.papers.length})),
];
let active='__home', q='', fyear='', fbranch='', fsort='rel';

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(it=>{
    if(it.grp){const d=document.createElement('div');d.className='grouphdr';d.textContent=it.grp;nav.appendChild(d);return;}
    const b=document.createElement('button');b.dataset.k=it.k;
    b.innerHTML=esc(it.l)+(it.n!=null?`<span class="count">${it.n}</span>`:'');
    if(it.k===active)b.classList.add('active');
    b.onclick=()=>{active=it.k;render();};
    nav.appendChild(b);
  });
}
// year + branch filter options
(function(){
  const ys=[...new Set(D.papers.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const fy=document.getElementById('fyear'); ys.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;fy.appendChild(o);});
  const fb=document.getElementById('fbranch');
  Object.entries(D.branch_labels).forEach(([k,l])=>{const o=document.createElement('option');o.value=k;o.textContent=l;fb.appendChild(o);});
})();
document.getElementById('q').oninput=e=>{q=e.target.value.toLowerCase();render();};
document.getElementById('fyear').onchange=e=>{fyear=e.target.value;render();};
document.getElementById('fbranch').onchange=e=>{fbranch=e.target.value;render();};
document.getElementById('fsort').onchange=e=>{fsort=e.target.value;render();};

function hl(t){ if(!q)return esc(t); const i=(t||'').toLowerCase().indexOf(q); if(i<0)return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length)); }

function paperMatches(p){
  if(fyear && String(p.year)!==fyear) return false;
  if(fbranch && !p.branches.includes(fbranch)) return false;
  if(q){ const hay=(p.title+' '+p.first_author+' '+p.bibcode+' '+p.notes.map(n=>n.k+' '+n.r).join(' ')).toLowerCase();
    if(!hay.includes(q)) return false; }
  return true;
}
function sortPapers(arr){
  const a=[...arr];
  if(fsort==='cit') a.sort((x,y)=>(y.citation_count||0)-(x.citation_count||0));
  else if(fsort==='year') a.sort((x,y)=>(y.year||0)-(x.year||0));
  else if(fsort==='title') a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  return a;
}
function cardHTML(p){
  const ax=axurl(p);
  const chips=p.branches.map(b=>`<span class="chip b">${esc(D.branch_labels[b]||b)}</span>`).join('');
  const cit=(p.citation_count!=null)?`<span class="cit">${p.citation_count} cites</span>`:'';
  const rk=p.reading_rank?`<span class="rank">★ read #${p.reading_rank}</span>`:'';
  const notes=p.notes.map(n=>`
     <div class="lbl">${esc(D.branch_labels[n.branch]||n.branch)} &middot; contribution</div><p>${hl(n.k)}</p>
     ${n.r?`<div class="lbl">why it matters</div><p>${hl(n.r)}</p>`:''}`).join('');
  return `<div class="card ${p.reading_rank?'read':''}" data-bc="${esc(p.bibcode)}">
    <div class="ttl">${hl(p.title||p.bibcode)}</div>
    <div class="meta">${rk}<span>${esc(p.first_author||'')}${p.year?', '+p.year:''}</span>${cit}<code class="bc-code">${esc(p.bibcode)}</code>${chips}</div>
    <div class="body">${notes}
      <div class="links"><a href="${adsurl(p.bibcode)}" target="_blank">ADS &#8599;</a>${ax?`<a href="${ax}" target="_blank">arXiv &#8599;</a>`:''}</div>
    </div></div>`;
}
function wireCards(){
  document.querySelectorAll('.card').forEach(c=>c.onclick=e=>{
    if(e.target.tagName==='A')return; c.classList.toggle('open');});
}
function renderList(bcs){
  let arr = bcs ? bcs.map(b=>byBc[b]).filter(Boolean) : D.papers;
  arr = sortPapers(arr.filter(paperMatches));
  document.getElementById('resultcount').textContent = arr.length+' paper'+(arr.length!=1?'s':'');
  return arr.length? arr.map(cardHTML).join('') : '<div class="empty">No papers match.</div>';
}
function panel(cls,title,items){ if(!items||!items.length)return'';
  return `<div class="panel ${cls}"><h3>${esc(title)}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`; }

function showControls(on){document.getElementById('controls').style.display=on?'flex':'none';}

function render(){
  buildNav();
  const v=document.getElementById('view');
  if(active==='__home'){ showControls(false); v.innerHTML=homeHTML(); }
  else if(active==='__all'){ showControls(true); v.innerHTML='<h2 class="sectionhead">All papers</h2>'+renderList(null); wireCards(); }
  else if(active==='__reading'){ showControls(false); v.innerHTML=readingHTML(); wireCards(); }
  else if(active==='__opps'){ showControls(false); v.innerHTML=oppsHTML(); }
  else if(active==='__design'){ showControls(false); v.innerHTML=designHTML(); }
  else if(active==='__timeline'){ showControls(false); v.innerHTML=timelineHTML(); }
  else { showControls(true); const s=D.sections.find(x=>x.key===active);
    v.innerHTML=`<h2 class="sectionhead">${esc(s.label)}</h2><p class="subtopic">${esc(s.subtopic)}</p>`
      +panel('themes','Themes',s.themes)+panel('measured',"Evidence &amp; benchmarks",s.how_measured)
      +panel('gaps','Open gaps',s.gaps)+panel('notable','Notable results / metrics',s.notable)
      +'<h3 style="margin:16px 0 8px">Papers</h3>'+renderList(s.papers); wireCards(); }
  window.scrollTo(0,0);
}
function homeHTML(){
  const m=D.meta||{};
  const stats=`${D.papers.length} papers \u00b7 ${D.sections.length} themes`+(D.reading&&D.reading.length?` \u00b7 ${D.reading.length}-paper reading path`:'');
  let h=`<h2 class="sectionhead">Overview</h2><p class="subtopic">${esc(stats)}</p>`;
  if(m.what_is){h+=`<div class="panel"><h3>What this is</h3><p class="val">${m.what_is}</p>`+(m.caveat?`<p class="hint">${m.caveat}</p>`:'')+`</div>`;}
  if(m.start_here&&m.start_here.length){h+=`<div class="panel"><h3>Start here</h3><ul style="margin:0;padding-left:18px">`+m.start_here.map(s=>`<li style=\"margin-bottom:6px\">${s}</li>`).join('')+`</ul></div>`;}
  if(m.one_paragraph){h+=`<div class="panel themes"><h3>The field in one paragraph</h3><p class="val">${m.one_paragraph}</p></div>`;}
  if(m.podcast){h+=`<div class="panel measured"><h3>Companion podcast</h3><p class="val">${m.podcast}</p></div>`;}
  return h;
}
function readingHTML(){
  let rows=D.reading.map((r,i)=>{const p=byBc[r[0]];
    return `<div class="readrow"><div class="rk">${i+1}</div><div class="grp">${esc(r[2])}</div>
      <div><a href="#" onclick="event.preventDefault();openOne('${r[0]}')"><b>${esc(r[1])}</b></a>
      <div class="hint">${esc(p?p.bibcode:r[0])}${p&&p.citation_count!=null?' · '+p.citation_count+' cites':''} · <a href="${adsurl(r[0])}" target="_blank">ADS</a>${p&&p.arxiv?` · <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv</a>`:''}</div></div></div>`;
  }).join('');
  return `<h2 class="sectionhead">&#9733; Reading path</h2><p class="subtopic">Thirteen papers to get current fast, grouped by focus area. Click a title to expand its card inline.</p>${rows}
  <div id="oneview" style="margin-top:16px"></div>`;
}
function openOne(bc){const p=byBc[bc];const o=document.getElementById('oneview');
  if(!p){o.innerHTML='<div class="empty">Not in the extracted set. Open it via the ADS link above.</div>';return;}
  o.innerHTML=cardHTML(p);o.querySelector('.card').classList.add('open');wireCards();o.scrollIntoView({behavior:'smooth'});}
function oppsHTML(){
  return `<h2 class="sectionhead">&#9733; Prioritized opportunities</h2><p class="subtopic">Open opportunities and white-space, ranked by leverage.</p>`
   +D.opportunities.map((o,i)=>`<div class="op"><div class="rk">${i+1}</div><div><div class="n">${esc(o[0])}</div><div class="val">${esc(o[1])}</div></div></div>`).join('');
}
function designHTML(){
  let out=`<h2 class="sectionhead">Design deep-dives</h2><p class="subtopic">Deep dives into keystone systems and benchmarks: design, evidence, and what is reusable.</p>`;
  D.design.forEach(p=>{
    out+=`<div class="panel dd"><h3>${esc(p.title)}</h3><div class="bc">${esc(p.bibcode)} &middot; <a href="${adsurl(p.bibcode)}" target="_blank">ADS</a></div>
      <div class="field"><div class="lbl">Task design</div><div class="val">${esc(p.task_design)}</div></div>
      <div class="field"><div class="lbl">Data / trajectory generation</div><div class="val">${esc(p.data_generation)}</div></div>
      <div class="field"><div class="lbl">Metrics</div><div class="val">${esc(p.metrics)}</div></div>
      <div class="field"><div class="lbl">Key numbers</div><div class="kv-wrap">${(p.key_numbers||[]).map(k=>`<div class="kv">${esc(k)}</div>`).join('')}</div></div>
      <div class="field"><div class="lbl">Reusable / transferable</div><div class="val">${esc(p.reusable_for_role)}</div></div></div>`;
  });
  out+=panel('themes','Cross-cutting design principles',D.design_principles);
  out+=panel('gaps','Pitfalls to avoid',D.design_pitfalls);
  return out;
}
function timelineHTML(){
  const pv=D.temporal.publication_volume; const mx=Math.max(...pv.map(x=>x.count||0));
  const bars=pv.map(x=>`<div class="bar"><div class="n">${x.count}</div><div class="col" style="height:${Math.round((x.count/mx)*100)}%"></div><div class="yr">${x.year}</div></div>`).join('');
  const notes=pv.map(x=>x.note?`<li><b>${x.year}:</b> ${esc(x.note)}</li>`:'').join('');
  const yrs=[2023,2024,2025,2026];
  const trows=D.temporal.citation_trajectories.map(c=>{
    const m={}; (c.per_year||[]).forEach(p=>m[p.year]=p.citations);
    const peak=Math.max(...Object.values(m).map(Number).filter(n=>!isNaN(n)),0);
    const cells=yrs.map(y=>{const v=m[y]; return `<td class="num ${v===peak&&v?'peak':''}">${v!=null?v:'&ndash;'}</td>`;}).join('');
    return `<tr><td><a href="${adsurl(c.bibcode)}" target="_blank">${esc(c.title)}</a></td>${cells}</tr>`;
  }).join('');
  const prog=D.temporal.benchmark_progression.map(s=>`<li>${esc(s)}</li>`).join('');
  return `<h2 class="sectionhead">Timeline: the 2023 to 2026 acceleration</h2>
  <div class="panel"><h3>Publication volume (topical working set)</h3><div class="bars">${bars}</div>
    <ul class="hint" style="margin-top:10px">${notes}</ul></div>
  <div class="panel"><h3>Keystone citation trajectories (citations per year)</h3>
    <div class="traj"><table><tr><th>Paper</th>${yrs.map(y=>`<th class="num">${y}${y===2026?'*':''}</th>`).join('')}</tr>${trows}</table></div>
    <p class="hint" style="margin-top:10px">* 2026 is a partial year (about 5 months). Green marks the peak year. Per-year edge counts from the citation graph.</p></div>
  <div class="panel notable"><h3>Benchmark frontier by year</h3><ul>${prog}</ul></div>
  <div class="panel"><h3>Narrative</h3><p class="narr">${esc(D.temporal.narrative)}</p></div>`;
}
// theme toggle (light is the reading-optimized default; choice persists)
const TKEY='litx-code';
function setTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem(TKEY,t);}catch(e){}
  const b=document.getElementById('themebtn');if(b)b.innerHTML=(t==='dark'?'☀ Light':'☾ Dark');}
setTheme((()=>{try{return localStorage.getItem(TKEY)||'light';}catch(e){return 'light';}})());
document.getElementById('themebtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
// '/' focuses search when the box is visible
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){const el=document.getElementById('q');
    if(el&&el.offsetParent!==null){e.preventDefault();el.focus();el.select();}}
  if(e.key==='Escape'&&document.activeElement.id==='q'){q='';document.getElementById('q').value='';render();}
});
render();
</script>
