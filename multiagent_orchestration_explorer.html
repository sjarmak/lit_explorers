<script id="data" type="application/json">{"meta":{"title":"Multi-Agent Orchestration","h1":"Multi-Agent Orchestration","sub":"Literature explorer &middot; 92 papers, 5 themes &middot; SciX MCP (arXiv + ADS) + industry sources &middot; built 2026-06-08","tkey":"litx-mas","what_is":"An opinionated map of the LLM multi-agent orchestration literature, from the 2023 framework wave through the 2026 reliability frontier. It was assembled with the SciX MCP server (NASA ADS + arXiv mirror) as a seed, fanned out across five sub-agent deep dives, and stitched together with vendor and industry engineering sources where peer-reviewed coverage is thin.","caveat":"The SciX dense/ANN vector index was down during collection, so corpus recall is lexical/hybrid only &mdash; treat coverage as a floor, not a census. Many 2025&ndash;2026 entries are low- or zero-citation preprints presented as emerging vocabulary, not settled fact. Production-engineering knowledge (observability, SRE-for-agents, incident postmortems) is drawn mostly from vendor/industry blogs because it is near-absent from peer review.","start_here":["<b>&#9733; Reading path.</b> Start with the Guo 2024 survey for the taxonomy, then AutoGen / MetaGPT / Generative Agents for the founding patterns, then the 2025&ndash;2026 scaling, failure, and reliability work that defines the frontier. See the Reading list for a 12-paper onboarding order.","<b>&#9733; Opportunities.</b> Twelve open problems &mdash; causal failure attribution, verified coordination, cost-bounded orchestration, durable team memory, and more &mdash; are catalogued under Opportunities, each now with a named 2026 system attacking it.","<b>Design deep-dives.</b> Three keystone systems (AutoGen, Magentic-One, Generative Agents) are dissected for task design, evidence, key numbers, and what is reusable in your own builds.","<b>Timeline.</b> The Temporal view traces the 2023 framework explosion, the 2024&ndash;2025 consolidation, and the 2026 turn toward reliability, security, and cost.","<b>Themes</b> (left nav). Five threads: Foundations &amp; Topologies, Patterns &amp; Frameworks, Memory in MAS, Enterprise &amp; Production, and Frontier &amp; Open Problems."],"one_paragraph":"Multi-agent orchestration began in 2023 as a framework gold-rush &mdash; AutoGen's conversable agents, MetaGPT's role SOPs, ChatDev's chat-chain, CAMEL's role-play, and Du's multi-agent debate established that decomposition, specialization, and cross-checking could push LLMs past single-agent ceilings, while Park's Generative Agents proved memory-driven societies could behave believably. By 2024&ndash;2025 the question shifted from 'can agents collaborate' to 'should they, and how': scaling studies split into an optimist camp (MacNet's logistic collaborative scaling law over 1000+ agents) and a pessimist camp (SIMAS's non-monotonic diminishing returns), the MAST taxonomy named why systems fail, and Anthropic's production write-up quantified the cost &mdash; a 90.2% quality win at ~15&times; the token spend. 2026 is the reliability reckoning: the field now has hard numbers on security (architecture itself is the attack surface; stronger workers can be *less* safe), cost (affine-typed budgets, cost-aware cascades), memory (active broadcast over passive blackboards, fast-acquire/slow-consolidate), and observability (OpenTelemetry GenAI conventions), reframing orchestration as the classical distributed-systems problem of making stochastic components behave like a dependable system.","podcast":"Companion to the five-episode <b>Code Intel Digest &mdash; Multi-Agent Orchestration</b> deep-dive series (Foundations &amp; Topologies; Patterns &amp; Frameworks; Memory in Multi-Agent Systems; Enterprise &amp; Production; Frontier &amp; Open Problems).","note_r_label":"why it matters","measured_label":"Evidence &amp; benchmarks","design_label":"Reusable in practice","design_sub":"Deep dives into keystone systems: design, evidence, and what is reusable."},"branch_labels":{"foundations":"Foundations & Topologies","frameworks":"Patterns & Frameworks","memory":"Memory in MAS","production":"Enterprise & Production","frontier":"Frontier & Open Problems"},"papers":[{"bibcode":"2024arXiv240201680G","title":"LLM-based Multi-Agents: A Survey of Progress and Challenges","first_author":"Guo","year":2024,"citation_count":238,"branches":["foundations","frameworks"],"notes":[{"branch":"foundations","k":"Canonical survey of LLM multi-agent systems with the field's reference taxonomy of architectures, coordination patterns, and challenges.","r":"The single best entry point; the map every other paper is read against."}],"reading_rank":1,"arxiv":"2402.01680"},{"bibcode":"2023arXiv230808155W","title":"AutoGen: Enabling Next-Gen LLM Applications via Multi-Agent Conversation","first_author":"Wu","year":2023,"citation_count":600,"branches":["frameworks"],"notes":[{"branch":"frameworks","k":"Introduces the conversable-agent abstraction: agents that send and receive messages, with configurable human and tool participation, composed into flexible conversation patterns.","r":"The most-cited framework anchor; its primitives recur in every later vendor SDK (now absorbed into Microsoft Agent Framework)."}],"reading_rank":3,"arxiv":"2308.08155"},{"bibcode":"2023arXiv230800352H","title":"MetaGPT: Meta Programming for a Multi-Agent Collaborative Framework","first_author":"Hong","year":2023,"citation_count":470,"branches":["frameworks","memory"],"notes":[{"branch":"frameworks","k":"Encodes Standard Operating Procedures and a shared message pool so role agents publish structured artifacts (PRDs, designs, code) instead of free chat.","r":"Hardened role specialization into an org-chart program; its shared message pool is the lineage of the passive-blackboard team-memory pattern."}],"reading_rank":4,"arxiv":"2308.00352"},{"bibcode":"2023arXiv230514325D","title":"Improving Factuality and Reasoning in Language Models through Multiagent Debate","first_author":"Du","year":2023,"citation_count":406,"branches":["frameworks","frontier"],"notes":[{"branch":"frameworks","k":"Multiple LLM instances propose, critique, and revise across rounds; factuality and reasoning improve over single-model answers.","r":"Origin of the debate-improves-reasoning lineage that later work both extends (sparse topologies) and rebuts (cost of consensus)."}],"reading_rank":6,"arxiv":"2305.14325"},{"bibcode":"2023arXiv230707924Q","title":"ChatDev: Communicative Agents for Software Development","first_author":"Qian","year":2023,"citation_count":382,"branches":["frameworks"],"notes":[{"branch":"frameworks","k":"Organizes a virtual software company as a chat-chain of phase-scoped two-agent dialogues (design, code, test, document).","r":"Society-of-mind made operational; a foundational role-specialization system for software tasks."}],"reading_rank":7,"arxiv":"2307.07924"},{"bibcode":"2023arXiv230317760L","title":"CAMEL: Communicative Agents for Mind Exploration of LLM Society","first_author":"Li","year":2023,"citation_count":210,"branches":["frameworks"],"notes":[{"branch":"frameworks","k":"Introduces inception/role-play prompting: an AI-user and an AI-assistant prompt each other into staying on task without human turn-by-turn steering.","r":"The oldest role-specialization pattern in the corpus; seeds the autonomous role-play paradigm."}],"reading_rank":null,"arxiv":"2303.17760"},{"bibcode":"2023arXiv230810848C","title":"AgentVerse: Facilitating Multi-Agent Collaboration and Exploring Emergent Behaviors","first_author":"Chen","year":2023,"citation_count":178,"branches":["frameworks","foundations"],"notes":[{"branch":"frameworks","k":"A framework for assembling collaborating role agents that studies the emergent collaborative behaviors arising when agents work as a group.","r":"Early evidence that group dynamics, not just individual capability, shape multi-agent outcomes."}],"reading_rank":null,"arxiv":"2308.10848"},{"bibcode":"2023arXiv230603314T","title" passive shared pool rapidly descends into cognitive stagnation; Global Workspace Agents replace polling with an active broadcast hub, an entropy-based diversity drive, and bifurcated short-term/long-term memory.","r":"The hinge result for team memory: passive sharing fails; memory must be actively broadcast, curated, and consolidated."}],"reading_rank":null,"arxiv":"2604.08206"},{"bibcode":"2026arXiv260408377M","title":"SkillClaw: Shared Synchronized Workflow Memory across a Multi-User Agent Ecosystem","first_author":"Ma","year":2026,"citation_count":0,"branches":["memory"],"notes":[{"branch":"memory","k":"Aggregates cross-user trajectories into a shared, synchronized workflow-memory repo; an autonomous evolver turns recurring patterns into skill refinements that propagate system-wide.","r":"Stops workflows and failure modes from being repeatedly rediscovered per user &mdash; procedural memory at ecosystem scale."}],"reading_rank":null,"arxiv":"2604.08377"},{"bibcode":"2026arXiv260411811P","title":"M*: Every Task Deserves Its Own Memory Harness","first_author":"Pan","year":2026,"citation_count":0,"branches":["memory"],"notes":[{"branch":"memory","k":"Argues a memory system optimized for one purpose fails to transfer, and uses reflective code-evolution to auto-discover a task-specialized memory program (Schema + Logic + Instructions).","r":"The contrarian counterweight to one-shared-substrate: per-task specialization as a live, unsolved design axis."}],"reading_rank":null,"arxiv":"2604.11811"},{"bibcode":"2026arXiv260411337R","title":"Governance by Design: A Parsonian Institutional Audit of an Agent Ecosystem","first_author":"Ruan","year":2026,"citation_count":0,"branches":["memory","production"],"notes":[{"branch":"memory","k":"A Parsonian governance audit of a large agent ecosystem (250k+ stars, 770k+ agents, 2M+ users) finds <=19% governance coverage and zero of twelve coordination pathways functional.","r":"Macro-scale rebuttal to 'conventions emerge automatically'; shared substrate is necessary but not sufficient without governance."}],"reading_rank":null,"arxiv":"2604.11337"},{"bibcode":"2026arXiv260520616Y","title":"Auto-Dreamer: CLS-based Fast Acquisition and Slow Consolidation of Agent Memory","first_author":"Ye","year":2026,"citation_count":0,"branches":["memory"],"notes":[{"branch":"memory","k":"Invokes Complementary Learning Systems theory to decouple fast per-session memory acquisition from slow cross-session consolidation; a learned offline consolidator synthesizes compact replacements that supersede bloated regions.","r":"Makes records-management-as-consolidation executable: +7 on ScienceWorld with a 12x smaller memory bank, transferring without retraining."}],"reading_rank":null,"arxiv":"2605.20616"},{"bibcode":"2026arXiv260602304Z","title":"Unified Context Evolution (UCE): A Typed Library of Evolvable Context Units","first_author":"Zhu","year":2026,"citation_count":0,"branches":["memory"],"notes":[{"branch":"memory","k":"A gradient-free typed library of Evolvable Context Units (Memory, Strategy, Workflow, Skill), each generated from trajectories, quality-scored through use, and pruned when no longer valuable.","r":"Records-management governance for a team substrate: typing + quality tracking + retention carry the gains (ALFWorld 75.4%->96.3%)."}],"reading_rank":null,"arxiv":"2606.02304"},{"bibcode":"2026arXiv260423459H","title":"Architecture Matters: Security in Multi-Agent Systems","first_author":"Hagag","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Across three environments and 13 configurations, multi-agent setups were more vulnerable than single agents in most configs, with attack-success rates varying up to 3.8x at equal-or-higher benign accuracy; no design was universally safer.","r":"Kills the intuition that decomposition is inherently a defense &mdash; the architecture itself is the security variable."}],"reading_rank":12,"arxiv":"2604.23459"},{"bibcode":"2026arXiv260421131A","title":"Cross-Session Threats: Memoryless Guardrails in Multi-Agent Systems","first_author":"Azarafrooz","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"An attacker who spreads a single attack across dozens of sessions evades every session-bound detector; session judges and full-log correlators lose ~half their recall, recovered by a bounded Coreset Memory Reader (K=50).","r":"Shows guardrails must be stateful across sessions, not just within one; releases CSTM-Bench."}],"reading_rank":null,"arxiv":"2604.21131"},{"bibcode":"2026arXiv260422879W","title":"Context-Fragmented Policy Violations in Multi-Agent Workflows","first_author":"Wu","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Each agent's action is locally safe but the actions collectively violate policy because policy facts are siloed across departments; eight frontier LLMs showed 14-98% violation rates, and a Distributed Sentinel with Semantic Taint Tokens reached F1=0.95 at 106 ms.","r":"Formalizes the confused-deputy export incident; guardrails must be distributed and zero-trust, not a monolithic gate."}],"reading_rank":null,"arxiv":"2604.22879"},{"bibcode":"2026arXiv260424477M","title":"GAMMAF: Graph-based Anomaly Monitoring of Multi-Agent Debates","first_author":"Mateo-Torrejon","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Models MAS debates as attributed graphs and benchmarks graph-based anomaly detectors that isolate flagged adversarial nodes live.","r":"Bridges security and observability &mdash; treats the interaction graph itself as the monitored signal."}],"reading_rank":null,"arxiv":"2604.24477"},{"bibcode":"2026arXiv260500914B","title":"The Cost of Consensus: When Multi-Agent Debate Underperforms Self-Correction","first_author":"Bertalanic","year":2026,"citation_count":0,"branches":["production","frontier"],"notes":[{"branch":"production","k":"Isolated self-correction beats unguided homogeneous multi-agent debate: debate fails via sycophantic conformity (up to 85.5%), contextual fragility (up to 70%), and consensus collapse (oracle gap up to 32.3 pp).","r":"The sharpest dissent against the multi-agent reflex; directly undercuts the debate-improves-reasoning lineage."}],"reading_rank":null,"arxiv":"2605.00914"},{"bibcode":"2025arXiv250403255G","title":"Liability and Accountability for AI Agents: A Principal-Agent Perspective","first_author":"Gabison","year":2025,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Frames the accountability question &mdash; who is responsible when the agent is wrong &mdash; through a principal-agent lens.","r":"Motivates interpretability, behavior evals, and fail-safe mechanisms as governance instruments."}],"reading_rank":null,"arxiv":"2504.03255"},{"bibcode":"2026arXiv260414723S","title":"Bounded Autonomy for Enterprise AI","first_author":"Sohail","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Typed action contracts, consumer-side execution, validation-before-side-effects, and optional human approval in a deployed multi-tenant app: 23/25 trials with zero unsafe executions vs 17/25 unconstrained, both at 13-18x speedup.","r":"The standout production-deployment result; two wrong-entity mutations escaped every automated layer and were caught only by human confirmation."}],"reading_rank":null,"arxiv":"2604.14723"},{"bibcode":"2026arXiv260409791A","title":"Pioneer Agent: Closed-Loop Continual Improvement of Small Models in Production","first_author":"Anonymous","year":2026,"citation_count":0,"branches":["production","frontier"],"notes":[{"branch":"production","k":"Closed-loop continual improvement of small models in production via automated data curation, failure diagnosis, and regression-constrained retraining (AdaptFT-Bench).","r":"Attacks the cost axis from the model side &mdash; supports SLM routing without regressions."}],"reading_rank":null,"arxiv":"2604.09791"},{"bibcode":"2026arXiv260604056K","title":"Token Budgets: An Empirical Catalog and Affine-Typed Mitigation of Orchestration Cost Overruns","first_author":"Khan","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Catalogs 63 confirmed production budget-overrun incidents across 21 orchestration frameworks into an 8-cluster taxonomy, and ships a Rust crate using affine ownership so double-spending a budget becomes a compile error.","r":"Moves cost control from a code-review comment into the type system; non-bypassable under operator error in multi-agent delegation."}],"reading_rank":null,"arxiv":"2606.04056"},{"bibcode":"2026arXiv260508715Z","title":"AgentForesight: Online Auditing for Early Failure Prediction in Agent Trajectories","first_author":"Zhang","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Reframes failure attribution as online auditing: a 7B auditor sees only the current trajectory prefix and must let the run continue or raise an alarm at the earliest decisive error.","r":"Shifts attribution from diagnose-after-death to intervene-while-alive; beats GPT-4.1 by up to +19.9% with 3x lower step-localization error."}],"reading_rank":null,"arxiv":"2605.08715"},{"bibcode":"2026arXiv260411978W","title":"HORIZON: A Cross-Domain Diagnostic Benchmark for Long-Horizon Agentic Tasks","first_author":"Wang","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"A diagnostic benchmark of 3,100+ trajectories from GPT-5 and Claude variants with a trajectory-grounded LLM-as-judge characterizing where and why long-horizon agentic tasks break.","r":"The empirical substrate for causal failure attribution at scale."}],"reading_rank":null,"arxiv":"2604.11978"},{"bibcode":"2026arXiv260420938S","title":"HARBOR: Harness Tuning as Constrained Bayesian Optimization","first_author":"Sengupta","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Argues the harness (compaction, tool caching, memory, trajectory reuse) is a first-class ML problem and formalizes harness tuning as constrained noisy Bayesian optimization over a mixed-variable config space.","r":"Automated search beats hand-tuned flag stacks once the configuration space exceeds a few bits."}],"reading_rank":null,"arxiv":"2604.20938"},{"bibcode":"2026arXiv260517480L","title":"The Capability Paradox: Stronger Workers, Less Secure Systems","first_author":"Liu","year":2026,"citation_count":0,"branches":["frontier","production"],"notes":[{"branch":"frontier","k":"Across 42,000 adversarial trials, stronger Worker agents made the system less secure (ASR 18.4%->63.9%, peak 94.4%); linguistic certainty mediates 74% of the effect via 'semantic hijacking.'","r":"Refutes 'use a smarter model'; confidence is weaponized, and a heterogeneous-ensemble defense cuts ASR from 52.8% to 2.0%."}],"reading_rank":null,"arxiv":"2605.17480"},{"bibcode":"2026arXiv260414799M","title":"Knowing When Not to Answer: Abstention in Multi-Agent VLM Systems (MM-AQA)","first_author":"Madhusudhan","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Benchmarks abstention (MM-AQA) and finds VLMs rarely abstain under standard prompting &mdash; even trivial confidence baselines beat them; multi-agent setups improve abstention but introduce new failure modes.","r":"Concrete evidence for the confidence-is-not-correctness thread in calibrated consensus."}],"reading_rank":null,"arxiv":"2604.14799"},{"bibcode":"2026arXiv260423366K","title":"GSAR: Grounded Consensus via Typed Claim Grounding for Hallucination Detection","first_author":"Kamelhar","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Operationalizes grounded consensus with a 4-way claim typology (grounded/ungrounded/contradicted/complementary), evidence-type-specific weights, and an asymmetric contradiction-penalized groundedness score driving a 3-tier replan decision.","r":"A concrete mechanism for separating confidence from correctness in team deliberation."}],"reading_rank":null,"arxiv":"2604.23366"},{"bibcode":"2026arXiv260419752A","title":"SWARM: Soft-Label Population-Level Governance for Emergent Multi-Agent Risk","first_author":"Aiersilan","year":2026,"citation_count":0,"branches":["frontier"],"notes":[{"branch":"frontier","k":"Replaces binary good/bad labels with soft probabilistic labels and adds governance levers (transaction taxes, circuit breakers, reputation decay, random audits) measured by expected-toxicity and quality-gap metrics over multi-seed scenarios.","r":"Evaluates the swarm, not the agent &mdash; targets risks no single agent produces in isolation."}],"reading_rank":null,"arxiv":"2604.19752"},{"bibcode":"2026arXiv260523023H","title":"AMBIPOM: How to Steer Your Multi-Agent System (Human-LLM Co-Planning)","first_author":"He","year":2026,"citation_count":0,"branches":["frontier","production"],"notes":[{"branch":"frontier","k":"Formalizes a human-LLM co-planning design space along three axes (mode, scope, level) and shifts supervision from outcome-level to process-level.","r":"A principled framework for optimal human-checkpoint placement in the loop."}],"reading_rank":null,"arxiv":"2605.23023"},{"bibcode":"2026arXiv260407494M","title":"Triage: Routing Software Engineering Tasks to Cost-Effective LLM Tiers via Code Quality Signals","first_author":"Madeyski, Lech","year":2026,"citation_count":0,"branches":["production"],"notes":[{"branch":"production","k":"Cost-tier routing for SWE tasks — closest single paper to the Gas City tiering problem.","r":"Surfaced by the 2026-06-11 dense-lane rerun (missed in the lexical-only window)."}],"arxiv":"2604.07494"},{"bibcode":"2024arXiv241010347D","title":"A Unified Approach to Routing and Cascading for LLMs","first_author":"Dekoninck, Jasper","year":2024,"citation_count":2,"bran 2023arXiv230403442P","2023arXiv230800352H","2024arXiv241104468F","2026arXiv260502431W","2026arXiv260408206S","2026arXiv260408377M","2026arXiv260411811P","2026arXiv260411337R","2026arXiv260520616Y","2026arXiv260602304Z","2026arXiv260604197M"]},{"key":"production","label":"Enterprise & Production","subtopic":"Reliability, security, cost, observability, and governance &mdash; the runtime properties that decide whether demo agents survive deployment.","themes":["Security: aggregation and architecture as the attack surface","Bounded autonomy, policy-as-code, and earned-autonomy thresholds","Observability via OpenTelemetry GenAI semantic conventions","Cost and multi-agent economics","Failure taxonomies and Byzantine-fault robustness","Distributed vs monolithic guardrail enforcement"],"how_measured":["Production failure-rate ranges (41-87%); adoption with full approval (14.4%)","Attack-success-rate variance across configs; cross-session detector recall; violation rates","Unsafe-execution counts and speedup under bounded autonomy (23/25, 13-18x)","Token-cost multipliers and variance attribution (~15x, ~80%)","OpenTelemetry span/metric coverage; acceptance-test pass/fail and LLM-judge rubrics"],"gaps":["Production engineering (observability, SRE-for-agents, incident postmortems) is web-only, near-absent from peer review","Where exactly the reliability-per-dollar optimum sits (verification vs cost)","Exact placement of human-in-the-loop checkpoints (too early loses speedup, too late the side effect fired)"],"notable":["Architecture Matters: up to 3.8x attack-success variance across 13 configs; no design universally safer","Context-Fragmented Violations: 14-98% violation rates; Distributed Sentinel F1=0.95 at 106 ms vs 0.85/0.65 baselines","Bounded Autonomy: 23/25 with zero unsafe executions vs 17/25; 2 mutations caught only by human confirmation","Cost of Consensus: sycophantic adoption up to 85.5%, oracle gap up to 32.3 pp"],"papers":["2025arXiv250313657C","2026arXiv260509076L","2026arXiv260407667F","2026arXiv260520874S","2025arXiv250211448L","2024arXiv240612934A","2024arXiv241007283L","2024arXiv241002644Z","2026arXiv260502964T","2026arXiv260411641L","2026arXiv260602755L","2026arXiv260412312Y","2025arXiv250323278H","2026arXiv260412262C","2026arXiv260423459H","2026arXiv260421131A","2026arXiv260422879W","2026arXiv260424477M","2026arXiv260500914B","2025arXiv250403255G","2026arXiv260414723S","2026arXiv260409791A","2024arXiv241016237M","2026arXiv260407775A","2026arXiv260522786A","2026arXiv260407494M","2024arXiv241010347D","2025arXiv250410681S","2024arXiv240702348K","2024arXiv240600060W","2025arXiv250219335R","2022arXiv220511747K"]},{"key":"frontier","label":"Frontier & Open Problems","subtopic":"The 2026 reliability reckoning: causal attribution, verified protocols, cost bounds, calibrated consensus, and emergent-behavior eval &mdash; each now with a named system and real numbers.","themes":["Online causal failure attribution (intervene-while-alive)","Formally verified coordination protocols (TLA+)","Cost-bounded orchestration and cognitive-tier routing","Calibrated consensus and principled abstention","Information-flow control and the capability paradox","Emergent-behavior and population-level evaluation","Replayable trace observability standards"],"how_measured":["Step-localization error and early-warning accuracy on annotated trajectories (AgentForesight, HORIZON)","Cap-violation and false-refusal counts under live-API budget tests (Token Budgets)","Adversarial attack-success-rate sweeps and mediation analysis (Capability Paradox)","Abstention rate vs confidence baselines (MM-AQA); groundedness scores (GSAR)","Expected-toxicity and quality-gap metrics over multi-seed scenarios (SWARM)"],"gaps":["No settled answer on where the reliability-per-dollar optimum sits","Several results are single-paper, 2026-vintage, not yet independently replicated","Per-agent alignment does not compose into swarm safety &mdash; emergent risk is hard to bound"],"notable":["Token Budgets: 63 incidents across 21 frameworks; affine-typed Rust crate makes double-spend a compile error (kappa=0.837)","Capability Paradox: ASR 18.4%->63.9% (peak 94.4%) as workers strengthen; certainty mediates 74%; ensemble defense cuts ASR 52.8%->2.0%","AgentForesight-7B: beats GPT-4.1 by up to +19.9% with 3x lower step-localization error","HORIZON: 3,100+ trajectories with human-kappa-validated LLM-as-judge attribution"],"papers":["2026arXiv260507935X","2026arXiv260604056K","2026arXiv260508715Z","2026arXiv260411978W","2026arXiv260420938S","2026arXiv260517480L","2026arXiv260407667F","2026arXiv260414799M","2026arXiv260423366K","2026arXiv260419752A","2026arXiv260523023H","2026arXiv260408963L","2026arXiv260412262C","2026arXiv260411641L","2026arXiv260409703L","2025arXiv250313657C","2026arXiv260502964T","2026arXiv260500914B","2026arXiv260409791A"]}],"reading":[["2024arXiv240201680G","LLM-based Multi-Agents: A Survey of Progress and Challenges","Foundations"],["2024arXiv240607155Q","Scaling LLM-based Multi-Agent Collaboration (MacNet)","Foundations"],["2023arXiv230808155W","AutoGen: Multi-Agent Conversation","Patterns & Frameworks"],["2023arXiv230800352H","MetaGPT: Meta Programming for a Multi-Agent Framework","Patterns & Frameworks"],["2023arXiv230403442P","Generative Agents: Interactive Simulacra of Human Behavior","Memory in MAS"],["2023arXiv230514325D","Improving Factuality & Reasoning through Multiagent Debate","Patterns & Frameworks"],["2023arXiv230707924Q","ChatDev: Communicative Agents for Software Development","Patterns & Frameworks"],["2024arXiv241104468F","Magentic-One: A Generalist Multi-Agent System","Foundations"],["2025arXiv250313657C","Why Do Multi-Agent LLM Systems Fail? (MAST)","Enterprise & Production"],["2026arXiv260526178Z","ATOM: Adaptive Nucleus-Electron Orchestration","Foundations"],["2025arXiv250323278H","Model Context Protocol (MCP): Landscape & Security","Patterns & Frameworks"],["2026arXiv260423459H","Architecture Matters: Security in Multi-Agent Systems","Enterprise & Production"]],"opportunities":[["Causal failure attribution in agent chains","Pinpoint which agent and step is responsible when a distributed, silent multi-agent failure surfaces &mdash; and do it online, at the earliest decisive error, rather than as a post-mortem."],["Formally verified coordination protocols","Model agent handoff and coordination protocols in a formal language (e.g. TLA+) and prove &mdash; or automatically repair &mdash; their safety, importing classical model checking into the agent world."],["Token-budget-aware orchestration planner","Plan and execute orchestration under a hard cost ceiling, making budget overruns (double-spend, delegation fanout races) impossible by construction rather than catching them at runtime."],["Durable shared team-memory substrate","Build a shared store a team can actively write to, consolidate, type, and prune &mdash; one that accumulates competence instead of slop and survives across sessions."],["Emergent-behavior evaluation harness","Evaluate the swarm rather than the agent: soft-label, population-level harnesses that measure risks no single agent produces in isolation, since per-agent alignment does not compose."],["Information-flow control between agents","Control what evidence and authority flow across agent boundaries so a locally-safe action cannot combine with others into a policy violation, and confidence cannot be weaponized into execution."],["Confidence-calibrated consensus","Separate agreement from correctness: principled abstention thresholds and grounded claim typing so a manager never treats an assertive worker report as evidence of truth."],["Learned dynamic topology per task","Learn the right communication graph per task and per query difficulty rather than fixing a static dense topology, escaping the average-complexity trap."],["Optimal human-checkpoint placement","Place human-in-the-loop checkpoints at exactly the decisions automation provably fails (entity disambiguation, irreversible mutations) without losing the speedup of autonomy."],["Replayable agent-trace observability standard","Standardize agent/workflow/tool/model spans and metrics so every reasoning chain is reconstructable &mdash; the substrate every other open problem (attribution, eval, cost) depends on."],["Cognitive-tier model routing","Route routine decisions to cheap models and escalate to expensive ones only on disagreement or difficulty, controlling cost without sacrificing quality."],["Cross-session organizational agent memory","Persist institutional memory &mdash; laws, roles, conventions, learned skills &mdash; across sessions and users so a team improves over time instead of rediscovering the same workflows and mistakes."]],"design":[{"title":"AutoGen — conversable agents as the framework primitive","bibcode":"2023arXiv230808155W","task_design":"Frame any multi-agent application as conversations among configurable conversable agents that send and receive messages, with humans and tools as first-class participants. Composition is the design surface: two-agent chats, group chats, and nested conversations encode planning, debate, and tool use.","data_generation":"No bespoke dataset; the contribution is the abstraction and its evaluation across diverse applications (math, coding, QA, decision-making, entertainment) showing the same primitives generalize.","metrics":"Task success across the demonstrated application suite; qualitative composability and developer-effort reduction. Citation weight (~600) stands in as an adoption/influence proxy.","key_numbers":["~600 citations &mdash; the most-influential framework anchor in the corpus","Now in maintenance mode under Microsoft Agent Framework (Oct 2025)"],"reusable_for_role":"Use AutoGen (or its successor) when you want a flexible conversation graph rather than a fixed pipeline. The conversable-agent + group-chat primitives map directly onto orchestrator-worker and debate patterns; pair with AutoGen Studio for no-code message-flow debugging before hard-coding a topology."},{"title":"Magentic-One — orchestrator-worker with a task ledger","bibcode":"2024arXiv241104468F","task_design":"A lead Orchestrator decomposes the goal, maintains a task ledger and a progress ledger, dispatches to specialized workers (web surfer, coder, file navigator), monitors progress, and re-plans when stuck. The ledger is both the working memory and the control plane.","data_generation":"Evaluated on agentic benchmarks (web and file tasks); the architecture is model-agnostic, with workers swappable behind the orchestrator.","metrics":"Task-completion rate on agentic benchmarks; robustness via re-planning when a worker stalls. The ledger pattern is the reference for inspectable shared working state.","key_numbers":["The canonical production orchestrator-worker reference architecture","Anthropic's industrial instance of the same pattern: +90.2% over single-agent Opus at ~15x token cost"],"reusable_for_role":"Reach for the orchestrator-worker + ledger pattern when the task is parallelizable and high-value and one agent's reasoning depth is the ceiling. Keep the ledger explicit and replayable so it doubles as your observability and failure-attribution substrate; budget for the ~15x token premium before committing."},{"title":"Generative Agents — memory-stream and reflection","bibcode":"2023arXiv230403442P","task_design":"Each agent keeps a memory stream of timestamped natural-language observations, retrieves entries by a weighted combination of relevance, recency, and importance, and periodically synthesizes higher-level reflections that feed back into planning and behavior.","data_generation":"A sandbox town of 25 agents; believability evaluated by human raters and ablations that remove observation, reflection, or planning to isolate each component's contribution.","metrics":"Human-rated believability of behavior; ablation deltas when memory components are removed; emergence of coordinated social behavior (e.g. organizing a party) from individual memories.","key_numbers":["~413 citations &mdash; the memory anchor of the field","25-agent sandbox society; ablations show retrieval + reflection are load-bearing for believability"],"reusable_for_role":"Adopt the memory-stream + reflection design whenever an agent or team must remember across long horizons. In a team setting, treat reflection as the consolidation step (acquire fast, consolidate slow), promote durable lessons into a shared, typed, pruned store, and keep many small focused memory files over few sprawling ones."}],"design_principles":["Default to a single agent; reach for multi-agent only when the task is parallelizable, high-value, and exceeds one agent's reasoning depth &mdash; the ~15x token premium is real.","Match the topology to the task: clean decomposition -> pipeline; planner-integrator -> orchestrator-worker; chatty flat teams -> impose hierarchy/leadership; shared evolving state -> blackboard.","Prefer adaptive, difficulty-conditioned topologies over static dense graphs to escape the average-complexity trap.","Treat coordination as an explicit architectural layer, and routing as a first-order design variable that defines the information topology.","Verify the two-layer requirement: a richer protocol buys nothing unless the downstream reasoning layer can exploit it.","Don't ship a passive blackboard as team memory; make writes active (broadcast/notify) and build in a diversity check that breaks deadlock.","Separate fast acquisition from slow consolidation, schedule the consolidation, and type + prune the shared store like a records manager.","Make autonomy bounded and typed: typed action contracts, validation-before-side-effects, and human confirmation at entity-disambiguation and irreversible-mutation points.","Distribute guardrails and keep them stateful across sessions; re-validate every cross-agent boundary as attacker-controlled.","Standardize traces on OpenTelemetry GenAI conventions and codify earned-autonomy thresholds backed by acceptance-test evals."],"design_pitfalls":["Assuming more agents monotonically helps &mdash; SIMAS shows non-monotonic, diminishing returns and the Cost of Consensus shows debate can underperform self-correction.","Treating decomposition as inherently safer &mdash; Architecture Matters finds multi-agent setups are more vulnerable in most configs (up to 3.8x attack-success variance).","Upgrading worker models reflexively &mdash; the Capability Paradox shows stronger workers can push attack success to 94% via weaponized linguistic certainty.","Mistaking agreement for correctness &mdash; plurality voting can discard correct answers already in the pool (oracle gap up to 32.3 pp).","Shipping a passive shared blackboard &mdash; naive agent loops descend into sycophancy, echo chambers, and cognitive stagnation.","Logging everything but never consolidating &mdash; the shared store drowns in slop without scheduled consolidation, typing, and pruning.","Relying on session-bound or monolithic guardrails &mdash; cross-session and context-fragmented violations live precisely in the gaps a central gate cannot see.","Placing human checkpoints by guesswork &mdash; too early forfeits the 13-18x speedup, too late and the irreversible side effect has already fired.","Letting budgets be a runtime prayer &mdash; delegation fanout races and double-spends should be compile-time or planner-level impossibilities, not after-the-fact incidents.","Treating one agent's output as trusted input to the next &mdash; injections launder themselves through trusted boundaries (Cline issue-title, LiteLLM, Copilot Studio)."],"temporal":{"publication_volume":[{"year":2022,"count":2,"note":"Pre-LLM swarm/stigmergy roots (emergent communication, virtual pheromones) that LLM teams later re-instantiate."},{"year":2023,"count":12,"note":"The framework gold-rush: AutoGen, MetaGPT, ChatDev, CAMEL, AgentVerse, Du debate, Generative Agents &mdash; the founding patterns land in one year."},{"year":2024,"count":21,"note":"Consolidation and scaling: surveys, MacNet's 1000+-agent scaling law, OpenHands, workflow memory, and the first security benchmarks (ASB, Prompt Infection)."},{"year":2025,"count":11,"note":"The failure turn: MAST names why systems fail; topology-as-lever and collective-memory (SHIMI, shared-KG) mature; MCP security enters the corpus."},{"year":2026,"count":46,"note":"The reliability reckoning: an explosion of security, cost, attribution, calibrated-consensus, memory-governance, and observability work &mdash; mostly zero-citation preprints presented as emerging vocabulary."}],"citation_trajectories":[{"bibcode":"2023arXiv230808155W","title":"AutoGen","per_year":[{"year":2023,"citations":600}]},{"bibcode":"2023arXiv230800352H","title":"MetaGPT","per_year":[{"year":2023,"citations":470}]},{"bibcode":"2023arXiv230403442P","title":"Generative Agents","per_year":[{"year":2023,"citations":413}]},{"bibcode":"2023arXiv230514325D","title":"Multiagent Debate (Du)","per_year":[{"year":2023,"citations":406}]},{"bibcode":"2024arXiv240201680G","title":"LLM-based Multi-Agents Survey (Guo)","per_year":[{"year":2024,"citations":238}]}],"benchmark_progression":["2023: founding frameworks establish that decomposition, role-play, and debate beat single-agent baselines (AutoGen, MetaGPT, Du debate, Generative Agents).","2024: scaling laws (MacNet, 1000+ agents, logistic growth) and the first security yardsticks (ASB, Prompt Infection) appear; workflow memory makes procedures reusable.","2025: MAST gives the field a 14-category failure taxonomy; topology is shown to be a first-class performance lever; MCP security and collective-memory systems mature.","2026: hard numbers on the frontier &mdash; affine-typed budgets (zero cap violations), online attribution (AgentForesight-7B +19.9%), the Capability Paradox (ASR up to 94.4%), and OpenTelemetry GenAI conventions as the trace standard."],"narrative":"The arc runs from euphoria to engineering. 2023 proved agent teams could do things single models could not; 2024-2025 asked whether the gains were real or just expensive, producing scaling laws, the MAST failure taxonomy, and the first security benchmarks. 2026 is the reliability reckoning: the field reframes orchestration as the classical distributed-systems problem of making stochastic components dependable, and for the first time attacks reliability, security, cost, memory governance, and observability with named systems and measured numbers rather than vibes."}}</script>
<script>
const D = JSON.parse(document.getElementById('data').textContent);
const byBc = {}; D.papers.forEach(p=>byBc[p.bibcode]=p);
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const adsurl = bc => 'https://ui.adsabs.harvard.edu/abs/'+encodeURIComponent(bc);
const axurl = p => p.arxiv ? 'https://arxiv.org/abs/'+p.arxiv : null;

// nav
const NAV = [
  {k:'__home',l:'Overview'},
  {grp:'Explore'},
  {k:'__all',l:'All papers'},
  {k:'__reading',l:'★ Reading path'},
  {k:'__opps',l:'★ Opportunities'},
  {k:'__design',l:'Design deep-dives'},
  {k:'__timeline',l:'Timeline'},
  {grp:'Themes'},
  ...D.sections.map(s=>({k:s.key,l:s.label,n:s.papers.length})),
];
let active='__home', q='', fyear='', fbranch='', fsort='rel';

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(it=>{
    if(it.grp){const d=document.createElement('div');d.className='grouphdr';d.textContent=it.grp;nav.appendChild(d);return;}
    const b=document.createElement('button');b.dataset.k=it.k;
    b.innerHTML=esc(it.l)+(it.n!=null?`<span class="count">${it.n}</span>`:'');
    if(it.k===active)b.classList.add('active');
    b.onclick=()=>{active=it.k;render();};
    nav.appendChild(b);
  });
}
// year + branch filter options
(function(){
  const ys=[...new Set(D.papers.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const fy=document.getElementById('fyear'); ys.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;fy.appendChild(o);});
  const fb=document.getElementById('fbranch');
  Object.entries(D.branch_labels).forEach(([k,l])=>{const o=document.createElement('option');o.value=k;o.textContent=l;fb.appendChild(o);});
})();
document.getElementById('q').oninput=e=>{q=e.target.value.toLowerCase();render();};
document.getElementById('fyear').onchange=e=>{fyear=e.target.value;render();};
document.getElementById('fbranch').onchange=e=>{fbranch=e.target.value;render();};
document.getElementById('fsort').onchange=e=>{fsort=e.target.value;render();};

function hl(t){ if(!q)return esc(t); const i=(t||'').toLowerCase().indexOf(q); if(i<0)return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length)); }

function paperMatches(p){
  if(fyear && String(p.year)!==fyear) return false;
  if(fbranch && !p.branches.includes(fbranch)) return false;
  if(q){ const hay=(p.title+' '+p.first_author+' '+p.bibcode+' '+p.notes.map(n=>n.k+' '+n.r).join(' ')).toLowerCase();
    if(!hay.includes(q)) return false; }
  return true;
}
function sortPapers(arr){
  const a=[...arr];
  if(fsort==='cit') a.sort((x,y)=>(y.citation_count||0)-(x.citation_count||0));
  else if(fsort==='year') a.sort((x,y)=>(y.year||0)-(x.year||0));
  else if(fsort==='title') a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  return a;
}
function cardHTML(p){
  const ax=axurl(p);
  const chips=p.branches.map(b=>`<span class="chip b">${esc(D.branch_labels[b]||b)}</span>`).join('');
  const cit=(p.citation_count!=null)?`<span class="cit">${p.citation_count} cites</span>`:'';
  const rk=p.reading_rank?`<span class="rank">★ read #${p.reading_rank}</span>`:'';
  const notes=p.notes.map(n=>`
     <div class="lbl">${esc(D.branch_labels[n.branch]||n.branch)} &middot; contribution</div><p>${hl(n.k)}</p>
     ${n.r?`<div class="lbl">why it matters</div><p>${hl(n.r)}</p>`:''}`).join('');
  return `<div class="card ${p.reading_rank?'read':''}" data-bc="${esc(p.bibcode)}">
    <div class="ttl">${hl(p.title||p.bibcode)}</div>
    <div class="meta">${rk}<span>${esc(p.first_author||'')}${p.year?', '+p.year:''}</span>${cit}<code class="bc-code">${esc(p.bibcode)}</code>${chips}</div>
    <div class="body">${notes}
      <div class="links"><a href="${adsurl(p.bibcode)}" target="_blank">ADS &#8599;</a>${ax?`<a href="${ax}" target="_blank">arXiv &#8599;</a>`:''}</div>
    </div></div>`;
}
function wireCards(){
  document.querySelectorAll('.card').forEach(c=>c.onclick=e=>{
    if(e.target.tagName==='A')return; c.classList.toggle('open');});
}
function renderList(bcs){
  let arr = bcs ? bcs.map(b=>byBc[b]).filter(Boolean) : D.papers;
  arr = sortPapers(arr.filter(paperMatches));
  document.getElementById('resultcount').textContent = arr.length+' paper'+(arr.length!=1?'s':'');
  return arr.length? arr.map(cardHTML).join('') : '<div class="empty">No papers match.</div>';
}
function panel(cls,title,items){ if(!items||!items.length)return'';
  return `<div class="panel ${cls}"><h3>${esc(title)}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`; }

function showControls(on){document.getElementById('controls').style.display=on?'flex':'none';}

function render(){
  buildNav();
  const v=document.getElementById('view');
  if(active==='__home'){ showControls(false); v.innerHTML=homeHTML(); }
  else if(active==='__all'){ showControls(true); v.innerHTML='<h2 class="sectionhead">All papers</h2>'+renderList(null); wireCards(); }
  else if(active==='__reading'){ showControls(false); v.innerHTML=readingHTML(); wireCards(); }
  else if(active==='__opps'){ showControls(false); v.innerHTML=oppsHTML(); }
  else if(active==='__design'){ showControls(false); v.innerHTML=designHTML(); }
  else if(active==='__timeline'){ showControls(false); v.innerHTML=timelineHTML(); }
  else { showControls(true); const s=D.sections.find(x=>x.key===active);
    v.innerHTML=`<h2 class="sectionhead">${esc(s.label)}</h2><p class="subtopic">${esc(s.subtopic)}</p>`
      +panel('themes','Themes',s.themes)+panel('measured',"Evidence &amp; benchmarks",s.how_measured)
      +panel('gaps','Open gaps',s.gaps)+panel('notable','Notable results / metrics',s.notable)
      +'<h3 style="margin:16px 0 8px">Papers</h3>'+renderList(s.papers); wireCards(); }
  window.scrollTo(0,0);
}
function homeHTML(){
  const m=D.meta||{};
  const stats=`${D.papers.length} papers \u00b7 ${D.sections.length} themes`+(D.reading&&D.reading.length?` \u00b7 ${D.reading.length}-paper reading path`:'');
  let h=`<h2 class="sectionhead">Overview</h2><p class="subtopic">${esc(stats)}</p>`;
  if(m.what_is){h+=`<div class="panel"><h3>What this is</h3><p class="val">${m.what_is}</p>`+(m.caveat?`<p class="hint">${m.caveat}</p>`:'')+`</div>`;}
  if(m.start_here&&m.start_here.length){h+=`<div class="panel"><h3>Start here</h3><ul style="margin:0;padding-left:18px">`+m.start_here.map(s=>`<li style=\"margin-bottom:6px\">${s}</li>`).join('')+`</ul></div>`;}
  if(m.one_paragraph){h+=`<div class="panel themes"><h3>The field in one paragraph</h3><p class="val">${m.one_paragraph}</p></div>`;}
  if(m.podcast){h+=`<div class="panel measured"><h3>Companion podcast</h3><p class="val">${m.podcast}</p></div>`;}
  return h;
}
function readingHTML(){
  let rows=D.reading.map((r,i)=>{const p=byBc[r[0]];
    return `<div class="readrow"><div class="rk">${i+1}</div><div class="grp">${esc(r[2])}</div>
      <div><a href="#" onclick="event.preventDefault();openOne('${r[0]}')"><b>${esc(r[1])}</b></a>
      <div class="hint">${esc(p?p.bibcode:r[0])}${p&&p.citation_count!=null?' · '+p.citation_count+' cites':''} · <a href="${adsurl(r[0])}" target="_blank">ADS</a>${p&&p.arxiv?` · <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv</a>`:''}</div></div></div>`;
  }).join('');
  return `<h2 class="sectionhead">&#9733; Reading path</h2><p class="subtopic">Thirteen papers to get current fast, grouped by focus area. Click a title to expand its card inline.</p>${rows}
  <div id="oneview" style="margin-top:16px"></div>`;
}
function openOne(bc){const p=byBc[bc];const o=document.getElementById('oneview');
  if(!p){o.innerHTML='<div class="empty">Not in the extracted set. Open it via the ADS link above.</div>';return;}
  o.innerHTML=cardHTML(p);o.querySelector('.card').classList.add('open');wireCards();o.scrollIntoView({behavior:'smooth'});}
function oppsHTML(){
  return `<h2 class="sectionhead">&#9733; Prioritized opportunities</h2><p class="subtopic">Open opportunities and white-space, ranked by leverage.</p>`
   +D.opportunities.map((o,i)=>`<div class="op"><div class="rk">${i+1}</div><div><div class="n">${esc(o[0])}</div><div class="val">${esc(o[1])}</div></div></div>`).join('');
}
function designHTML(){
  let out=`<h2 class="sectionhead">Design deep-dives</h2><p class="subtopic">Deep dives into keystone systems: design, evidence, and what is reusable.</p>`;
  D.design.forEach(p=>{
    out+=`<div class="panel dd"><h3>${esc(p.title)}</h3><div class="bc">${esc(p.bibcode)} &middot; <a href="${adsurl(p.bibcode)}" target="_blank">ADS</a></div>
      <div class="field"><div class="lbl">Task design</div><div class="val">${esc(p.task_design)}</div></div>
      <div class="field"><div class="lbl">Data / trajectory generation</div><div class="val">${esc(p.data_generation)}</div></div>
      <div class="field"><div class="lbl">Metrics</div><div class="val">${esc(p.metrics)}</div></div>
      <div class="field"><div class="lbl">Key numbers</div><div class="kv-wrap">${(p.key_numbers||[]).map(k=>`<div class="kv">${esc(k)}</div>`).join('')}</div></div>
      <div class="field"><div class="lbl">Reusable / transferable</div><div class="val">${esc(p.reusable_for_role)}</div></div></div>`;
  });
  out+=panel('themes','Cross-cutting design principles',D.design_principles);
  out+=panel('gaps','Pitfalls to avoid',D.design_pitfalls);
  return out;
}
function timelineHTML(){
  const pv=D.temporal.publication_volume; const mx=Math.max(...pv.map(x=>x.count||0));
  const bars=pv.map(x=>`<div class="bar"><div class="n">${x.count}</div><div class="col" style="height:${Math.round((x.count/mx)*100)}%"></div><div class="yr">${x.year}</div></div>`).join('');
  const notes=pv.map(x=>x.note?`<li><b>${x.year}:</b> ${esc(x.note)}</li>`:'').join('');
  const yrs=[2023,2024,2025,2026];
  const trows=D.temporal.citation_trajectories.map(c=>{
    const m={}; (c.per_year||[]).forEach(p=>m[p.year]=p.citations);
    const peak=Math.max(...Object.values(m).map(Number).filter(n=>!isNaN(n)),0);
    const cells=yrs.map(y=>{const v=m[y]; return `<td class="num ${v===peak&&v?'peak':''}">${v!=null?v:'&ndash;'}</td>`;}).join('');
    return `<tr><td><a href="${adsurl(c.bibcode)}" target="_blank">${esc(c.title)}</a></td>${cells}</tr>`;
  }).join('');
  const prog=D.temporal.benchmark_progression.map(s=>`<li>${esc(s)}</li>`).join('');
  return `<h2 class="sectionhead">Timeline: the 2023 to 2026 acceleration</h2>
  <div class="panel"><h3>Publication volume (topical working set)</h3><div class="bars">${bars}</div>
    <ul class="hint" style="margin-top:10px">${notes}</ul></div>
  <div class="panel"><h3>Keystone citation trajectories (citations per year)</h3>
    <div class="traj"><table><tr><th>Paper</th>${yrs.map(y=>`<th class="num">${y}${y===2026?'*':''}</th>`).join('')}</tr>${trows}</table></div>
    <p class="hint" style="margin-top:10px">* 2026 is a partial year (about 5 months). Green marks the peak year. Per-year edge counts from the citation graph.</p></div>
  <div class="panel notable"><h3>Benchmark frontier by year</h3><ul>${prog}</ul></div>
  <div class="panel"><h3>Narrative</h3><p class="narr">${esc(D.temporal.narrative)}</p></div>`;
}
// theme toggle (light is the reading-optimized default; choice persists)
const TKEY='litx-mas';
function setTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem(TKEY,t);}catch(e){}
  const b=document.getElementById('themebtn');if(b)b.innerHTML=(t==='dark'?'☀ Light':'☾ Dark');}
setTheme((()=>{try{return localStorage.getItem(TKEY)||'light';}catch(e){return 'light';}})());
document.getElementById('themebtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
// '/' focuses search when the box is visible
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){const el=document.getElementById('q');
    if(el&&el.offsetParent!==null){e.preventDefault();el.focus();el.select();}}
  if(e.key==='Escape'&&document.activeElement.id==='q'){q='';document.getElementById('q').value='';render();}
});
render();
</script>
