to-inconsistent gains over a strong single-agent baseline on software-engineering tasks.", "prod": "The headline reliability finding: fan-out is not free quality. Adopt multi-agent only where it beats a measured single-agent baseline on YOUR tasks."}]}, {"bibcode": "2025arXiv250313657C", "real_bibcode": "2025arXiv250313657C", "corpus": true, "type": "paper", "title": "Why Do Multi-Agent LLM Systems Fail? (MAST failure taxonomy)", "first_author": "Cemri, ...", "year": 2025, "citation_count": 0, "arxiv": "2503.13657", "doi": null, "url": null, "branches": ["reliability", "eval"], "keystone": true, "notes": [{"branch": "reliability", "signal": "14 failure modes in 3 categories — specification issues, inter-agent misalignment, task verification — built with an LLM-as-judge pipeline at Cohen's κ=0.88.", "prod": "A ready-made vocabulary for incident review. Label your own failures against it — but treat the taxonomy as a living checklist, not a frozen schema (models change, failure modes shift)."}]}, {"bibcode": "BeyondStrongest", "real_bibcode": null, "corpus": false, "type": "paper", "title": "Beyond the Strongest LLM: Multi-Turn Multi-Agent Orchestration vs Single LLMs", "first_author": "Tian, Aaron Xuxiang", "year": 2025, "citation_count": null, "arxiv": "2509.23537", "doi": null, "url": null, "branches": ["reliability", "topology"], "keystone": true, "notes": [{"branch": "topology", "signal": "Consensus-topology ablations: visible authorship raises self-voting and ties; visible live vote tallies raise herding and premature consensus.", "prod": "If you run review/debate quorums, blind the lanes and hide interim tallies by default — visibility measurably biases the consensus toward the wrong answer."}]}, {"bibcode": "2026arXiv260411767L", "real_bibcode": "2026arXiv260411767L", "corpus": true, "type": "paper", "title": "λ_A: A Typed Lambda Calculus for LLM Agent Composition", "first_author": "L..., ...", "year": 2026, "citation_count": 0, "arxiv": "2604.11767", "doi": null, "url": null, "branches": ["reliability"], "keystone": false, "notes": [{"branch": "reliability", "signal": "Well-formedness / termination guarantees for agent composition via a typed calculus.", "prod": "Formal guarantees are appealing, but the realistic enterprise failures are config typos (nonexistent agent refs, empty templates). A cheap install-time validator usually beats a type system here."}]}, {"bibcode": "2026arXiv260507935X", "real_bibcode": "2026arXiv260507935X", "corpus": true, "type": "paper", "title": "TraceFix: Repairing Agent Coordination Protocols with TLA+ Counterexamples", "first_author": "X..., ...", "year": 2026, "citation_count": 0, "arxiv": "2605.07935", "doi": null, "url": null, "branches": ["reliability", "topology"], "keystone": false, "notes": [{"branch": "reliability", "signal": "Uses TLA+ counterexamples to repair coordination protocols.", "prod": "The formal-verification angle on coordination. Worth knowing exists; for most teams a configuration linter + good traces catch the protocol bugs that actually occur."}]}, {"bibcode": "2026arXiv260503409P", "real_bibcode": "2026arXiv260503409P", "corpus": true, "type": "paper", "title": "Robust Agent Compensation (RAC): Teaching AI Agents to Compensate", "first_author": "Perera, Srinath", "year": 2026, "citation_count": 0, "arxiv": "2605.03409", "doi": "10.1145/3786335.3813141", "url": null, "branches": ["recovery"], "keystone": true, "notes": [{"branch": "recovery", "signal": "A log-based recovery layer intercepts each tool call, records a transaction log (pending/completed/failed/compensated), retries transient errors, and rolls back completed dependents by reverse-topological compensation — no agent-code rewrite. Materially cheaper than replanning.", "prod": "Recover from logs, not by re-reasoning the whole plan. Keep a per-run transaction log and a compensator per side-effecting tool; recovery cost then scales with failures, not plan size."}]}, {"bibcode": "ACRFence", "real_bibcode": null, "corpus": false, "type": "paper", "title": "ACRFence: Preventing Semantic Rollback Attacks in Agent Checkpoint-Restore", "first_author": "Zheng, Yusheng", "year": 2026, "citation_count": null, "arxiv": "2603.20625", "doi": null, "url": null, "branches": ["recovery", "security"], "keystone": true, "notes": [{"branch": "recovery", "signal": "Checkpoint/restore duplicates irreversible effects (double commits, double payments, token reuse) unless the tool boundary enforces replay-or-fork: replay a recorded response when equivalent, require an explicit fork for a new irreversible op, block consumed-credential reuse. LLMs regenerate subtly different requests even at temperature 0.", "prod": "The single most under-appreciated agent reliability bug: a retry after a side effect lands repeats the side effect. Idempotency keys + replay-or-fork on every external write are table stakes."}]}, {"bibcode": "2025arXiv250311951C", "real_bibcode": "2025arXiv250311951C", "corpus": true, "type": "paper", "title": "SagaLLM: Context Management, Validation & Transaction Guarantees for Multi-Agent LLM Planning", "first_author": "Chang, Edward Y.", "year": 2025, "citation_count": 0, "arxiv": "2503.11951", "doi": "10.14778/3750601.3750611", "url": null, "branches": ["recovery"], "keystone": false, "notes": [{"branch": "recovery", "signal": "Brings database-style transactional safeguards — checkpoints, compensable execution, compensation pairs, global validation, rollback — to multi-agent planning.", "prod": "Names the right mental model: treat a multi-step agent workflow like a saga. Compensation + validation are the load-bearing parts; the planning DAG is optional."}]}, {"bibcode": "2026arXiv260413018C", "real_bibcode": "2026arXiv260413018C", "corpus": true, "type": "paper", "title": "Toward Autonomous Long-Horizon Engineering for ML Research (AiScientist)", "first_author": "Chen, Guoxin", "year": 2026, "citation_count": 0, "arxiv": "2604.13018", "doi": null, "url": null, "branches": [" 250215964N"]}, {"title": "Record cost/latency facts before optimizing routing", "pillar": "routing", "maturity": "table-stakes", "why": "You can't route on cost you don't measure, and treating unknown cost as zero routes hard tasks to weak models.", "how": "Emit per-step token/cost/latency; render 'unknown' (never $0) in dashboards; learn routing from this data rather than a hand-authored table.", "papers": ["2024arXiv240618665O", "NodeSampling", "2026arXiv260423577G"]}, {"title": "Prefer dynamic task graphs over static schedules", "pillar": "topology", "maturity": "advancing", "why": "Heterogeneous, data-dependent work parallelizes badly under a fixed schedule and serializes independent branches.", "how": "Model dependencies explicitly; let the scheduler fan out independent branches async; bound per-step time so one slow step can't stall the batch.", "papers": ["2025arXiv250307675Y", "2026arXiv260515132R", "2025arXiv250213965L", "ManagerAgent"]}, {"title": "Keep roles in config and prompts, not in code", "pillar": "topology", "maturity": "advancing", "why": "A hardcoded hierarchy of agent classes ossifies and resists model upgrades. Dynamic, config-driven roles adapt.", "how": "Express specialization as prompt/config; avoid a growing registry of agent types; let roles form from the task, not a static map.", "papers": ["2026arXiv260422446Y", "2026arXiv260513850H", "2023arXiv230808155W"]}, {"title": "Blind review/debate lanes and hide interim tallies", "pillar": "reliability", "maturity": "frontier", "why": "Visible authorship drives self-voting and ties; visible live tallies drive herding and premature consensus.", "how": "Anonymize lanes; reveal votes only at synthesis; and first check whether debate beats a single strong pass at all before paying for it.", "papers": ["BeyondStrongest", "2025arXiv250312029C"]}, {"title": "Treat orchestration topology as a security decision", "pillar": "security", "maturity": "table-stakes", "why": "The same task under different top <script>
const D = JSON.parse(document.getElementById('data').textContent);
const byBc = {}; D.papers.forEach(p=>byBc[p.bibcode]=p);
const esc = s => (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const adsurl = bc => 'https://ui.adsabs.harvard.edu/abs/'+encodeURIComponent(bc);
const MATLABEL={'table-stakes':'table-stakes','advancing':'advancing','frontier':'frontier'};
const MATCLASS={'table-stakes':'tablestakes','advancing':'advancing','frontier':'frontier'};

const NAV = [
  {k:'__home',l:'Overview'},
  {grp:'Use this'},
  {k:'__practices',l:'★ Practices playbook'},
  {k:'__pillars',l:'★ Reliability pillars'},
  {k:'__anti',l:'Anti-patterns'},
  {grp:'Explore the corpus'},
  {k:'__all',l:'All sources'},
  {k:'__reading',l:'Reading path'},
  {k:'__timeline',l:'Timeline'},
  {grp:'By pillar'},
  ...D.sections.map(s=>({k:s.key,l:s.label,n:s.papers.length})),
];
let active='__home', q='', fyear='', fbranch='', fsort='rel';

function buildNav(){
  const nav=document.getElementById('nav'); nav.innerHTML='';
  NAV.forEach(it=>{
    if(it.grp){const d=document.createElement('div');d.className='grouphdr';d.textContent=it.grp;nav.appendChild(d);return;}
    const b=document.createElement('button');b.dataset.k=it.k;
    b.innerHTML=esc(it.l)+(it.n!=null?`<span class="count">${it.n}</span>`:'');
    if(it.k===active)b.classList.add('active');
    b.onclick=()=>{active=it.k;render();};
    nav.appendChild(b);
  });
}
(function(){
  const ys=[...new Set(D.papers.map(p=>p.year).filter(Boolean))].sort((a,b)=>b-a);
  const fy=document.getElementById('fyear'); ys.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;fy.appendChild(o);});
  const fb=document.getElementById('fbranch');
  Object.entries(D.branch_labels).forEach(([k,l])=>{const o=document.createElement('option');o.value=k;o.textContent=l;fb.appendChild(o);});
})();
document.getElementById('q').oninput=e=>{q=e.target.value.toLowerCase();render();};
document.getElementById('fyear').onchange=e=>{fyear=e.target.value;render();};
document.getElementById('fbranch').onchange=e=>{fbranch=e.target.value;render();};
document.getElementById('fsort').onchange=e=>{fsort=e.target.value;render();};

function hl(t){ if(!q)return esc(t); const i=(t||'').toLowerCase().indexOf(q); if(i<0)return esc(t);
  return esc(t.slice(0,i))+'<mark>'+esc(t.slice(i,i+q.length))+'</mark>'+esc(t.slice(i+q.length)); }
function paperMatches(p){
  if(fyear && String(p.year)!==fyear) return false;
  if(fbranch && !p.branches.includes(fbranch)) return false;
  if(q){ const hay=(p.title+' '+p.first_author+' '+p.bibcode+' '+p.notes.map(n=>n.signal+' '+n.prod).join(' ')).toLowerCase();
    if(!hay.includes(q)) return false; }
  return true;
}
function sortPapers(arr){
  const a=[...arr];
  if(fsort==='cit') a.sort((x,y)=>(y.citation_count||0)-(x.citation_count||0));
  else if(fsort==='year') a.sort((x,y)=>(y.year||0)-(x.year||0));
  else if(fsort==='title') a.sort((x,y)=>(x.title||'').localeCompare(y.title||''));
  return a;
}
function refchip(bc){const p=byBc[bc]; const lbl=p?(p.title.split(':')[0].split('(')[0].trim()):bc;
  return `<span class="chip b" title="${esc(bc)}">${esc(lbl)}</span>`;}
function paperLinks(p){
  const out=[];
  if(p.corpus && p.real_bibcode) out.push(`<a href="${adsurl(p.real_bibcode)}" target="_blank">ADS &#8599;</a>`);
  if(p.arxiv) out.push(`<a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv &#8599;</a>`);
  if(p.doi) out.push(`<a href="https://doi.org/${p.doi}" target="_blank">DOI &#8599;</a>`);
  if(p.url) out.push(`<a href="${p.url}" target="_blank">resource &#8599;</a>`);
  return out.join('');
}
function cardHTML(p){
  const chips=p.branches.map(b=>`<span class="chip b">${esc(D.branch_labels[b]||b)}</span>`).join('');
  const ks=p.keystone?`<span class="chip ks">keystone</span>`:'';
  const std=p.type==='standard'?`<span class="chip std">standard</span>`:'';
  const nc=(p.type==='paper'&&!p.corpus)?`<span class="chip nc">not in SciX corpus</span>`:'';
  const cit=(p.corpus && p.citation_count!=null)?`<span class="chip">${p.citation_count} cites</span>`:'';
  const idcode=p.corpus?p.real_bibcode:(p.arxiv?('arXiv:'+p.arxiv):(p.doi||p.url||''));
  const notes=p.notes.map(n=>`
     <div class="lbl">${esc(D.branch_labels[n.branch]||n.branch)} &middot; what it shows</div><p>${hl(n.signal)}</p>
     ${n.prod?`<div class="lbl pr">why it matters in production</div><p>${hl(n.prod)}</p>`:''}`).join('');
  return `<div class="card ${p.keystone?'ks':''}" data-bc="${esc(p.bibcode)}">
    <div class="ttl">${hl(p.title||p.bibcode)}</div>
    <div class="meta">${ks}${std}<span>${esc(p.first_author||'')}${p.year?', '+p.year:''}</span>${cit}<code class="bc-code">${esc(idcode)}</code>${nc}${chips}</div>
    <div class="body">${notes}<div class="links">${paperLinks(p)}</div></div></div>`;
}
function wireCards(){
  document.querySelectorAll('.card').forEach(c=>c.onclick=e=>{
    if(e.target.tagName==='A')return; c.classList.toggle('open');});
}
function renderList(bcs){
  let arr = bcs ? bcs.map(b=>byBc[b]).filter(Boolean) : D.papers;
  arr = sortPapers(arr.filter(paperMatches));
  document.getElementById('resultcount').textContent = arr.length+' source'+(arr.length!=1?'s':'');
  return arr.length? arr.map(cardHTML).join('') : '<div class="empty">No sources match.</div>';
}
function panel(cls,title,items){ if(!items||!items.length)return'';
  return `<div class="panel ${cls}"><h3>${esc(title)}</h3><ul>${items.map(i=>`<li>${esc(i)}</li>`).join('')}</ul></div>`; }
function showControls(on){document.getElementById('controls').style.display=on?'flex':'none';}

function render(){
  buildNav();
  const v=document.getElementById('view');
  if(active==='__home'){ showControls(false); v.innerHTML=homeHTML(); }
  else if(active==='__all'){ showControls(true); v.innerHTML='<h2 class="sectionhead">All sources</h2><p class="subtopic">'+D.papers.length+' sources · peer/preprint papers (most corpus-anchored with citation counts) plus three enterprise standards. Click a card for what it shows and why it matters in production.</p>'+renderList(null); wireCards(); }
  else if(active==='__practices'){ showControls(false); v.innerHTML=practicesHTML(); wirePractices(); }
  else if(active==='__pillars'){ showControls(false); v.innerHTML=pillarsHTML(); }
  else if(active==='__anti'){ showControls(false); v.innerHTML=antiHTML(); }
  else if(active==='__reading'){ showControls(false); v.innerHTML=readingHTML(); wireCards(); }
  else if(active==='__timeline'){ showControls(false); v.innerHTML=timelineHTML(); }
  else { showControls(true); const s=D.sections.find(x=>x.key===active);
    v.innerHTML=`<h2 class="sectionhead">${esc(s.label)}</h2><p class="subtopic">${esc(s.subtopic)}</p>`
      +panel('themes','What the literature says',s.themes)+panel('gaps','What to watch for',s.watch)
      +panel('notable','Notable results',s.notable)
      +'<h3 style="margin:16px 0 8px">Sources</h3>'+renderList(s.papers); wireCards(); }
  window.scrollTo(0,0);
}
function homeHTML(){
  const stats=`${D.papers.length} sources · ${D.sections.length} reliability pillars · ${D.practices.length} practices`;
  return `<h2 class="sectionhead">Running multi-agent orchestration reliably in enterprise</h2><p class="subtopic">${stats}</p>
  <div class="panel"><h3>What this is</h3><p class="val">A vendor-neutral literature resource for teams building and operating multi-agent LLM systems in production. It distills recent research (2022–2026) on reliability, recovery, observability, evaluation, cost/routing, topology, security, and human oversight into an actionable practices playbook — each practice grounded in the papers behind it.</p>
  <p class="hint">Framework-agnostic. A few examples point to a concrete open-source orchestrator for illustration, but every practice applies regardless of stack. Most sources are anchored in the SciX corpus (arXiv + ADS) with citation counts; a handful link via arXiv/DOI, and three are widely-used standards (OpenTelemetry GenAI, NIST AI RMF, OWASP LLM Top 10).</p></div>
  <div class="panel"><h3>Start here</h3><ul>
    <li><b>★ Practices playbook.</b> ${D.practices.length} concrete practices, tagged table-stakes / advancing / frontier, each with why, how, and sources. Filter by maturity or pillar.</li>
    <li><b>★ Reliability pillars.</b> The eight areas, each with what the literature says, what to watch for, and the key sources.</li>
    <li><b>Anti-patterns.</b> The tempting moves that bite teams in production, and the evidence against them.</li>
    <li><b>Explore the corpus</b> — all sources (searchable), a reading path, and a timeline of the field.</li>
  </ul></div>
  <div class="panel themes"><h3>The field in one paragraph</h3><p class="val">2022–2023 set the foundations: the reasoning-and-acting pattern, the first multi-agent frameworks, and the first benchmarks and security results. 2024 matured the tooling for measuring and attacking agents. 2025 is the skepticism year — careful studies found that unconditional multi-agent fan-out rarely beats a strong single agent. 2026 is the substrate year — the strongest work builds durable, inspectable substrate (execution traces, transactional recovery, execution-grounded verification) rather than more orchestration cleverness. The throughline for enterprise: invest in evaluation, observability, recovery, and security first; add agents only where a baseline proves they help.</p></div>
  <div class="panel notable"><h3>If you do five things</h3><ul>
    <li>Measure a single-agent baseline and make fan-out earn its place.</li>
    <li>Make every run a structured, replayable trace (OpenTelemetry GenAI).</li>
    <li>Treat retries around side effects as transactions — idempotency + replay-or-fork.</li>
    <li>Ground evaluation in execution; calibrate any LLM judge; never call eval proof.</li>
    <li>Treat tool/RAG output as untrusted and orchestration topology as a security decision.</li>
  </ul></div>`;
}
function practicesHTML(){
  let out=`<h2 class="sectionhead">★ Practices playbook</h2>
  <p class="subtopic">Concrete, framework-agnostic practices for reliable multi-agent systems. Click a row for the rationale, a how-to, and the sources. Filter by maturity.</p>
  <div class="legend">
    <span class="mat mat-tablestakes">table-stakes</span> do these now ·
    <span class="mat mat-advancing">advancing</span> differentiators ·
    <span class="mat mat-frontier">frontier</span> emerging
    &nbsp;|&nbsp; <select id="pmat"><option value="">all maturities</option><option value="table-stakes">table-stakes</option><option value="advancing">advancing</option><option value="frontier">frontier</option></select>
    <select id="ppil"><option value="">all pillars</option>${Object.entries(D.branch_labels).map(([k,l])=>`<option value="${k}">${esc(l)}</option>`).join('')}</select>
  </div><div id="prlist"></div>`;
  return out;
}
function renderPractices(){
  const mat=(document.getElementById('pmat')||{}).value||'';
  const pil=(document.getElementById('ppil')||{}).value||'';
  const order={'table-stakes':0,'advancing':1,'frontier':2};
  let rows=[...D.practices].filter(p=>(!mat||p.maturity===mat)&&(!pil||p.pillar===pil));
  rows.sort((a,b)=>(order[a.maturity]-order[b.maturity]));
  const el=document.getElementById('prlist');
  el.innerHTML = rows.length? rows.map((p,i)=>`
    <div class="pr-row" data-i="${i}">
      <div class="prttl">${esc(p.title)}</div>
      <div class="prmeta">
        <span class="mat mat-${MATCLASS[p.maturity]}">${esc(MATLABEL[p.maturity])}</span>
        <span class="chip b">${esc(D.branch_labels[p.pillar]||p.pillar)}</span>
      </div>
      <div class="prbody">
        <div class="lbl">why</div><p class="val" style="font-size:14.5px">${esc(p.why)}</p>
        <div class="lbl pr">how</div><p class="val" style="font-size:14.5px">${esc(p.how)}</p>
        <div class="lbl">sources</div><div class="reflist" style="display:flex;gap:7px;flex-wrap:wrap">${p.papers.map(refchip).join('')}</div>
      </div>
    </div>`).join('') : '<div class="empty">No practices match.</div>';
  el.querySelectorAll('.pr-row').forEach(c=>c.onclick=e=>{if(e.target.tagName==='A'||e.target.tagName==='OPTION')return;c.classList.toggle('open-row');});
}
function wirePractices(){
  const m=document.getElementById('pmat'),p=document.getElementById('ppil');
  if(m)m.onchange=renderPractices; if(p)p.onchange=renderPractices;
  renderPractices();
}
function pillarsHTML(){
  let out=`<h2 class="sectionhead">★ Reliability pillars</h2><p class="subtopic">Eight areas that determine whether a multi-agent system holds up in production. Open any pillar in the left nav for its full source list.</p>`;
  D.sections.forEach(s=>{
    out+=`<div class="pill">
      <h3>${esc(s.label)}</h3>
      <div class="sub">${esc(s.subtopic)}</div>
      <div class="reflist">${s.papers.slice(0,6).map(refchip).join('')}${s.papers.length>6?`<span class="chip">+${s.papers.length-6} more</span>`:''}</div>
    </div>`;
  });
  return out;
}
function antiHTML(){
  return `<h2 class="sectionhead">Anti-patterns</h2><p class="subtopic">The tempting moves that bite teams in production — and the evidence against each. The inverse of the playbook.</p>`
   +D.anti.map(a=>`<div class="anti"><div class="n">${esc(a[0])}</div><div class="d">${esc(a[1])}</div><div class="reflist" style="display:flex;gap:7px;flex-wrap:wrap">${a[2].map(refchip).join('')}</div></div>`).join('');
}
function readingHTML(){
  let rows=D.reading.map((r,i)=>{const p=byBc[r[0]];
    const idc = p?(p.corpus?p.real_bibcode:(p.arxiv?'arXiv:'+p.arxiv:(p.doi||p.url))):r[0];
    let lk='';
    if(p){ if(p.corpus&&p.real_bibcode) lk+=` · <a href="${adsurl(p.real_bibcode)}" target="_blank">ADS</a>`;
           if(p.arxiv) lk+=` · <a href="https://arxiv.org/abs/${p.arxiv}" target="_blank">arXiv</a>`;
           if(p.doi) lk+=` · <a href="https://doi.org/${p.doi}" target="_blank">DOI</a>`; }
    return `<div class="readrow"><div class="rk">${i+1}</div><div class="grp">${esc(r[2])}</div>
      <div><a href="#" onclick="event.preventDefault();openOne('${r[0]}')"><b>${esc(r[1])}</b></a>
      <div class="hint">${esc(idc||'')}${lk}</div></div></div>`;
  }).join('');
  return `<h2 class="sectionhead">Reading path</h2><p class="subtopic">Seventeen sources to get current fast, ordered foundations → evaluation → reliability → security → recovery → observability → cost. Weighted to 2025–2026. Click a title to expand its card.</p>${rows}
  <div id="oneview" style="margin-top:16px"></div>`;
}
function openOne(bc){const p=byBc[bc];const o=document.getElementById('oneview');
  if(!p){o.innerHTML='<div class="empty">Not in the extracted set.</div>';return;}
  o.innerHTML=cardHTML(p);o.querySelector('.card').classList.add('open');wireCards();o.scrollIntoView({behavior:'smooth'});}
function timelineHTML(){
  const pv=D.temporal.publication_volume; const mx=Math.max(...pv.map(x=>x.count||0));
  const bars=pv.map(x=>`<div class="bar"><div class="n">${x.count}</div><div class="col" style="height:${Math.round((x.count/mx)*100)}%"></div><div class="yr">${x.year}</div></div>`).join('');
  const notes=pv.map(x=>x.note?`<li><b>${x.year}:</b> ${esc(x.note)}</li>`:'').join('');
  const tc=D.temporal.topcited; const cmx=Math.max(...tc.map(c=>c[1]));
  const crows=tc.map(c=>{const p=byBc[c[0]];const nm=p?p.title.split(':')[0].split('(')[0].trim():c[0];
    return `<div class="citerow"><div class="nm">${p&&p.corpus?`<a href="${adsurl(p.real_bibcode)}" target="_blank">${esc(nm)}</a>`:esc(nm)}</div><div class="track"><div class="fill" style="width:${Math.round(c[1]/cmx*100)}%"></div></div><div class="cn">${c[1]}</div></div>`;}).join('');
  return `<h2 class="sectionhead">Timeline: foundations → measurement → skepticism → substrate</h2>
  <div class="panel"><h3>Publication volume (this working set)</h3><div class="bars">${bars}</div>
    <ul class="hint" style="margin-top:10px">${notes}</ul></div>
  <div class="panel"><h3>Most-cited foundations (SciX corpus citation counts)</h3><div class="cites">${crows}</div>
    <p class="hint" style="margin-top:10px">Citation counts as indexed in the SciX corpus (arXiv + ADS). The 2026 substrate papers are recent and largely uncited so far; their value is the direction they set, not their citation weight.</p></div>
  <div class="panel"><h3>Narrative</h3><p class="narr">${esc(D.temporal.narrative)}</p></div>`;
}
const TKEY='entorch-theme';
function setTheme(t){document.documentElement.dataset.theme=t;try{localStorage.setItem(TKEY,t);}catch(e){}
  const b=document.getElementById('themebtn');if(b)b.innerHTML=(t==='dark'?'☀ Light':'☾ Dark');}
setTheme((()=>{try{return localStorage.getItem(TKEY)||'light';}catch(e){return 'light';}})());
document.getElementById('themebtn').onclick=()=>setTheme(document.documentElement.dataset.theme==='dark'?'light':'dark');
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement.id!=='q'){const el=document.getElementById('q');
    if(el&&el.offsetParent!==null){e.preventDefault();el.focus();el.select();}}
  if(e.key==='Escape'&&document.activeElement.id==='q'){q='';document.getElementById('q').value='';render();}
});
render();
</script>
